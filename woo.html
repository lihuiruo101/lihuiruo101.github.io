<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>인증 완료 - 사이버펑크</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  /* 배경 그리드 + 네온 효과 */
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(ellipse at center, #0f0f17 0%, #000000 100%);
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    color: #00ffea;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  /* 그리드 배경 */
  .grid-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(0deg, rgba(0,255,234,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,234,0.2) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* 인증 박스 */
  .auth-box {
    position: relative;
    background: rgba(0, 255, 234, 0.05);
    border: 2px solid #00ffe7;
    box-shadow:
      0 0 10px #00ffe7,
      0 0 40px #00ffe7,
      inset 0 0 10px #00ffe7;
    padding: 40px 60px;
    border-radius: 20px;
    text-align: center;
    z-index: 1;
    width: 320px;
  }

  .auth-box h1 {
    font-size: 2.8rem;
    margin: 0 0 15px;
    text-shadow:
      0 0 10px #00ffe7,
      0 0 20px #00ffe7,
      0 0 30px #00ffe7;
  }

  .auth-box p {
    font-size: 1.2rem;
    margin-bottom: 40px;
    letter-spacing: 1.5px;
  }

  /* 체크박스 애니메이션 */
  .checkmark {
    display: inline-block;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 4px solid #00ffe7;
    box-shadow:
      0 0 10px #00ffe7,
      0 0 40px #00ffe7 inset;
    position: relative;
    animation: pulseGlow 2s infinite;
  }

  .checkmark:after {
    content: '';
    position: absolute;
    left: 20px;
    top: 40px;
    width: 18px;
    height: 36px;
    border-right: 6px solid #00ffe7;
    border-bottom: 6px solid #00ffe7;
    transform: rotate(45deg);
    opacity: 0;
    animation: drawCheck 1s forwards 1s;
  }

  @keyframes drawCheck {
    to {
      opacity: 1;
    }
  }

  @keyframes pulseGlow {
    0%, 100% {
      box-shadow:
        0 0 10px #00ffe7,
        0 0 40px #00ffe7 inset;
    }
    50% {
      box-shadow:
        0 0 20px #00fff0,
        0 0 80px #00fff0 inset;
    }
  }

  /* 사이버펑크 스타일 텍스트 네온 */
  .neon-text {
    color: #00ffe7;
    text-shadow:
      0 0 5px #00ffe7,
      0 0 10px #00ffe7,
      0 0 20px #00ffe7,
      0 0 40px #00ffe7;
  }

</style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="auth-box">
    <h1 class="neon-text">인증이 완료되었습니다</h1>
    <p>Access Granted</p>
    <div class="checkmark"></div>
  </div>
</body>
</html>
