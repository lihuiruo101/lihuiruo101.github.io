<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>바카라 데이터 분석 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap');

  body {
    margin: 0; padding: 0;
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(135deg, #fef9f4, #f0e4d7);
    color: #3b322d;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    width: 1000px;
    background: #fffaf0;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(59,50,45,0.3);
    padding: 40px 50px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    grid-gap: 40px;
  }

  h1 {
    grid-column: 1 / -1;
    margin-bottom: 30px;
    font-weight: 800;
    font-size: 2.8rem;
    color: #5a432a;
    border-left: 8px solid #d4b483;
    padding-left: 20px;
    user-select: none;
  }

  /* 입력 폼 */
  .input-section {
    grid-column: 1 / 2;
    background: #f7ede0;
    border-radius: 14px;
    padding: 30px 25px;
    box-shadow: inset 0 0 10px #d4b483aa;
  }

  .input-section h2 {
    margin-bottom: 25px;
    font-weight: 700;
    font-size: 1.5rem;
    color: #a06e28;
  }

  .form-row {
    display: flex;
    align-items: center;
    margin-bottom: 18px;
  }
  .form-row label {
    width: 120px;
    font-weight: 700;
    font-size: 1.1rem;
    color: #7f5c17;
    user-select: none;
  }
  .form-row select {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #d4b483;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    color: #5a432a;
    background: #fff;
    transition: border-color 0.3s;
  }
  .form-row select:hover, .form-row select:focus {
    border-color: #a06e28;
    outline: none;
  }

  button#addGameBtn {
    width: 100%;
    padding: 14px 0;
    margin-top: 10px;
    background: #d4b483;
    border: none;
    border-radius: 12px;
    color: #5a432a;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.3s ease;
    user-select: none;
  }
  button#addGameBtn:hover {
    background: #a77e2f;
  }

  /* 결과 테이블 */
  .table-section {
    grid-column: 1 / 2;
    background: #f7ede0;
    border-radius: 14px;
    padding: 30px 25px;
    box-shadow: inset 0 0 10px #d4b483aa;
    max-height: 460px;
    overflow-y: auto;
  }

  .table-section h2 {
    margin-bottom: 25px;
    font-weight: 700;
    font-size: 1.5rem;
    color: #a06e28;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 1rem;
  }
  th, td {
    padding: 12px 14px;
    border: 1.5px solid #d4b483;
    text-align: center;
    color: #5a432a;
    user-select: none;
  }
  th {
    background: #d4b483cc;
    font-weight: 800;
  }
  tbody tr:nth-child(even) {
    background: #fff7e0;
  }

  /* 통계 & 그래프 영역 */
  .stats-section {
    grid-column: 2 / 3;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .stats-cards {
    display: flex;
    gap: 24px;
    justify-content: space-between;
  }
  .card {
    background: #f7ede0;
    flex: 1;
    padding: 22px 18px;
    border-radius: 12px;
    box-shadow: inset 0 0 10px #d4b483aa;
    text-align: center;
    user-select: none;
  }
  .card h3 {
    font-size: 1.2rem;
    margin-bottom: 8px;
    color: #a06e28;
  }
  .card p {
    font-size: 1.8rem;
    font-weight: 900;
    color: #5a432a;
  }

  /* 차트 캔버스 */
  canvas {
    background: #fffaf0;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(59,50,45,0.2);
    width: 100% !important;
    max-height: 300px;
  }

  /* 버튼 그룹 */
  .btn-group {
    margin-top: 25px;
    display: flex;
    gap: 15px;
  }
  .btn-group button {
    flex: 1;
    padding: 14px 0;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    font-size: 1.1rem;
    user-select: none;
    cursor: pointer;
    transition: background 0.3s ease;
    color: #fff;
  }
  #resetBtn {
    background: #c44;
  }
  #resetBtn:hover {
    background: #922;
  }
  #refreshBtn {
    background: #666;
  }
  #refreshBtn:hover {
    background: #444;
  }
</style>
</head>
<body>
<div class="container" role="main" aria-label="바카라 실시간 데이터 분석 대시보드">

  <h1>바카라 실시간 데이터 분석 대시보드</h1>

  <section class="input-section" aria-labelledby="inputSectionTitle">
    <h2 id="inputSectionTitle">게임 결과 추가하기</h2>
    <div class="form-row">
      <label for="roleSelect">선택한 역할:</label>
      <select id="roleSelect" aria-describedby="roleDesc">
        <option value="Player">플레이어</option>
        <option value="Banker">뱅커</option>
        <option value="Tie">타이</option>
      </select>
    </div>
    <div class="form-row">
      <label for="resultSelect">게임 결과:</label>
      <select id="resultSelect" aria-describedby="resultDesc">
        <option value="Win">승리</option>
        <option value="Lose">패배</option>
        <option value="Tie">무승부</option>
      </select>
    </div>
    <button id="addGameBtn" aria-live="polite" aria-atomic="true">게임 결과 추가</button>
  </section>

  <section class="table-section" aria-labelledby="tableSectionTitle" tabindex="0">
    <h2 id="tableSectionTitle">게임 결과 데이터</h2>
    <table aria-describedby="tableDesc">
      <thead>
        <tr>
          <th>게임 번호</th>
          <th>선택한 역할</th>
          <th>결과</th>
        </tr>
      </thead>
      <tbody id="gameDataBody"></tbody>
    </table>
  </section>

  <section class="stats-section" aria-labelledby="statsSectionTitle">
    <h2 id="statsSectionTitle">통계 및 분석</h2>

    <div class="stats-cards" aria-live="polite" aria-atomic="true">
      <div class="card" id="totalGamesCard">
        <h3>총 게임 수</h3>
        <p id="totalGames">0회</p>
      </div>
      <div class="card" id="playerCountCard">
        <h3>플레이어 선택 횟수</h3>
        <p id="playerCount">0회</p>
      </div>
      <div class="card" id="bankerCountCard">
        <h3>뱅커 선택 횟수</h3>
        <p id="bankerCount">0회</p>
      </div>
      <div class="card" id="tieCountCard">
        <h3>타이 선택 횟수</h3>
        <p id="tieCount">0회</p>
      </div>
    </div>

    <div>
      <h3>역할별 선택 횟수 (막대 그래프)</h3>
      <canvas id="barChart" role="img" aria-label="역할별 선택 횟수 막대 그래프"></canvas>
    </div>

    <div style="margin-top:30px;">
      <h3>역할별 선택 비율 (도넛 그래프)</h3>
      <canvas id="pieChart" role="img" aria-label="역할별 선택 비율 도넛 그래프"></canvas>
    </div>

    <div class="btn-group">
      <button id="resetBtn" aria-label="데이터 초기화 버튼">데이터 초기화</button>
      <button id="refreshBtn" aria-label="페이지 새로고침 버튼">페이지 새로고침</button>
    </div>
  </section>
</div>

<script>
  const gameData = [];

  const tbody = document.getElementById('gameDataBody');
  const totalGamesEl = document.getElementById('totalGames');
  const playerCountEl = document.getElementById('playerCount');
  const bankerCountEl = document.getElementById('bankerCount');
  const tieCountEl = document.getElementById('tieCount');

  const roleSelect = document.getElementById('roleSelect');
  const resultSelect = document.getElementById('resultSelect');
  const addGameBtn = document.getElementById('addGameBtn');
  const resetBtn = document.getElementById('resetBtn');
  const refreshBtn = document.getElementById('refreshBtn');

  const barCtx = document.getElementById('barChart').getContext('2d');
  const pieCtx = document.getElementById('pieChart').getContext('2d');

  let barChart, pieChart;

  function updateTable() {
    tbody.innerHTML = '';
    gameData.forEach((game, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${idx + 1}</td><td>${game.role}</td><td>${game.result}</td>`;
      tbody.appendChild(tr);
    });
  }

  function updateStats() {
    const counts = { Player: 0, Banker: 0, Tie: 0 };
    gameData.forEach(g => {
      counts[g.role]++;
    });

    totalGamesEl.textContent = `${gameData.length}회`;
    playerCountEl.textContent = `${counts.Player}회`;
    bankerCountEl.textContent = `${counts.Banker}회`;
    tieCountEl.textContent = `${counts.Tie}회`;

    updateCharts(counts);
  }

  function updateCharts(counts) {
    const labels = ['Player', 'Banker', 'Tie'];
    const data = [counts.Player, counts.Banker, counts.Tie];

    if (barChart) barChart.destroy();
    if (pieChart) pieChart.destroy();

    barChart = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '선택 횟수',
          data,
          backgroundColor: ['#008080', '#d64545', '#d4af37'],
          borderRadius: 8,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#eee' } },
          x: { grid: { display: false } }
        }
      }
    });

    pieChart = new Chart(pieCtx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: ['#008080', '#d64545', '#d4af37'],
          hoverOffset: 30,
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              font: { size: 14 },
              color: '#5a432a'
            }
          }
        }
      }
    });
  }

  addGameBtn.addEventListener('click', () => {
    const role = roleSelect.value;
    const result = resultSelect.value;

    // 데이터 추가
    gameData.push({ role, result });

    // UI 업데이트
    updateTable();
    updateStats();
  });

  resetBtn.addEventListener('click', () => {
    if (confirm('데이터를 초기화하시겠습니까?')) {
      gameData.length = 0;
      updateTable();
      updateStats();
    }
  });

  refreshBtn.addEventListener('click', () => {
    location.reload();
  });

  // 초기화 시 차트 렌더
  updateTable();
  updateStats();
</script>
</body>
</html>
