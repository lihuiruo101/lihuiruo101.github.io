<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>디스코드 라이센스 인증</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap');

    body {
      background-color: #f5f7fa;
      font-family: 'Nanum Gothic', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .form-container {
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      width: 400px;
    }

    h2 {
      text-align: center;
      color: #005bac;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #fafafa;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background-color: #005bac;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #004080;
    }

    .message {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #c10000;
    }

    hr {
      margin: 30px 0;
      border: none;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>로그인</h2>
    <input type="text" id="loginId" placeholder="아이디를 입력해 주세요">
    <input type="password" id="loginPw" placeholder="비밀번호를 입력해 주세요">
    <input type="text" id="loginKey" placeholder="라이센스 키를 입력해 주세요">
    <button onclick="handleLogin()">로그인하기</button>
    <div id="loginMessage" class="message"></div>

    <hr>

    <h2>회원가입</h2>
    <input type="text" id="discordId" placeholder="디스코드 ID를 입력해 주세요">
    <input type="text" id="newId" placeholder="아이디를 입력해 주세요">
    <input type="password" id="newPw" placeholder="비밀번호를 입력해 주세요">
    <button onclick="handleRegister()">회원가입하기</button>
    <div id="registerMessage" class="message"></div>
  </div>

  <script>
    const 관리자목록 = ['111111111', '222222222']; // 생성자/관리자 디스코드 ID
    const 라이센스목록 = ['ABC-123-DEF', 'XYZ-789-GHI']; // 등록된 라이센스 키

    function containsSpecialChar(str) {
      return /[!@#$%^&*(),.?":{}|<>]/.test(str);
    }

    function handleRegister() {
      const discordId = document.getElementById('discordId').value.trim();
      const newId = document.getElementById('newId').value.trim();
      const newPw = document.getElementById('newPw').value;

      const msgBox = document.getElementById('registerMessage');

      if (!관리자목록.includes(discordId)) {
        msgBox.innerText = '관리자 또는 생성자만 회원가입을 할 수 있습니다.';
        return;
      }

      if (newPw.length < 7 || !containsSpecialChar(newPw)) {
        msgBox.innerText = '비밀번호는 7자 이상이며 특수문자를 포함해야 합니다.';
        return;
      }

      const user = { id: newId, pw: newPw };
      localStorage.setItem('user_' + newId, JSON.stringify(user));
      msgBox.style.color = '#005bac';
      msgBox.innerText = '회원가입이 완료되었습니다. 로그인해 주세요.';
    }

    function handleLogin() {
      const loginId = document.getElementById('loginId').value.trim();
      const loginPw = document.getElementById('loginPw').value;
      const loginKey = document.getElementById('loginKey').value.trim();

      const msgBox = document.getElementById('loginMessage');
      const userData = localStorage.getItem('user_' + loginId);

      if (!userData) {
        msgBox.innerText = '등록된 사용자가 아닙니다.';
        return;
      }

      const user = JSON.parse(userData);

      if (user.pw !== loginPw) {
        msgBox.innerText = '비밀번호가 일치하지 않습니다.';
        return;
      }

      if (!라이센스목록.includes(loginKey)) {
        msgBox.innerText = '라이센스 키가 유효하지 않습니다.';
        return;
      }

      localStorage.setItem('isLoggedIn', 'true');
      msgBox.style.color = '#005bac';
      msgBox.innerText = '로그인에 성공하였습니다.';
    }
  </script>
</body>
</html>
