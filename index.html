<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스나이퍼 공식 사이트 | YWE</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      color: #fff;
    }
    header {
      background-color: #111;
      padding: 10px 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #39ff14;
      text-shadow: 0 0 5px #39ff14;
    }
    #app {
      display: flex;
    }
    nav {
      width: 220px;
      background: #1c1c1c;
      padding: 20px;
      border-right: 1px solid #444;
    }
    nav button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #111;
      color: #39ff14;
      border: 1px solid #39ff14;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    nav button:hover {
      background: #39ff14;
      color: #000;
    }
    main {
      flex: 1;
      padding: 20px;
    }
    .hidden { display: none; }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #222;
      border: 1px solid #555;
      color: #fff;
    }
    button {
      padding: 10px 20px;
      background: #39ff14;
      color: #000;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    h2, h3 {
      color: #39ff14;
      text-shadow: 0 0 3px #39ff14;
    }
    .admin-only {
      color: #ff4444;
      font-weight: bold;
    }
    ul { list-style: none; padding: 0; }
    li {
      margin-bottom: 15px;
      padding: 10px;
      background: #222;
      border-left: 4px solid #39ff14;
    }
    .message {
      padding: 10px;
      margin-top: 10px;
    }
    .success {
      color: #0f0;
    }
    .error {
      color: #f55;
    }
  </style>
</head>
<body>
  <header>스나이퍼 공식 사이트 | YWE</header>
  <div id="app">
    <nav id="sidebar" class="hidden"></nav>
    <main id="main"></main>
  </div>

  <script>
    let currentUser = null;
    let ipAddress = '';

    const admins = ['lihuiruo101'];
    const state = { page: 'login', message: '' };

    const users = JSON.parse(localStorage.getItem('users') || '{}');
    const faqs = JSON.parse(localStorage.getItem('faqs') || '[]');
    const snipers = JSON.parse(localStorage.getItem('snipers') || '[]');

    async function fetchIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        ipAddress = data.ip;
      } catch (e) {
        ipAddress = '알 수 없음';
      }
    }

    function saveUsers() {
      localStorage.setItem('users', JSON.stringify(users));
    }
    function saveFaqs() {
      localStorage.setItem('faqs', JSON.stringify(faqs));
    }
    function saveSnipers() {
      localStorage.setItem('snipers', JSON.stringify(snipers));
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (!currentUser) {
        sidebar.classList.add('hidden');
        return;
      }
      sidebar.classList.remove('hidden');
      sidebar.innerHTML = `
        <button onclick="navigate('home')">홈</button>
        <button onclick="navigate('faq')">FAQ</button>
        <button onclick="navigate('sniper')">스나이퍼</button>
        ${admins.includes(currentUser) ? `
          <button onclick="navigate('admin')">관리자 메뉴</button>
        ` : ''}
        <button onclick="logout()">로그아웃</button>
      `;
    }

    function navigate(page) {
      state.page = page;
      render();
    }

    function logout() {
      currentUser = null;
      renderSidebar();
      navigate('login');
    }

    function render() {
      const main = document.getElementById('main');
      if (state.page === 'login') {
        main.innerHTML = `
          <h2>로그인</h2>
          <input id="login-id" placeholder="아이디" />
          <input id="login-pw" type="password" placeholder="비밀번호" />
          <button onclick="login()">로그인</button>
          <button onclick="navigate('signup')">회원가입</button>
          <div class="message">${state.message}</div>
        `;
      } else if (state.page === 'signup') {
        main.innerHTML = `
          <h2>회원가입</h2>
          <input id="signup-id" placeholder="아이디" />
          <input id="signup-pw" type="password" placeholder="비밀번호" />
          <button onclick="signup()">가입하기</button>
          <button onclick="navigate('login')">뒤로</button>
          <div class="message">${state.message}</div>
        `;
      } else if (state.page === 'home') {
        main.innerHTML = `
          <h2>홈</h2>
          <p>안녕하세요, <strong>${currentUser}</strong>님!</p>
          <p>당신의 IP 주소는 <code>${ipAddress}</code>입니다.</p>
        `;
      } else if (state.page === 'faq') {
        main.innerHTML = `
          <h2>FAQ</h2>
          ${admins.includes(currentUser) ? '<button onclick="navigate(\'addFaq\')">FAQ 추가</button>' : ''}
          <ul>${faqs.map(f => `<li><strong>${f.q}</strong><br>${f.a}</li>`).join('')}</ul>
        `;
      } else if (state.page === 'sniper') {
        main.innerHTML = `
          <h2>스나이퍼 게시판</h2>
          ${admins.includes(currentUser) ? '<button onclick="navigate(\'addSniper\')">스나이퍼 추가</button>' : ''}
          <ul>${snipers.map(s => `<li><strong>${s.title}</strong><br>${s.desc}</li>`).join('')}</ul>
        `;
      } else if (state.page === 'addFaq') {
        main.innerHTML = `
          <h2>FAQ 추가</h2>
          <input id="faq-q" placeholder="질문" />
          <textarea id="faq-a" placeholder="답변"></textarea>
          <button onclick="addFaq()">등록</button>
          <button onclick="navigate('faq')">취소</button>
        `;
      } else if (state.page === 'addSniper') {
        main.innerHTML = `
          <h2>스나이퍼 추가</h2>
          <input id="sniper-title" placeholder="제목" />
          <textarea id="sniper-desc" placeholder="설명"></textarea>
          <button onclick="addSniper()">등록</button>
          <button onclick="navigate('sniper')">취소</button>
        `;
      } else if (state.page === 'admin') {
        main.innerHTML = `
          <h2 class="admin-only">관리자 메뉴</h2>
          <p><strong>현재 사용자:</strong> ${currentUser}</p>
          <p><strong>IP 주소:</strong> ${ipAddress}</p>
          <input id="add-admin-id" placeholder="관리자로 추가할 ID" />
          <button onclick="addAdmin()">관리자 권한 부여</button>
        `;
      }
    }

    function login() {
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value;
      if (!users[id] || users[id].pw !== pw) {
        state.message = '아이디 또는 비밀번호가 틀렸습니다.';
        render();
        return;
      }
      currentUser = id;
      renderSidebar();
      navigate('home');
    }

    function signup() {
      const id = document.getElementById('signup-id').value.trim();
      const pw = document.getElementById('signup-pw').value;
      if (users[id]) {
        state.message = '이미 존재하는 아이디입니다.';
        render();
        return;
      }
      users[id] = { pw };
      saveUsers();
      state.message = '회원가입 성공! 로그인 해주세요.';
      navigate('login');
    }

    function addFaq() {
      const q = document.getElementById('faq-q').value;
      const a = document.getElementById('faq-a').value;
      if (q && a) {
        faqs.push({ q, a });
        saveFaqs();
        navigate('faq');
      }
    }

    function addSniper() {
      const title = document.getElementById('sniper-title').value;
      const desc = document.getElementById('sniper-desc').value;
      if (title && desc) {
        snipers.push({ title, desc });
        saveSnipers();
        navigate('sniper');
      }
    }

    function addAdmin() {
      const newId = document.getElementById('add-admin-id').value.trim();
      if (newId && !admins.includes(newId)) {
        admins.push(newId);
        alert(`${newId}님에게 관리자 권한이 부여되었습니다.`);
      }
    }

    // 초기 실행
    fetchIP().then(render);
  </script>
</body>
</html>
