<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YWE | 스나이핑 - 통합관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Nanum+Gothic&display=swap');

  :root {
    --primary: #1e90ff;
    --accent: #f44336;
    --bg: #121212;
    --text-light: #eee;
    --radius: 8px;
  }

  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: var(--text-light);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  nav {
    width: 260px;
    background: rgba(20, 20, 20, 0.95);
    border-right: 3px solid var(--primary);
    display: flex;
    flex-direction: column;
    padding: 2rem 1rem;
    user-select: none;
  }

  nav h1 {
    font-family: 'Orbitron', sans-serif;
    color: var(--primary);
    font-weight: 700;
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  nav button {
    background: none;
    border: none;
    color: #bbb;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 1rem 1.5rem;
    text-align: left;
    cursor: pointer;
    margin-bottom: 0.3rem;
    border-radius: var(--radius);
    transition: background 0.3s ease, color 0.3s ease;
  }

  nav button:hover,
  nav button.active {
    background: var(--primary);
    color: #121212;
  }

  nav button#logout-btn {
    margin-top: auto;
    border-top: 1px solid #555;
    color: var(--accent);
  }

  nav button#logout-btn:hover {
    background: var(--accent);
    color: white;
  }

  main {
    flex: 1;
    background: var(--bg);
    overflow-y: auto;
    padding: 2rem 3rem;
  }

  section {
    max-width: 700px;
    margin: auto;
    background: rgba(30,30,30,0.85);
    border-radius: var(--radius);
    padding: 2rem 2.5rem;
    box-shadow: 0 0 20px var(--primary);
  }

  h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    margin-bottom: 1.2rem;
    color: var(--primary);
    text-align: center;
  }

  input, textarea, button {
    font-family: 'Nanum Gothic', sans-serif;
  }

  input[type=text], input[type=password], textarea {
    width: 100%;
    background: #121212;
    border: none;
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1.2rem;
    color: var(--text-light);
    font-size: 1.05rem;
    resize: vertical;
  }

  button.submit-btn {
    background: var(--primary);
    border: none;
    border-radius: var(--radius);
    padding: 1.2rem;
    font-size: 1.25rem;
    font-weight: 800;
    color: #121212;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  button.submit-btn:hover {
    background: #0a7fff;
  }

  .password-toggle {
    position: absolute;
    top: 50%;
    right: 1rem;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    cursor: pointer;
    stroke: #888;
    fill: none;
    stroke-width: 2;
    transition: stroke 0.3s ease;
  }

  .password-toggle.crossed {
    stroke: var(--primary);
  }

  .password-wrapper {
    position: relative;
    width: 100%;
  }

  .hidden {
    display: none !important;
  }

  ul#ip-log-list {
    list-style: none;
    padding-left: 0;
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid var(--primary);
    border-radius: var(--radius);
    background: rgba(20,20,20,0.9);
    color: #ddeeff;
    font-family: monospace;
    font-size: 0.9rem;
  }

  ul#ip-log-list li {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--primary);
  }

  ul#ip-log-list li:last-child {
    border-bottom: none;
  }

  .post-list {
    max-height: 350px;
    overflow-y: auto;
    border: 1px solid var(--primary);
    border-radius: var(--radius);
    background: #121212;
    padding: 1rem;
    color: var(--text-light);
  }

  .post-item {
    border-bottom: 1px solid var(--primary);
    padding: 0.7rem 0;
    position: relative;
  }

  .post-item:last-child {
    border-bottom: none;
  }

  .post-item strong {
    color: var(--primary);
  }

  .post-item button.delete-btn {
    position: absolute;
    right: 0;
    top: 0.7rem;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    padding: 0.15rem 0.5rem;
    cursor: pointer;
    font-size: 0.85rem;
  }

  .post-item button.delete-btn:hover {
    background: #d32f2f;
  }

  /* 반응형 */
  @media (max-width: 900px) {
    body {
      flex-direction: column;
    }
    nav {
      width: 100%;
      flex-direction: row;
      border-right: none;
      border-bottom: 3px solid var(--primary);
      padding: 0.8rem 0;
      overflow-x: auto;
    }
    nav h1 {
      display: none;
    }
    nav button {
      flex: 1;
      font-size: 0.9rem;
      padding: 1rem 0.6rem;
      text-align: center;
      white-space: nowrap;
      margin-bottom: 0;
    }
    main {
      padding: 1rem 1.5rem;
      height: calc(100vh - 60px);
    }
    section {
      max-width: 100%;
      padding: 1.5rem 1rem;
    }
  }
</style>
</head>
<body>
<nav>
  <h1>YWE | 스나이핑</h1>
  <button id="nav-login" class="active">로그인</button>
  <button id="nav-register">회원가입</button>
  <button id="nav-faq" class="hidden">FAQ</button>
  <button id="nav-expose" class="hidden">박제</button>
  <button id="nav-report" class="hidden">제보</button>
  <button id="nav-admin" class="hidden">관리자</button>
  <button id="logout-btn" class="hidden">로그아웃</button>
</nav>
<main>
  <!-- 로그인 -->
  <section id="section-login">
    <h2>로그인</h2>
    <form id="form-login">
      <label for="login-id">아이디</label>
      <input type="text" id="login-id" autocomplete="username" required />
      <label for="login-pw">비밀번호</label>
      <div class="password-wrapper">
        <input type="password" id="login-pw" autocomplete="current-password" required />
        <svg id="toggle-login-pw" class="password-toggle" tabindex="0" role="button" aria-label="비밀번호 보기 토글" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
          <line x1="4" y1="4" x2="20" y2="20" stroke-width="2" stroke="#888" />
        </svg>
      </div>
      <button type="submit" class="submit-btn">로그인</button>
    </form>
    <div class="toggle-auth" id="toggle-to-register" style="margin-top: 1rem; text-align:center; cursor:pointer; color:#aad4ff;">계정이 없으신가요? 회원가입</div>
  </section>

  <!-- 회원가입 -->
  <section id="section-register" class="hidden">
    <h2>회원가입</h2>
    <form id="form-register">
      <label for="register-id">아이디</label>
      <input type="text" id="register-id" autocomplete="username" required />
      <label for="register-pw">비밀번호</label>
      <div class="password-wrapper">
        <input type="password" id="register-pw" autocomplete="new-password" required />
        <svg id="toggle-register-pw" class="password-toggle" tabindex="0" role="button" aria-label="비밀번호 보기 토글" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
          <line x1="4" y1="4" x2="20" y2="20" stroke-width="2" stroke="#888" />
        </svg>
      </div>
      <button type="submit" class="submit-btn">회원가입</button>
    </form>
    <div class="toggle-auth" id="toggle-to-login" style="margin-top: 1rem; text-align:center; cursor:pointer; color:#aad4ff;">이미 계정이 있으신가요? 로그인</div>
  </section>

  <!-- FAQ -->
  <section id="section-faq" class="hidden">
    <h2>자주 묻는 질문 (FAQ)</h2>
    <div id="faq-list" class="post-list"></div>
    <form id="form-faq" class="hidden" style="margin-top: 1.5rem;">
      <label for="faq-title">제목</label>
      <input type="text" id="faq-title" />
      <label for="faq-content">내용 (마크다운 가능)</label>
      <textarea id="faq-content"></textarea>
      <button type="submit" class="submit-btn">등록</button>
    </form>
  </section>

  <!-- 박제 -->
  <section id="section-expose" class="hidden">
    <h2>사기꾼 박제</h2>
    <div id="expose-list" class="post-list"></div>
    <form id="form-expose" class="hidden" style="margin-top: 1.5rem;">
      <label for="expose-title">제목</label>
      <input type="text" id="expose-title" />
      <label for="expose-content">내용 (마크다운 가능)</label>
      <textarea id="expose-content"></textarea>
      <button type="submit" class="submit-btn">등록</button>
    </form>
  </section>

  <!-- 제보 -->
  <section id="section-report" class="hidden">
    <h2>제보 요청</h2>
    <form id="form-report" style="margin-top: 1rem;">
      <label for="report-title">제목</label>
      <input type="text" id="report-title" required />
      <label for="report-content">설명</label>
      <textarea id="report-content" rows="5" required></textarea>
      <button type="submit" class="submit-btn">제보</button>
    </form>
  </section>

  <!-- 관리자 -->
  <section id="section-admin" class="hidden">
    <h2>관리자 메뉴</h2>
    <div id="admin-ip-log" style="margin-top: 1rem;">
      <h3>접속 사용자 정보 (IP / ID / 시간)</h3>
      <ul id="ip-log-list"></ul>
    </div>
    <div style="margin-top: 1.5rem;">
      <h3>FAQ 관리</h3>
      <div id="admin-faq-list" class="post-list"></div>
    </div>
    <div style="margin-top: 1.5rem;">
      <h3>박제 관리</h3>
      <div id="admin-expose-list" class="post-list"></div>
    </div>
    <form id="form-admin-add" style="margin-top: 2rem;">
      <label for="new-admin-id">관리자 아이디 추가</label>
      <input type="text" id="new-admin-id" />
      <button type="submit" class="submit-btn">추가</button>
    </form>
  </section>
</main>

<script>
(() => {
  const users = {}; // { id: { password } }
  const adminIds = new Set(['admin']); // 초기 관리자 아이디
  const faqPosts = []; // { id, title, content }
  const exposePosts = []; // { id, title, content }
  const reportPosts = []; // { id, title, content }
  const ipLog = []; // { ip, id, time }
  let currentUser = null;

  // DOM Elements
  const navLoginBtn = document.getElementById('nav-login');
  const navRegisterBtn = document.getElementById('nav-register');
  const navFaqBtn = document.getElementById('nav-faq');
  const navExposeBtn = document.getElementById('nav-expose');
  const navReportBtn = document.getElementById('nav-report');
  const navAdminBtn = document.getElementById('nav-admin');
  const logoutBtn = document.getElementById('logout-btn');

  const sectionLogin = document.getElementById('section-login');
  const sectionRegister = document.getElementById('section-register');
  const sectionFaq = document.getElementById('section-faq');
  const sectionExpose = document.getElementById('section-expose');
  const sectionReport = document.getElementById('section-report');
  const sectionAdmin = document.getElementById('section-admin');

  const formLogin = document.getElementById('form-login');
  const formRegister = document.getElementById('form-register');
  const formFaq = document.getElementById('form-faq');
  const formExpose = document.getElementById('form-expose');
  const formReport = document.getElementById('form-report');
  const formAdminAdd = document.getElementById('form-admin-add');

  const faqList = document.getElementById('faq-list');
  const exposeList = document.getElementById('expose-list');
  const adminFaqList = document.getElementById('admin-faq-list');
  const adminExposeList = document.getElementById('admin-expose-list');
  const ipLogList = document.getElementById('ip-log-list');

  // 비밀번호 보기 토글
  function togglePasswordVisibility(toggleBtn, input) {
    toggleBtn.addEventListener('click', () => {
      if (input.type === 'password') {
        input.type = 'text';
        toggleBtn.classList.add('crossed');
      } else {
        input.type = 'password';
        toggleBtn.classList.remove('crossed');
      }
    });
  }

  togglePasswordVisibility(document.getElementById('toggle-login-pw'), document.getElementById('login-pw'));
  togglePasswordVisibility(document.getElementById('toggle-register-pw'), document.getElementById('register-pw'));

  // 화면 전환 함수
  function showSection(targetSection) {
    [sectionLogin, sectionRegister, sectionFaq, sectionExpose, sectionReport, sectionAdmin].forEach(sec => {
      sec.classList.add('hidden');
    });
    targetSection.classList.remove('hidden');

    // 네비게이션 버튼 활성화 토글
    [navLoginBtn, navRegisterBtn, navFaqBtn, navExposeBtn, navReportBtn, navAdminBtn].forEach(btn => {
      btn.classList.remove('active');
    });

    if (targetSection === sectionLogin) navLoginBtn.classList.add('active');
    else if (targetSection === sectionRegister) navRegisterBtn.classList.add('active');
    else if (targetSection === sectionFaq) navFaqBtn.classList.add('active');
    else if (targetSection === sectionExpose) navExposeBtn.classList.add('active');
    else if (targetSection === sectionReport) navReportBtn.classList.add('active');
    else if (targetSection === sectionAdmin) navAdminBtn.classList.add('active');
  }

  navLoginBtn.addEventListener('click', () => showSection(sectionLogin));
  navRegisterBtn.addEventListener('click', () => showSection(sectionRegister));
  navFaqBtn.addEventListener('click', () => showSection(sectionFaq));
  navExposeBtn.addEventListener('click', () => showSection(sectionExpose));
  navReportBtn.addEventListener('click', () => showSection(sectionReport));
  navAdminBtn.addEventListener('click', () => showSection(sectionAdmin));

  // 토글 텍스트 클릭 (로그인 <-> 회원가입)
  document.getElementById('toggle-to-register').addEventListener('click', () => showSection(sectionRegister));
  document.getElementById('toggle-to-login').addEventListener('click', () => showSection(sectionLogin));

  // 로그아웃
  logoutBtn.addEventListener('click', () => {
    currentUser = null;
    updateUI();
    alert('로그아웃 되었습니다.');
    showSection(sectionLogin);
  });

  // UI 업데이트 (네비게이션, 버튼 등)
  function updateUI() {
    if (currentUser) {
      navFaqBtn.classList.remove('hidden');
      navExposeBtn.classList.remove('hidden');
      navReportBtn.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
      navLoginBtn.classList.add('hidden');
      navRegisterBtn.classList.add('hidden');

      if (adminIds.has(currentUser)) {
        navAdminBtn.classList.remove('hidden');
      } else {
        navAdminBtn.classList.add('hidden');
      }
    } else {
      navFaqBtn.classList.add('hidden');
      navExposeBtn.classList.add('hidden');
      navReportBtn.classList.add('hidden');
      navAdminBtn.classList.add('hidden');
      logoutBtn.classList.add('hidden');
      navLoginBtn.classList.remove('hidden');
      navRegisterBtn.classList.remove('hidden');
    }
  }

  // IP 가져오기 함수 (ipify API 사용)
  async function getClientIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip || '알 수 없음';
    } catch {
      return '알 수 없음';
    }
  }

  // 로그인 처리
  formLogin.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('login-id').value.trim();
    const pw = document.getElementById('login-pw').value;

    if (!users[id] || users[id].password !== pw) {
      alert('아이디 또는 비밀번호가 올바르지 않습니다.');
      return;
    }

    currentUser = id;

    // 접속 IP 기록
    const ip = await getClientIP();
    const now = new Date().toLocaleString();
    ipLog.push({ ip, id, time: now });

    updateIPLogUI();
    updateUI();
    showSection(sectionFaq);
  });

  // 회원가입 처리
  formRegister.addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('register-id').value.trim();
    const pw = document.getElementById('register-pw').value;

    if (users[id]) {
      alert('이미 존재하는 아이디입니다.');
      return;
    }

    users[id] = { password: pw };
    alert('회원가입 완료! 로그인 해주세요.');
    showSection(sectionLogin);
  });

  // FAQ UI 업데이트
  function updateFAQUI() {
    faqList.innerHTML = '';
    faqPosts.forEach((post, idx) => {
      const el = document.createElement('div');
      el.classList.add('post-item');
      el.innerHTML = `<strong>${post.title}</strong><p>${post.content}</p>`;
      faqList.appendChild(el);
    });

    // 관리자용
    if (adminIds.has(currentUser)) {
      adminFaqList.innerHTML = '';
      faqPosts.forEach((post, idx) => {
        const el = document.createElement('div');
        el.classList.add('post-item');
        el.innerHTML = `<strong>${post.title}</strong>
          <button class="delete-btn" data-type="faq" data-idx="${idx}">삭제</button>`;
        adminFaqList.appendChild(el);
      });
    }
  }

  // 박제 UI 업데이트
  function updateExposeUI() {
    exposeList.innerHTML = '';
    exposePosts.forEach((post, idx) => {
      const el = document.createElement('div');
      el.classList.add('post-item');
      el.innerHTML = `<strong>${post.title}</strong><p>${post.content}</p>`;
      exposeList.appendChild(el);
    });

    if (adminIds.has(currentUser)) {
      adminExposeList.innerHTML = '';
      exposePosts.forEach((post, idx) => {
        const el = document.createElement('div');
        el.classList.add('post-item');
        el.innerHTML = `<strong>${post.title}</strong>
          <button class="delete-btn" data-type="expose" data-idx="${idx}">삭제</button>`;
        adminExposeList.appendChild(el);
      });
    }
  }

  // IP 로그 UI 업데이트
  function updateIPLogUI() {
    ipLogList.innerHTML = '';
    ipLog.slice().reverse().forEach(({ ip, id, time }) => {
      const li = document.createElement('li');
      li.textContent = `[${time}] IP: ${ip} / ID: ${id}`;
      ipLogList.appendChild(li);
    });
  }

  // FAQ 등록 (관리자 전용)
  formFaq.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!adminIds.has(currentUser)) return alert('관리자만 작성 가능합니다.');
    const title = document.getElementById('faq-title').value.trim();
    const content = document.getElementById('faq-content').value.trim();
    if (!title || !content) return alert('제목과 내용을 입력하세요.');

    faqPosts.push({ title, content });
    document.getElementById('faq-title').value = '';
    document.getElementById('faq-content').value = '';
    updateFAQUI();
  });

  // 박제 등록 (관리자 전용)
  formExpose.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!adminIds.has(currentUser)) return alert('관리자만 작성 가능합니다.');
    const title = document.getElementById('expose-title').value.trim();
    const content = document.getElementById('expose-content').value.trim();
    if (!title || !content) return alert('제목과 내용을 입력하세요.');

    exposePosts.push({ title, content });
    document.getElementById('expose-title').value = '';
    document.getElementById('expose-content').value = '';
    updateExposeUI();
  });

  // 제보 등록 (모든 회원)
  formReport.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!currentUser) return alert('로그인 후 이용해주세요.');
    const title = document.getElementById('report-title').value.trim();
    const content = document.getElementById('report-content').value.trim();
    if (!title || !content) return alert('제목과 설명을 입력하세요.');

    reportPosts.push({ id: currentUser, title, content });
    alert('제보가 접수되었습니다.');
    formReport.reset();
  });

  // 관리자 아이디 추가
  formAdminAdd.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!adminIds.has(currentUser)) return alert('관리자만 이용 가능합니다.');
    const newAdminId = document.getElementById('new-admin-id').value.trim();
    if (!newAdminId) return alert('아이디를 입력하세요.');
    if (!users[newAdminId]) return alert('존재하지 않는 사용자입니다.');

    adminIds.add(newAdminId);
    alert(`${newAdminId} 님이 관리자 권한을 부여받았습니다.`);
    document.getElementById('new-admin-id').value = '';
    updateUI();
  });

  // 삭제 버튼 이벤트 (FAQ, 박제)
  function handleDeleteClick(e) {
    if (!e.target.classList.contains('delete-btn')) return;
    const type = e.target.dataset.type;
    const idx = Number(e.target.dataset.idx);
    if (!adminIds.has(currentUser)) return alert('관리자만 삭제할 수 있습니다.');

    if (type === 'faq') {
      faqPosts.splice(idx, 1);
      updateFAQUI();
    } else if (type === 'expose') {
      exposePosts.splice(idx, 1);
      updateExposeUI();
    }
  }

  adminFaqList.addEventListener('click', handleDeleteClick);
  adminExposeList.addEventListener('click', handleDeleteClick);

  // 초기 UI 셋업
