<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YWE 스나이퍼 공식 사이트</title>
<style>
  /* Reset & 기본 네온 스타일 */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #001122, #003355);
    color: #00ffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 30px;
    overflow-y: auto;
  }
  h1 {
    font-size: 3.2rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px #00ffffcc;
    letter-spacing: 0.15em;
    user-select: none;
  }
  .container {
    background: #012233dd;
    padding: 50px 60px;
    border-radius: 25px;
    box-shadow: 0 0 40px #00ffffaa;
    width: 100%;
    max-width: 480px;
  }
  input[type=text], input[type=password], input[type=email], input[type=number] {
    width: 100%;
    padding: 16px 20px;
    margin: 18px 0;
    border-radius: 14px;
    border: 2.5px solid #00ffffcc;
    background: #001122;
    color: #00ffff;
    font-size: 1.25rem;
    font-weight: 600;
    box-shadow: inset 0 0 15px #00ffff88;
    transition: 0.4s;
    user-select: text;
  }
  input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, input[type=number]:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 35px #00ffffcc;
    background: #003355;
  }
  button {
    width: 100%;
    padding: 18px 0;
    margin-top: 20px;
    border-radius: 16px;
    border: none;
    background: #00ffff;
    color: #003344;
    font-size: 1.4rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 0 35px #00ffffbb;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
  }
  button:hover:not(:disabled) {
    background: #00e6cc;
    box-shadow: 0 0 45px #00e6ccff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }
  .link-button {
    margin-top: 12px;
    color: #00ffffcc;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .link-button:hover {
    color: #00ffff;
    text-decoration: underline;
  }
  .message {
    margin-top: 10px;
    font-weight: 700;
    min-height: 1.4em;
  }
  .error {
    color: #ff5555;
    text-shadow: 0 0 8px #ff5555cc;
  }
  .success {
    color: #55ff55;
    text-shadow: 0 0 8px #55ff55cc;
  }
  /* 관리자 제보 리스트 */
  #report-list {
    max-height: 300px;
    overflow-y: auto;
    margin-top: 20px;
    border: 2px solid #00ffffaa;
    border-radius: 12px;
    padding: 10px;
    background: #003344dd;
  }
  #report-list h2 {
    text-align: center;
    margin-bottom: 10px;
    font-weight: 900;
    letter-spacing: 0.1em;
  }
  #report-list ul {
    list-style: none;
  }
  #report-list li {
    padding: 8px 12px;
    margin-bottom: 8px;
    background: #004466cc;
    border-radius: 8px;
    font-size: 1rem;
    word-break: break-word;
  }
</style>
</head>
<body>

<h1>YWE 스나이퍼 공식 사이트</h1>

<div class="container" id="app">

  <!-- 여기에 JS가 UI를 동적으로 그립니다 -->

</div>

<script>
'use strict';

// 서버 API 기본 URL (실제 서버 주소로 변경해야 함)
const API_BASE = 'https://your-server.com/api';

// 현재 로그인된 사용자 아이디
let currentUserId = null;

// 로컬 저장소 키
const USERS_KEY = 'ywe_users';       // 회원정보 저장 (id => { pw, email, ip, verified })
const REPORTS_KEY = 'ywe_reports';   // 제보 리스트 저장 [{ id, userId, content, date }]
const EMAIL_CODES_KEY = 'ywe_email_codes'; // 인증번호 임시 저장 (id => code, purpose)

// 관리자 ID (최고 관리자)
const ADMIN_ID = 'lihuiruo101';

// Helper: HTML escape
function escapeHtml(text) {
  return text.replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[m]);
}

// Helper: 로컬스토리지에서 사용자 리스트 불러오기
function loadUsers() {
  return JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
}
// Helper: 저장하기
function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

// Helper: 제보 리스트 불러오기
function loadReports() {
  return JSON.parse(localStorage.getItem(REPORTS_KEY) || '[]');
}
function saveReports(reports) {
  localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));
}

// Helper: 이메일 인증번호 임시 저장 불러오기
function loadEmailCodes() {
  return JSON.parse(localStorage.getItem(EMAIL_CODES_KEY) || '{}');
}
function saveEmailCodes(codes) {
  localStorage.setItem(EMAIL_CODES_KEY, JSON.stringify(codes));
}

// Helper: IP 자동 수집 (외부 API 호출)
async function fetchIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    if (!res.ok) throw new Error('Failed to fetch IP');
    const data = await res.json();
    return data.ip || '알 수 없음';
  } catch {
    return '알 수 없음';
  }
}

// Helper: 이메일 형식 검사
function isValidEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(email);
}

// UI 렌더링

const app = document.getElementById('app');

// 현재 표시 중인 화면 상태
let state = {
  page: 'login', // login, signup, emailVerify, main, findPw, resetPw, report
  tempUserId: null, // 임시 사용자 ID (가입중, 인증중 등)
  tempEmail: null,
  emailCodePurpose: null, // 'verify' or 'reset'
  emailVerified: false,
  findPwUserId: null,
  findPwVerified: false,
  messages: { error: '', success: '' },
};

// 메시지 세팅 함수
function setMessage(type, text) {
  state.messages.error = '';
  state.messages.success = '';
  if (type === 'error') state.messages.error = text;
  if (type === 'success') state.messages.success = text;
  render();
}

// 초기 화면 렌더
render();

async function render() {
  app.innerHTML = ''; // 초기화
  clearMessages();

  switch (state.page) {
    case 'login':
      renderLogin();
      break;
    case 'signup':
      renderSignup();
      break;
    case 'emailVerify':
      renderEmailVerify();
      break;
    case 'main':
      renderMain();
      break;
    case 'findPw':
      renderFindPw();
      break;
    case 'resetPw':
      renderResetPw();
      break;
    case 'report':
      renderReport();
      break;
    case 'adminReports':
      renderAdminReports();
      break;
  }
}

function clearMessages() {
  state.messages.error = '';
  state.messages.success = '';
}

// --- 로그인 화면 ---
function renderLogin() {
  app.innerHTML = `
    <label for="login-id">아이디</label>
    <input type="text" id="login-id" placeholder="아이디 입력" autocomplete="username" />
    <label for="login-pw">비밀번호</label>
    <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password" />
    <button id="login-btn">로그인</button>
    <button id="go-signup-btn" class="link-button">회원가입 하러 가기</button>
    <button id="go-findpw-btn" class="link-button">비밀번호 찾기</button>
    <div class="message error" id="login-error"></div>
  `;

  document.getElementById('login-btn').onclick = loginHandler;
  document.getElementById('go-signup-btn').onclick = () => {
    state.page = 'signup';
    setMessage('', '');
    render();
  };
  document.getElementById('go-findpw-btn').onclick = () => {
    state.page = 'findPw';
    setMessage('', '');
    render();
  };
}

function loginHandler() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  if (!id || !pw) return setMessage('error', '아이디와 비밀번호를 모두 입력해 주세요.');

  const users = loadUsers();
  if (!users[id]) return setMessage('error', '등록되지 않은 아이디입니다.');
  if (users[id].pw !== pw) return setMessage('error', '비밀번호가 틀렸습니다.');
  if (!users[id].verified) return setMessage('error', '이메일 인증을 완료해야 로그인할 수 있습니다.');

  currentUserId = id;
  state.page = 'main';
  setMessage('success', `환영합니다, ${escapeHtml(id)}님!`);
  render();
}

// --- 회원가입 화면 ---
function renderSignup() {
  app.innerHTML = `
    <label for="signup-id">사용할 아이디</label>
    <input type="text" id="signup-id" placeholder="아이디 입력" autocomplete="username" />
    <label for="signup-pw">비밀번호</label>
    <input type="password" id="signup-pw" placeholder="비밀번호 입력" autocomplete="new-password" />
    <label for="signup-pw2">비밀번호 확인</label>
    <input type="password" id="signup-pw2" placeholder="비밀번호 다시 입력" autocomplete="new-password" />
    <label for="signup-email">이메일</label>
    <input type="email" id="signup-email" placeholder="이메일 입력" autocomplete="email" />
    <button id="signup-btn">회원가입</button>
    <button id="go-login-btn" class="link-button">로그인 하러 가기</button>
    <div class="message error" id="signup-error"></div>
    <div class="message success" id="signup-success"></div>
  `;

  document.getElementById('signup-btn').onclick = signupHandler;
  document.getElementById('go-login-btn').onclick = () => {
    state.page = 'login';
    setMessage('', '');
    render();
  };
}

async function signupHandler() {
  const id = document.getElementById('signup-id').value.trim();
  const pw = document.getElementById('signup-pw').value.trim();
  const pw2 = document.getElementById('signup-pw2').value.trim();
  const email = document.getElementById('signup-email').value.trim();

  if (!id || !pw || !pw2 || !email) return setMessage('error', '모든 항목을 입력해 주세요.');
  if (pw !== pw2) return setMessage('error', '비밀번호가 서로 다릅니다.');
  if (!isValidEmail(email)) return setMessage('error', '올바른 이메일 주소를 입력해 주세요.');

  let users = loadUsers();
  if (users[id]) return setMessage('error', '이미 존재하는 아이디입니다.');

  // IP 자동 수집
  const ip = await fetchIP();

  // 사용자 등록 (verified=false)
  users[id] = {
    pw,
    email,
    ip,
    verified: false,
  };
  saveUsers(users);

  // 이메일 인증번호 발송
  try {
    await sendEmailCode(id, email, 'verify');
    state.tempUserId = id;
    state.tempEmail = email;
    state.emailCodePurpose = 'verify';
    state.page = 'emailVerify';
    setMessage('success', '인증번호를 이메일로 발송했습니다. 메일을 확인해주세요.');
    render();
  } catch (e) {
    delete users[id];
    saveUsers(users);
    setMessage('error', '이메일 발송에 실패했습니다. 잠시 후 다시 시도하세요.');
  }
}

// --- 이메일 인증 화면 ---
function renderEmailVerify() {
  app.innerHTML = `
    <p>${escapeHtml(state.tempUserId)} 님, 이메일 인증이 필요합니다.</p>
    <p>이메일: <strong>${escapeHtml(state.tempEmail)}</strong></p>
    <label for="email-code-input">인증번호 입력</label>
    <input type="text" id="email-code-input" placeholder="6자리 인증번호" maxlength="6" autocomplete="one-time-code" />
    <button id="verify-code-btn">인증번호 확인</button>
    <button id="resend-code-btn" style="margin-top:10px;">인증번호 재발송</button>
    <button id="cancel-verify-btn" class="link-button">취소하고 로그인으로</button>
    <div class="message error" id="email-verify-error"></div>
    <div class="message success" id="email-verify-success"></div>
  `;

  document.getElementById('verify-code-btn').onclick = verifyEmailCodeHandler;
  document.getElementById('resend-code-btn').onclick = resendEmailCodeHandler;
  document.getElementById('cancel-verify-btn').onclick = () => {
    state.page = 'login';
    state.tempUserId = null;
    state.tempEmail = null;
    state.emailCodePurpose = null;
    setMessage('', '');
    render();
  };
}

async function verifyEmailCodeHandler() {
  const codeInput = document.getElementById('email-code-input').value.trim();
  if (!codeInput) return setMessage('error', '인증번호를 입력해 주세요.');

  // 서버에 인증번호 확인 요청
  try {
    const res = await fetch(`${API_BASE}/verify-email-code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: state.tempUserId,
        code: codeInput,
        purpose: state.emailCodePurpose
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || '인증 실패');

    // 인증 성공 처리
    if(state.emailCodePurpose === 'verify') {
      // 회원 verified 상태 업데이트
      let users = loadUsers();
      if(users[state.tempUserId]) {
        users[state.tempUserId].verified = true;
        saveUsers(users);
      }
      setMessage('success', '이메일 인증 완료! 로그인 화면으로 이동합니다.');
      state.page = 'login';
      state.tempUserId = null;
      state.tempEmail = null;
      state.emailCodePurpose = null;
      render();
    }
    else if(state.emailCodePurpose === 'reset') {
      // 비밀번호 재설정 페이지로 이동
      state.findPwVerified = true;
      setMessage('success', '인증 성공! 비밀번호 재설정 페이지로 이동합니다.');
      state.page = 'resetPw';
      render();
    }
  } catch(e) {
    setMessage('error', e.message || '인증번호가 올바르지 않습니다.');
  }
}

async function resendEmailCodeHandler() {
  if(!state.tempUserId || !state.tempEmail) return setMessage('error', '잘못된 상태입니다.');

  try {
    await sendEmailCode(state.tempUserId, state.tempEmail, state.emailCodePurpose);
    setMessage('success', '인증번호를 재발송 했습니다. 이메일을 확인해주세요.');
  } catch {
    setMessage('error', '인증번호 재발송에 실패했습니다. 잠시 후 다시 시도하세요.');
  }
}

// 이메일 인증번호 서버로 요청 보내기 (sendEmailCode API)
// 실제 서버가 이메일 전송 처리 필요
async function sendEmailCode(id, email, purpose) {
  const res = await fetch(`${API_BASE}/send-email`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, email, purpose }),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.message || '이메일 발송 실패');
  }
}

// --- 메인 화면 (로그인 후) ---
function renderMain() {
  const users = loadUsers();
  if (!currentUserId || !users[currentUserId]) {
    // 로그인 정보 없으면 로그인으로
    state.page = 'login';
    setMessage('', '');
    render();
    return;
  }
  const user = users[currentUserId];
  app.innerHTML = `
    <p>환영합니다, <strong>${escapeHtml(currentUserId)}</strong>님!</p>
    <p>등록된 이메일: <strong>${escapeHtml(user.email)}</strong></p>
    <button id="logout-btn">로그아웃</button>
    <button id="go-report-btn">제보하기</button>
    ${currentUserId === ADMIN_ID ? '<button id="go-admin-btn" style="margin-top:10px;">관리자 제보 확인</button>' : ''}
    <div class="message success" id="main-msg"></div>
  `;
  document.getElementById('logout-btn').onclick = () => {
    currentUserId = null;
    state.page = 'login';
    setMessage('', '');
    render();
  };
  document.getElementById('go-report-btn').onclick = () => {
    state.page = 'report';
    setMessage('', '');
    render();
  };
  if (currentUserId === ADMIN_ID) {
    document.getElementById('go-admin-btn').onclick = () => {
      state.page = 'adminReports';
      render();
    };
  }
}

// --- 비밀번호 찾기 페이지 ---
function renderFindPw() {
  app.innerHTML = `
    <label for="findpw-id">아이디</label>
    <input type="text" id="findpw-id" placeholder="아이디 입력" autocomplete="username" />
    <label for="findpw-email">가입 시 등록한 이메일</label>
    <input type="email" id="findpw-email" placeholder="이메일 입력" autocomplete="email" />
    <button id="findpw-send-code-btn">인증번호 발송</button>
    <button id="findpw-back-btn" class="link-button">로그인 화면으로</button>
    <div class="message error" id="findpw-error"></div>
    <div class="message success" id="findpw-success"></div>
  `;

  document.getElementById('findpw-send-code-btn').onclick = findPwSendCodeHandler;
  document.getElementById('findpw-back-btn').onclick = () => {
    state.page = 'login';
    setMessage('', '');
    render();
  };
}

async function findPwSendCodeHandler() {
  const id = document.getElementById('findpw-id').value.trim();
  const email = document.getElementById('findpw-email').value.trim();
  if (!id || !email) return setMessage('error', '아이디와 이메일을 모두 입력해 주세요.');

  const users = loadUsers();
  if (!users[id]) return setMessage('error', '존재하지 않는 아이디입니다.');
  if (users[id].email !== email) return setMessage('error', '등록된 이메일과 일치하지 않습니다.');

  try {
    await sendEmailCode(id, email, 'reset');
    state.findPwUserId = id;
    state.tempEmail = email;
    state.emailCodePurpose = 'reset';
    state.page = 'emailVerify';
    setMessage('success', '인증번호를 이메일로 발송했습니다. 이메일을 확인해주세요.');
    render();
  } catch {
    setMessage('error', '인증번호 발송 실패. 잠시 후 다시 시도하세요.');
  }
}

// --- 비밀번호 재설정 페이지 ---
function renderResetPw() {
  if (!state.findPwVerified) {
    state.page = 'login';
    setMessage('error', '비밀번호 재설정을 위해 먼저 이메일 인증을 완료하세요.');
    render();
    return;
  }
  app.innerHTML = `
    <p>${escapeHtml(state.findPwUserId)} 님, 비밀번호 재설정</p>
    <label for="reset-pw">새 비밀번호</label>
    <input type="password" id="reset-pw" placeholder="새 비밀번호 입력" autocomplete="new-password" />
    <label for="reset-pw2">새 비밀번호 확인</label>
    <input type="password" id="reset-pw2" placeholder="비밀번호 다시 입력" autocomplete="new-password" />
    <button id="reset-pw-btn">비밀번호 변경</button>
    <button id="reset-pw-cancel-btn" class="link-button">로그인 화면으로</button>
    <div class="message error" id="reset-pw-error"></div>
    <div class="message success" id="reset-pw-success"></div>
  `;
  document.getElementById('reset-pw-btn').onclick = resetPwHandler;
  document.getElementById('reset-pw-cancel-btn').onclick = () => {
    state.page = 'login';
    state.findPwVerified = false;
    state.findPwUserId = null;
    state.tempEmail = null;
    setMessage('', '');
    render();
  };
}

function resetPwHandler() {
  const pw = document.getElementById('reset-pw').value.trim();
  const pw2 = document.getElementById('reset-pw2').value.trim();
  if (!pw || !pw2) return setMessage('error', '새 비밀번호를 모두 입력해 주세요.');
  if (pw !== pw2) return setMessage('error', '비밀번호가 서로 다릅니다.');

  let users = loadUsers();
  if (!users[state.findPwUserId]) {
    setMessage('error', '사용자 정보를 찾을 수 없습니다.');
    return;
  }
  users[state.findPwUserId].pw = pw;
  saveUsers(users);

  setMessage('success', '비밀번호가 변경되었습니다. 로그인 화면으로 이동합니다.');
  state.page = 'login';
  state.findPwVerified = false;
  state.findPwUserId = null;
  state.tempEmail = null;
  render();
}

// --- 제보 신청 페이지 ---
function renderReport() {
  if (!currentUserId) {
    state.page = 'login';
    setMessage('error', '로그인 후 제보 가능합니다.');
    render();
    return;
  }
  app.innerHTML = `
    <p>제보 신청 (익명 불가)</p>
    <textarea id="report-content" rows="6" placeholder="제보 내용을 상세히 작성해 주세요."></textarea>
    <button id="submit-report-btn">제보 제출</button>
    <button id="report-cancel-btn" class="link-button">메인 화면으로</button>
    <div class="message error" id="report-error"></div>
    <div class="message success" id="report-success"></div>
  `;
  document.getElementById('submit-report-btn').onclick = submitReportHandler;
  document.getElementById('report-cancel-btn').onclick = () => {
    state.page = 'main';
    setMessage('', '');
    render();
  };
}

async function submitReportHandler() {
  const content = document.getElementById('report-content').value.trim();
  if (!content) return setMessage('error', '제보 내용을 입력해 주세요.');

  const reports = loadReports();
  reports.push({
    id: Date.now(),
    userId: currentUserId,
    content,
    date: new Date().toISOString()
  });
  saveReports(reports);

  setMessage('success', '제보가 정상적으로 접수되었습니다.');
  document.getElementById('report-content').value = '';

  // 관리자에게 이메일로도 전송 가능
  try {
    await fetch(`${API_BASE}/send-admin-report`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: currentUserId,
        content,
        date: new Date().toISOString()
      }),
    });
  } catch (e) {
    // 실패해도 사용자에는 영향 없음
    console.warn('관리자 이메일 전송 실패:', e);
  }
}

// --- 관리자 제보 확인 페이지 ---
function renderAdminReports() {
  if (currentUserId !== ADMIN_ID) {
    state.page = 'login';
    setMessage('error', '관리자만 접근할 수 있습니다.');
    render();
    return;
  }

  const reports = loadReports();
  app.innerHTML = `
    <h2>관리자 제보 확인</h2>
    <button id="admin-logout-btn">로그아웃</button>
    <button id="admin-main-btn" style="margin-left:10px;">메인으로</button>
    <div id="report-list">
      <ul>
        ${reports.length ? reports.map(r => `
          <li>
            <strong>제보 ID:</strong> ${r.id} <br />
            <strong>작성자:</strong> ${escapeHtml(r.userId)} <br />
            <strong>내용:</strong> ${escapeHtml(r.content)} <br />
            <small>${new Date(r.date).toLocaleString()}</small>
          </li>
        `).join('') : '<li>제보 내역이 없습니다.</li>'}
      </ul>
    </div>
  `;

  document.getElementById('admin-logout-btn').onclick = () => {
    currentUserId = null;
    state.page = 'login';
    setMessage('', '');
    render();
  };
  document.getElementById('admin-main-btn').onclick = () => {
    state.page = 'main';
    setMessage('', '');
    render();
  };
}

// 초기 렌더
render();
