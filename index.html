<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YWE 스나이퍼 공식 사이트</title>
<style>
  /* Reset & 기본 네온 스타일 */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #001122, #003355);
    color: #00ffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 30px 20px;
    overflow-y: auto;
  }
  h1 {
    font-size: 3.2rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px #00ffffcc;
    letter-spacing: 0.15em;
    user-select: none;
  }
  .container {
    background: #012233dd;
    padding: 40px 50px;
    border-radius: 25px;
    box-shadow: 0 0 40px #00ffffaa;
    width: 100%;
    max-width: 800px;
    min-height: 600px;
  }
  label {
    display: block;
    margin-top: 20px;
    font-weight: 700;
    user-select: text;
  }
  input[type=text], input[type=password], textarea {
    width: 100%;
    padding: 14px 18px;
    margin-top: 8px;
    border-radius: 14px;
    border: 2.5px solid #00ffffcc;
    background: #001122;
    color: #00ffff;
    font-size: 1.25rem;
    font-weight: 600;
    box-shadow: inset 0 0 15px #00ffff88;
    transition: 0.4s;
    user-select: text;
    resize: vertical;
  }
  input[type=text]:focus, input[type=password]:focus, textarea:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 35px #00ffffcc;
    background: #003355;
  }
  button {
    width: 100%;
    padding: 18px 0;
    margin-top: 30px;
    border-radius: 16px;
    border: none;
    background: #00ffff;
    color: #003344;
    font-size: 1.4rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 0 35px #00ffffbb;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
  }
  button:hover:not(:disabled) {
    background: #00e6cc;
    box-shadow: 0 0 45px #00e6ccff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }
  .link-button {
    margin-top: 15px;
    color: #00ffffcc;
    text-align: center;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    border: none;
    background: none;
  }
  .link-button:hover {
    color: #00ffff;
    text-decoration: underline;
  }
  .message {
    margin-top: 15px;
    font-weight: 700;
    min-height: 1.5em;
    user-select: none;
  }
  .error {
    color: #ff5555;
    text-shadow: 0 0 8px #ff5555cc;
  }
  .success {
    color: #55ff55;
    text-shadow: 0 0 8px #55ff55cc;
  }
  /* 관리자 제보 리스트 */
  #report-list {
    max-height: 300px;
    overflow-y: auto;
    margin-top: 20px;
    border: 2px solid #00ffffaa;
    border-radius: 12px;
    padding: 15px;
    background: #003344dd;
  }
  #report-list h2 {
    text-align: center;
    margin-bottom: 12px;
    font-weight: 900;
    letter-spacing: 0.1em;
    user-select: none;
  }
  #report-list ul {
    list-style: none;
    padding-left: 0;
  }
  #report-list li {
    padding: 12px 15px;
    margin-bottom: 12px;
    background: #004466cc;
    border-radius: 12px;
    font-size: 1.05rem;
    word-break: break-word;
    user-select: text;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #report-list li button.delete-report-btn {
    background: #ff4444;
    border: none;
    border-radius: 12px;
    padding: 6px 12px;
    color: white;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 10px #ff4444bb;
    transition: background 0.3s ease;
  }
  #report-list li button.delete-report-btn:hover {
    background: #ff2222;
  }
  /* 사이드바 */
  #sidebar {
    position: fixed;
    right: 10px;
    top: 50px;
    width: 300px;
    background: #001f3fdd;
    border: 2px solid #00ffffcc;
    border-radius: 15px;
    box-shadow: 0 0 30px #00ffffcc;
    padding: 20px;
    color: #00ffff;
    font-weight: 700;
    user-select: text;
    font-size: 1rem;
    max-height: 90vh;
    overflow-y: auto;
  }
  #sidebar h3 {
    margin-bottom: 15px;
    text-align: center;
    text-shadow: 0 0 8px #00ffffcc;
  }
  #sidebar p {
    margin: 8px 0;
    word-break: break-word;
  }
  /* 반응형 */
  @media screen and (max-width: 720px) {
    #sidebar {
      position: static;
      width: 100%;
      max-height: none;
      margin-top: 30px;
      box-shadow: none;
      border: none;
      background: transparent;
      padding: 0;
    }
    body {
      padding: 20px 10px;
    }
    .container {
      max-width: 100%;
      border-radius: 12px;
      padding: 30px 25px;
      min-height: auto;
    }
  }
  /* 이미지 미리보기 */
  .image-preview {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .image-preview img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 10px #00ffffbb;
  }
  /* 마크다운 스타일 (간단하게) */
  .markdown {
    white-space: pre-wrap;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .markdown h1 { font-size: 2rem; }
  .markdown h2 { font-size: 1.75rem; }
  .markdown h3 { font-size: 1.5rem; }
  .markdown strong { font-weight: 900; }
  .markdown em { font-style: italic; }
  .markdown code {
    background: #002233;
    padding: 2px 6px;
    border-radius: 6px;
    font-family: monospace;
  }
  .markdown a {
    color: #00ffff;
    text-decoration: underline;
  }
</style>
</head>
<body>

<h1>YWE 스나이퍼 공식 사이트</h1>
<div class="container" id="app">
  <!-- JS 렌더 영역 -->
</div>

<div id="sidebar" aria-label="유저 정보 사이드바">
  <h3>사용자 정보</h3>
  <p><strong>아이디: </strong><span id="sidebar-userid">-</span></p>
  <p id="sidebar-ip-wrapper" style="display:none;"><strong>IP 주소: </strong><span id="sidebar-ip">로딩 중...</span></p>
</div>

<script>
'use strict';

const USERS_KEY = 'ywe_users';
const REPORTS_KEY = 'ywe_reports';
const FAQ_KEY = 'ywe_faq';
const SNIPER_KEY = 'ywe_snipers';

const ADMIN_ID = 'lihuiruo101';

let currentUserId = null;
let state = {
  page: 'login', // login, signup, main, findPw, resetPw, report, adminReports, faq, sniperAdd, faqAdd
  findPwUserId: null,
  findPwVerified: false,
  messages: { error: '', success: '' },
  faqEditingId: null,
  sniperEditingId: null,
};

// HTML 이스케이프 함수
function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>"']/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[m]);
}

// 간단한 마크다운 파서 (제목, 굵게, 기울임, 링크, 코드 블록 일부 지원)
function parseMarkdown(text) {
  if (!text) return '';
  // 간단한 변환: 제목 (#, ##, ###), 굵게(**text**), 기울임(*text*), 링크 [text](url), 코드 `code`
  let html = escapeHtml(text);
  html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/([^]+)\]([^)]+)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

// 로컬스토리지 불러오기/저장 함수들
function loadUsers() {
  return JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
}
function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}
function loadReports() {
  return JSON.parse(localStorage.getItem(REPORTS_KEY) || '[]');
}
function saveReports(reports) {
  localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));
}
function loadFaqs() {
  return JSON.parse(localStorage.getItem(FAQ_KEY) || '[]');
}
function saveFaqs(faqs) {
  localStorage.setItem(FAQ_KEY, JSON.stringify(faqs));
}
function loadSnipers() {
  return JSON.parse(localStorage.getItem(SNIPER_KEY) || '[]');
}
function saveSnipers(snipers) {
  localStorage.setItem(SNIPER_KEY, JSON.stringify(snipers));
}

// 사용자 정보 표시 (사이드바)
function updateSidebar() {
  const useridSpan = document.getElementById('sidebar-userid');
  const ipWrapper = document.getElementById('sidebar-ip-wrapper');
  const ipSpan = document.getElementById('sidebar-ip');

  if (!currentUserId) {
    useridSpan.textContent = '-';
    ipWrapper.style.display = 'none';
    return;
  }
  useridSpan.textContent = currentUserId;

  // 관리자만 IP 노출
  if (currentUserId === ADMIN_ID) {
    ipWrapper.style.display = 'block';
    getUserIP().then(ip => {
      ipSpan.textContent = ip || '알 수 없음';
    });
  } else {
    ipWrapper.style.display = 'none';
  }
}

// 외부 IP 가져오기 (간단한 공개 API 사용)
async function getUserIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    if (!res.ok) return null;
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

// 로그인 폼 렌더링
function renderLogin() {
  const html = `
    <h2>로그인</h2>
    <label for="login-id">아이디</label>
    <input type="text" id="login-id" autocomplete="username" />
    <label for="login-pw">비밀번호</label>
    <input type="password" id="login-pw" autocomplete="current-password" />
    <button id="btn-login">로그인</button>
    <button class="link-button" id="go-signup">회원가입</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
  `;
  document.getElementById('app').innerHTML = html;

  document.getElementById('btn-login').onclick = () => {
    const id = document.getElementById('login-id').value.trim();
    const pw = document.getElementById('login-pw').value;
    const users = loadUsers();
    if (!id || !pw) {
      state.messages.error = '아이디와 비밀번호를 입력해주세요.';
      renderLogin();
      return;
    }
    if (!users[id] || users[id].password !== pw) {
      state.messages.error = '아이디 또는 비밀번호가 올바르지 않습니다.';
      renderLogin();
      return;
    }
    currentUserId = id;
    state.messages.error = '';
    state.page = 'main';
    updateSidebar();
    renderMain();
  };

  document.getElementById('go-signup').onclick = () => {
    state.page = 'signup';
    state.messages.error = '';
    renderSignup();
  };
}

// 회원가입 폼 렌더링
function renderSignup() {
  const html = `
    <h2>회원가입</h2>
    <label for="signup-id">아이디</label>
    <input type="text" id="signup-id" autocomplete="username" />
    <label for="signup-pw">비밀번호</label>
    <input type="password" id="signup-pw" autocomplete="new-password" />
    <label for="signup-pw2">비밀번호 확인</label>
    <input type="password" id="signup-pw2" autocomplete="new-password" />
    <button id="btn-signup">회원가입</button>
    <button class="link-button" id="go-login">로그인</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
  `;
  document.getElementById('app').innerHTML = html;

  document.getElementById('btn-signup').onclick = () => {
    const id = document.getElementById('signup-id').value.trim();
    const pw = document.getElementById('signup-pw').value;
    const pw2 = document.getElementById('signup-pw2').value;
    const users = loadUsers();

    if (!id || !pw || !pw2) {
      state.messages.error = '모든 항목을 입력해주세요.';
      renderSignup();
      return;
    }
    if (users[id]) {
      state.messages.error = '이미 존재하는 아이디입니다.';
      renderSignup();
      return;
    }
    if (pw !== pw2) {
      state.messages.error = '비밀번호가 일치하지 않습니다.';
      renderSignup();
      return;
    }
    users[id] = { password: pw, isAdmin: false };
    saveUsers(users);
    state.messages.error = '';
    alert('회원가입이 완료되었습니다. 로그인 해주세요.');
    state.page = 'login';
    renderLogin();
  };

  document.getElementById('go-login').onclick = () => {
    state.page = 'login';
    state.messages.error = '';
    renderLogin();
  };
}

// 메인 화면 (FAQ 목록 + 스나이퍼 목록 + 관리자 버튼)
function renderMain() {
  const faqs = loadFaqs();
  const snipers = loadSnipers();

  let html = `
    <h2>FAQ</h2>
    <ul>
      ${faqs.map(faq => `
        <li>
          <strong>${escapeHtml(faq.title)}</strong><br />
          <div class="markdown">${parseMarkdown(faq.description)}</div>
          ${isAdmin() ? `<button data-id="${faq.id}" class="btn-faq-edit">수정</button>
          <button data-id="${faq.id}" class="btn-faq-delete">삭제</button>` : ''}
        </li>
      `).join('')}
    </ul>
    ${isAdmin() ? `<button id="btn-faq-add">FAQ 추가</button>` : ''}

    <h2>스나이퍼</h2>
    <ul>
      ${snipers.map(snip => `
        <li>
          <strong>${escapeHtml(snip.title)}</strong><br />
          <div class="markdown">${parseMarkdown(snip.description)}</div>
          <div class="image-preview">
            ${snip.images.map(src => `<img src="${src}" alt="스나이퍼 이미지" />`).join('')}
          </div>
          ${isAdmin() ? `<button data-id="${snip.id}" class="btn-sniper-edit">수정</button>
          <button data-id="${snip.id}" class="btn-sniper-delete">삭제</button>` : ''}
        </li>
      `).join('')}
    </ul>
    ${isAdmin() ? `<button id="btn-sniper-add">스나이퍼 추가</button>` : ''}

    <button id="btn-logout">로그아웃</button>
  `;

  document.getElementById('app').innerHTML = html;

  if (isAdmin()) {
    document.querySelectorAll('.btn-faq-edit').forEach(btn =>
      btn.addEventListener('click', e => {
        state.faqEditingId = e.target.dataset.id;
        state.page = 'faqAdd';
        renderFaqAddEdit();
      })
    );
    document.querySelectorAll('.btn-faq-delete').forEach(btn =>
      btn.addEventListener('click', e => {
        if(confirm('정말 삭제하시겠습니까?')) {
          deleteFaq(e.target.dataset.id);
        }
      })
    );
    document.getElementById('btn-faq-add').onclick = () => {
      state.faqEditingId = null;
      state.page = 'faqAdd';
      renderFaqAddEdit();
    };

    document.querySelectorAll('.btn-sniper-edit').forEach(btn =>
      btn.addEventListener('click', e => {
        state.sniperEditingId = e.target.dataset.id;
        state.page = 'sniperAdd';
        renderSniperAddEdit();
      })
    );
    document.querySelectorAll('.btn-sniper-delete').forEach(btn =>
      btn.addEventListener('click', e => {
        if(confirm('정말 삭제하시겠습니까?')) {
          deleteSniper(e.target.dataset.id);
        }
      })
    );
    document.getElementById('btn-sniper-add').onclick = () => {
      state.sniperEditingId = null;
      state.page = 'sniperAdd';
      renderSniperAddEdit();
    };
  }

  document.getElementById('btn-logout').onclick = () => {
    currentUserId = null;
    state.page = 'login';
    updateSidebar();
    renderLogin();
  };
}

// FAQ 추가/편집 폼
function renderFaqAddEdit() {
  const faqs = loadFaqs();
  const editingFaq = faqs.find(f => f.id === state.faqEditingId) || { title: '', description: '' };

  const html = `
    <h2>${state.faqEditingId ? 'FAQ 수정' : 'FAQ 추가'}</h2>
    <label for="faq-title">제목</label>
    <input type="text" id="faq-title" value="${escapeHtml(editingFaq.title)}" />
    <label for="faq-description">설명 (마크다운 지원)</label>
    <textarea id="faq-description" rows="8">${escapeHtml(editingFaq.description)}</textarea>
    <button id="btn-faq-save">${state.faqEditingId ? '수정 완료' : '추가 완료'}</button>
    <button class="link-button" id="btn-faq-cancel">취소</button>
    <div class="message error" id="faq-error-message" style="
  margin-top: 20px;
  padding: 15px;
  border: 2px solid #d32f2f;
  background-color: #ffebee;
  color: #b71c1c;
  font-size: 14px;
  font-weight: 600;
  min-height: 60px;
  border-radius: 8px;
  white-space: pre-wrap;
  word-break: break-word;
">
  <!-- 오류 메시지가 이곳에 표시됩니다. -->
</div>

<section style="
  margin-top: 30px;
  padding: 20px;
  background-color: #fafafa;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 15px;
  color: #222222;
  line-height: 1.7;
">
  <h3 style="margin-top: 0; margin-bottom: 15px; font-weight: 700; font-size: 22px; color: #1976d2;">FAQ 작성 시 참고하세요</h3>
  <p>FAQ 설명란에는 마크다운 문법을 적용할 수 있습니다. 마크다운 문법을 활용하면 보다 풍성하고 명확한 정보를 전달할 수 있으니 꼭 활용해 보세요.</p>
  <ul style="list-style: disc inside; margin-left: 15px; margin-top: 10px; margin-bottom: 20px;">
    <li><strong>제목 표시</strong>: <code># 큰 제목</code>, <code>## 중간 제목</code>, <code>### 작은 제목</code> 등을 사용하여 구조를 명확히 할 수 있습니다.</li>
    <li><strong>텍스트 꾸미기</strong>: <code>**굵은 글씨**</code>, <code>*기울임*</code>, <code>~~취소선~~</code> 등을 활용해 강조할 수 있습니다.</li>
    <li><strong>목록 만들기</strong>: <code>- 순서 없는 목록</code>이나 <code>1. 순서 있는 목록</code>으로 내용을 정리해보세요.</li>
    <li><strong>링크 및 이미지</strong>: <code>[텍스트](URL)</code>로 링크 삽입, <code>![이미지 설명](이미지 URL)</code>로 이미지도 넣을 수 있습니다.</li>
    <li><strong>코드 블록</strong>: <code>```자바스크립트<br>console.log('Hello world');<br>```</code> 형식으로 코드를 예쁘게 표현하세요.</li>
  </ul>
  <p>작성하신 내용을 꼼꼼히 확인한 뒤 <strong>추가 완료</strong> 혹은 <strong>수정 완료</strong> 버튼을 눌러 저장하시기 바랍니다. 만약 취소를 원하면 <strong>취소</strong> 버튼을 눌러 이전 화면으로 돌아갈 수 있습니다.</p>
  <p>FAQ 작성은 사용자들에게 매우 중요한 정보 전달 수단이니, 친절하고 명확한 설명을 작성해 주세요.</p>
  <p style="margin-top: 30px; font-style: italic; color: #555;">필요하다면 언제든지 FAQ를 수정하거나 삭제할 수 있으니 부담 없이 관리하세요.</p>
</section>

<script>
  (function() {
    // 오류 메시지를 표시하는 요소 가져오기
    var errorDiv = document.getElementById('faq-error-message');

    // 저장 버튼 이벤트 핸들러 등록
    document.getElementById('btn-faq-save').addEventListener('click', function() {
      // 제목과 설명 값 가져오기
      var titleInput = document.getElementById('faq-title');
      var descriptionInput = document.getElementById('faq-description');
      var title = titleInput.value.trim();
      var description = descriptionInput.value.trim();

      // 빈 값 검증: 제목
      if (title.length === 0) {
        state.messages.error = '❌ 제목은 반드시 입력해야 합니다.';
        errorDiv.textContent = state.messages.error;
        titleInput.focus();
        return;
      }

      // 빈 값 검증: 설명
      if (description.length === 0) {
        state.messages.error = '❌ 설명을 입력해주세요. 내용이 비어 있습니다.';
        errorDiv.textContent = state.messages.error;
        descriptionInput.focus();
        return;
      }

      // 기존 FAQ 목록 불러오기
      var faqs = loadFaqs();

      // 편집 중인 FAQ가 있는지 확인
      if (state.faqEditingId) {
        var foundIndex = -1;
        for (var i = 0; i < faqs.length; i++) {
          if (faqs[i].id === state.faqEditingId) {
            foundIndex = i;
            break;
          }
        }
        // 수정할 FAQ가 존재하면 업데이트
        if (foundIndex !== -1) {
          faqs[foundIndex].title = title;
          faqs[foundIndex].description = description;
        } else {
          // 없으면 새로 추가
          faqs.push({ id: generateUniqueId(), title: title, description: description });
        }
      } else {
        // 새 FAQ 추가
        faqs.push({ id: generateUniqueId(), title: title, description: description });
      }

      // 저장 후 상태 초기화 및 메인 화면으로 이동
      saveFaqs(faqs);
      state.messages.error = '';
      state.faqEditingId = null;
      state.page = 'main';
      updateSidebar();
      renderMain();
    });

    // 취소 버튼 이벤트 핸들러 등록
    document.getElementById('btn-faq-cancel').addEventListener('click', function() {
      state.messages.error = '';
      state.faqEditingId = null;
      state.page = 'main';
      updateSidebar();
      renderMain();
    });
  })();
</script>
