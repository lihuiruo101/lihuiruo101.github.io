<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>스나이퍼 공식 사이트 | YWE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');
* {
  box-sizing: border-box;
}
body {
  margin:0; padding:0;
  font-family: 'Orbitron', monospace, 'Malgun Gothic', sans-serif;
  background: radial-gradient(circle at top left, #003322 0%, #001100 80%);
  color: #39ff14;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  user-select:none;
}
header {
  background: #001100;
  box-shadow: 0 0 20px #39ff14;
  padding: 20px 30px;
  text-align: center;
  position: relative;
}
header h1 {
  margin:0;
  font-size: 2rem;
  text-shadow:
    0 0 8px #39ff14,
    0 0 16px #39ff14,
    0 0 20px #39ff14;
}
nav {
  margin-top: 15px;
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}
nav button {
  background: transparent;
  border: 2px solid #39ff14;
  color: #39ff14;
  font-weight: 700;
  font-size: 1rem;
  padding: 10px 22px;
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 0 0 15px #39ff14;
  transition: all 0.3s ease;
  user-select:none;
  min-width: 110px;
}
nav button:hover {
  background: #39ff14;
  color: #001100;
  box-shadow:
    0 0 20px #39ff14,
    0 0 40px #39ff14;
}
.container {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}
#sidebar {
  width: 280px;
  background: #002200dd;
  border-right: 2px solid #39ff14;
  padding: 20px;
  color: #39ff14;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  user-select:none;
}
#sidebar strong.section-title {
  font-size: 1.3rem;
  margin-bottom: 10px;
  text-shadow: 0 0 8px #39ff14;
  border-bottom: 1px solid #39ff14;
  padding-bottom: 6px;
}
#sidebar ul {
  list-style: none;
  padding: 0;
  margin: 0;
  max-height: 300px;
  overflow-y: auto;
}
#sidebar ul li {
  background: #003300;
  margin-bottom: 12px;
  padding: 12px 15px;
  border-radius: 10px;
  box-shadow: inset 0 0 10px #006600;
  cursor: default;
  word-break: break-word;
  transition: background-color 0.3s ease;
}
#sidebar ul li:hover {
  background: #005500;
}
#sidebar ul li strong.title {
  display: block;
  font-size: 1.1rem;
  margin-bottom: 4px;
  text-shadow: 0 0 12px #39ff14;
}
#sidebar .admin-ip-list {
  font-size: 0.85rem;
  line-height: 1.2em;
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid #39ff14;
  padding: 10px;
  border-radius: 8px;
  background: #001a00;
  user-select:text;
  word-break: break-all;
}
#sidebar button#sidebar-admin-btn {
  margin-top: auto;
  background: #39ff14;
  color: #001100;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  padding: 14px 0;
  cursor: pointer;
  box-shadow: 0 0 20px #39ff14;
  user-select: none;
  font-size: 1rem;
  transition: background-color 0.3s ease;
}
#sidebar button#sidebar-admin-btn:hover {
  background: #2ecc40;
  box-shadow: 0 0 28px #2ecc40;
}
main#app {
  flex: 1;
  padding: 35px 45px;
  background: #001100;
  border-left: 2px solid #39ff14;
  color: #39ff14;
  overflow-y: auto;
  min-height: 0;
}
h2, h3 {
  text-align: center;
  margin-bottom: 22px;
  text-shadow:
    0 0 8px #39ff14,
    0 0 16px #39ff14;
}
form label {
  display: block;
  margin-top: 18px;
  font-weight: 700;
  text-shadow: 0 0 6px #39ff14;
}
input[type="text"], input[type="password"], textarea {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  background: #002200;
  border: 1.5px solid #39ff14;
  border-radius: 12px;
  color: #39ff14;
  font-size: 1.1rem;
  box-shadow: inset 0 0 10px #39ff14;
  font-family: 'Orbitron', monospace;
}
textarea {
  resize: vertical;
  min-height: 140px;
}
button {
  margin-top: 25px;
  background: #39ff14;
  border: none;
  padding: 14px 28px;
  font-weight: 700;
  color: #001100;
  border-radius: 18px;
  cursor: pointer;
  font-size: 1.1rem;
  box-shadow: 0 0 20px #39ff14;
  transition: background-color 0.3s ease;
  user-select: none;
  display: inline-block;
  min-width: 130px;
}
button:hover {
  background: #2ecc40;
  color: #001100;
  box-shadow:
    0 0 40px #2ecc40,
    0 0 60px #2ecc40;
}
ul.list {
  list-style: none;
  padding-left: 0;
}
ul.list li {
  background: #003300;
  border-radius: 14px;
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: inset 0 0 14px #006600;
  position: relative;
  word-break: break-word;
}
ul.list li strong.title {
  font-size: 1.4rem;
  margin-bottom: 12px;
  display: block;
  text-shadow: 0 0 16px #39ff14;
}
ul.list li .markdown {
  color: #a0f5a0;
  line-height: 1.5em;
  white-space: pre-wrap;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.btn-small {
  position: absolute;
  top: 20px;
  right: 18px;
  background: #39ff14;
  border: none;
  color: #001100;
  font-weight: 700;
  border-radius: 10px;
  padding: 8px 18px;
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.3s ease;
  box-shadow: 0 0 15px #39ff14;
  user-select: none;
}
.btn-small + .btn-small {
  right: 110px;
}
.btn-small:hover {
  background: #2ecc40;
  color: #001100;
}
.message {
  margin-top: 22px;
  font-weight: 700;
  text-align: center;
  font-size: 1.05rem;
}
.message.error {
  color: #ff3366;
  text-shadow: 0 0 12px #ff3366;
}
.message.success {
  color: #33ff99;
  text-shadow: 0 0 12px #33ff99;
}
form label.inline {
  display: inline-block;
  margin-right: 16px;
  font-size: 1rem;
}
/* Scrollbar */
::-webkit-scrollbar {
  width: 12px;
  height: 12px;
}
::-webkit-scrollbar-thumb {
  background: #39ff14;
  border-radius: 12px;
}
::-webkit-scrollbar-track {
  background: #001100;
}

/* Responsive */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }
  #sidebar {
    width: 100%;
    max-height: 280px;
    border-right: none;
    border-bottom: 2px solid #39ff14;
    overflow-y: auto;
  }
  main#app {
    border-left: none;
    padding: 25px 20px;
    min-height: 320px;
  }
  nav button {
    margin: 6px 8px;
    padding: 12px 18px;
    font-size: 0.95rem;
    min-width: 100px;
  }
}
</style>
</head>
<body>
<header>
  <h1>스나이퍼 공식 사이트 | YWE</h1>
  <nav id="nav-bar">
    <!-- JS로 로그인 상태 따라 버튼 생성 -->
  </nav>
</header>
<div class="container">
  <aside id="sidebar" style="display:none;">
    <strong class="section-title">관리자 메뉴</strong>
    <ul id="admin-menu-list">
      <li><button class="sidebar-btn" data-page="admin-ip">모든 접속 IP 보기</button></li>
      <li><button class="sidebar-btn" data-page="admin-faq">FAQ 관리</button></li>
      <li><button class="sidebar-btn" data-page="admin-sniper">스나이퍼 관리</button></li>
      <li><button id="sidebar-logout-btn" style="margin-top: 12px; background:#ff4466; box-shadow:none;">로그아웃</button></li>
    </ul>
    <hr style="border-color:#39ff14;" />
    <strong class="section-title">FAQ 목록</strong>
    <ul id="sidebar-faq-list"></ul>
    <strong class="section-title" style="margin-top: 15px;">스나이퍼 목록</strong>
    <ul id="sidebar-sniper-list"></ul>
  </aside>
  <main id="app">
    <!-- JS로 페이지 렌더링 -->
  </main>
</div>

<script>
(() => {
  const ADMIN_IDS = ['admin', 'root', 'master']; // 관리자 아이디 예시
  let currentUserId = null;
  let currentUserRole = null; // 'admin' or 'user'
  let state = { page: 'login', message: { text:'', type:'' }, editingFaqId: null, editingSniperId: null };

  // --- Utility ---
  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function parseMarkdown(md) {
    if (!md) return '';
    // 아주 간단한 마크다운: # 제목, **굵게**, 줄바꿈
    return md.replace(/^# (.*)$/gm, '<h4>$1</h4>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }
  function generateId() {
    return '_' + Math.random().toString(36).substr(2,9);
  }
  function saveUsers(users) {
    localStorage.setItem('ywe_users', JSON.stringify(users));
  }
  function loadUsers() {
    try {
      return JSON.parse(localStorage.getItem('ywe_users')) || {};
    } catch {
      return {};
    }
  }
  function saveFaqs(faqs) {
    localStorage.setItem('ywe_faqs', JSON.stringify(faqs));
  }
  function loadFaqs() {
    try {
      return JSON.parse(localStorage.getItem('ywe_faqs')) || [];
    } catch {
      return [];
    }
  }
  function saveSnipers(snipers) {
    localStorage.setItem('ywe_snipers', JSON.stringify(snipers));
  }
  function loadSnipers() {
    try {
      return JSON.parse(localStorage.getItem('ywe_snipers')) || [];
    } catch {
      return [];
    }
  }
  // --- Message ---
  function showMessage(text, type='') {
    state.message.text = text;
    state.message.type = type;
    render();
  }
  // --- Authentication ---
  function isAdmin() {
    return currentUserRole === 'admin';
  }

  // --- Render Navigation ---
  function renderNav() {
    const navBar = document.getElementById('nav-bar');
    navBar.innerHTML = '';
    if (!currentUserId) {
      navBar.appendChild(createNavButton('로그인', () => {
        state.page = 'login';
        state.message = { text:'', type:'' };
        render();
      }));
      navBar.appendChild(createNavButton('회원가입', () => {
        state.page = 'signup';
        state.message = { text:'', type:'' };
        render();
      }));
    } else {
      navBar.appendChild(createNavButton('FAQ', () => {
        state.page = 'faq';
        state.message = { text:'', type:'' };
        render();
      }));
      navBar.appendChild(createNavButton('FAQ', () => {
        state.page = 'faq';
        state.message = { text:'', type:'' };
        render();
      }));
      navBar.appendChild(createNavButton('스나이퍼', () => {
        state.page = 'sniper';
        state.message = { text:'', type:'' };
        render();
      }));
      if (isAdmin()) {
        navBar.appendChild(createNavButton('관리자 메뉴', () => {
          state.page = 'admin-menu';
          state.message = { text:'', type:'' };
          render();
        }));
      }
      navBar.appendChild(createNavButton('로그아웃', () => {
        logout();
      }));
    }
  }

  function createNavButton(text, onClick) {
    const btn = document.createElement('button');
    btn.textContent = text;
    btn.onclick = onClick;
    return btn;
  }

  // --- Logout ---
  function logout() {
    currentUserId = null;
    currentUserRole = null;
    state.page = 'login';
    state.message = { text:'로그아웃 되었습니다.', type: 'success' };
    render();
  }

  // --- Render Sidebar ---
  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (isAdmin()) {
      sidebar.style.display = 'flex';

      // FAQ 목록 사이드바
      const faqListEl = document.getElementById('sidebar-faq-list');
      const faqs = loadFaqs();
      faqListEl.innerHTML = '';
      if (faqs.length === 0) {
        faqListEl.innerHTML = '<li>등록된 FAQ가 없습니다.</li>';
      } else {
        for (const f of faqs) {
          const li = document.createElement('li');
          li.textContent = f.question;
          faqListEl.appendChild(li);
        }
      }

      // 스나이퍼 목록 사이드바
      const sniperListEl = document.getElementById('sidebar-sniper-list');
      const snipers = loadSnipers();
      sniperListEl.innerHTML = '';
      if (snipers.length === 0) {
        sniperListEl.innerHTML = '<li>등록된 스나이퍼가 없습니다.</li>';
      } else {
        for (const s of snipers) {
          const li = document.createElement('li');
          li.textContent = s.name;
          sniperListEl.appendChild(li);
        }
      }

    } else {
      sidebar.style.display = 'none';
    }
  }

  // --- Render Main Content ---
  function render() {
    renderNav();
    renderSidebar();
    const app = document.getElementById('app');
    app.innerHTML = '';

    // 메시지 표시
    if(state.message.text){
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message ' + (state.message.type || '');
      msgDiv.textContent = state.message.text;
      app.appendChild(msgDiv);
    }

    switch(state.page){
      case 'login': renderLogin(app); break;
      case 'signup': renderSignup(app); break;
      case 'faq': renderFaqPage(app); break;
      case 'sniper': renderSniperPage(app); break;
      case 'admin-menu': renderAdminMenu(app); break;
      case 'admin-ip': renderAdminIp(app); break;
      case 'admin-faq': renderAdminFaq(app); break;
      case 'admin-sniper': renderAdminSniper(app); break;
      default:
        app.innerHTML = '<h2>알 수 없는 페이지입니다.</h2>';
    }
  }

  // --- Render Login Form ---
  function renderLogin(container){
    const form = document.createElement('form');
    form.innerHTML = `
      <h2>로그인</h2>
      <label for="login-id">아이디</label>
      <input id="login-id" type="text" autocomplete="username" required />
      <label for="login-pw">비밀번호</label>
      <input id="login-pw" type="password" autocomplete="current-password" required />
      <button type="submit">로그인</button>
    `;
    form.onsubmit = e => {
      e.preventDefault();
      const id = form.querySelector('#login-id').value.trim();
      const pw = form.querySelector('#login-pw').value;
      const users = loadUsers();
      if(!users[id]){
        showMessage('존재하지 않는 아이디입니다.', 'error');
        return;
      }
      if(users[id].password !== pw){
        showMessage('비밀번호가 틀렸습니다.', 'error');
        return;
      }
      currentUserId = id;
      currentUserRole = ADMIN_IDS.includes(id) ? 'admin' : 'user';
      state.page = 'faq';
      state.message = { text:'로그인 성공! 환영합니다, '+id+'님.', type:'success' };
      render();
    };
    container.appendChild(form);
  }

  // --- Render Signup Form ---
  function renderSignup(container){
    const form = document.createElement('form');
    form.innerHTML = `
      <h2>회원가입</h2>
      <label for="signup-id">아이디 (영문+숫자)</label>
      <input id="signup-id" type="text" pattern="^[a-zA-Z0-9]{3,12}$" autocomplete="username" required />
      <label for="signup-pw">비밀번호 (6자 이상)</label>
      <input id="signup-pw" type="password" minlength="6" autocomplete="new-password" required />
      <label for="signup-pw2">비밀번호 확인</label>
      <input id="signup-pw2" type="password" minlength="6" autocomplete="new-password" required />
      <button type="submit">회원가입</button>
    `;
    form.onsubmit = e => {
      e.preventDefault();
      const id = form.querySelector('#signup-id').value.trim();
      const pw = form.querySelector('#signup-pw').value;
      const pw2 = form.querySelector('#signup-pw2').value;
      if(pw !== pw2){
        showMessage('비밀번호가 일치하지 않습니다.', 'error');
        return;
      }
      const users = loadUsers();
      if(users[id]){
        showMessage('이미 존재하는 아이디입니다.', 'error');
        return;
      }
      users[id] = {password: pw};
      saveUsers(users);
      showMessage('회원가입 성공! 로그인 해주세요.', 'success');
      state.page = 'login';
      render();
    };
    container.appendChild(form);
  }

  // --- Render FAQ Page ---
  function renderFaqPage(container){
    const faqs = loadFaqs();
    const div = document.createElement('div');
    div.innerHTML = '<h2>FAQ</h2>';
    if(faqs.length === 0){
      div.innerHTML += '<p>등록된 FAQ가 없습니다.</p>';
    } else {
      const ul = document.createElement('ul');
      ul.className = 'list';
      faqs.forEach(faq => {
        const li = document.createElement('li');
        li.innerHTML = `<strong class="title">${escapeHtml(faq.question)}</strong><div class="markdown">${parseMarkdown(faq.answer)}</div>`;
        ul.appendChild(li);
      });
      div.appendChild(ul);
    }
    container.appendChild(div);
  }

  // --- Render Sniper Page ---
  function renderSniperPage(container){
    const snipers = loadSnipers();
    const div = document.createElement('div');
    div.innerHTML = '<h2>스나이퍼 목록</h2>';
    if(snipers.length === 0){
      div.innerHTML += '<p>등록된 스나이퍼가 없습니다.</p>';
    } else {
      const ul = document.createElement('ul');
      ul.className = 'list';
      snipers.forEach(snip => {
        const li = document.createElement('li');
        li.innerHTML = `<strong class="title">${escapeHtml(snip.name)}</strong><div class="markdown">${parseMarkdown(snip.description)}</div>`;
        ul.appendChild(li);
      });
      div.appendChild(ul);
    }
    container.appendChild(div);
  }

  // --- Render Admin Menu ---
  function renderAdminMenu(container){
    container.innerHTML = `
      <h2>관리자 메뉴</h2>
      <p>좌측 사이드바에서 원하는 메뉴를 선택하세요.</p>
    `;
  }

  // --- Render Admin IP List ---
  function renderAdminIp(container){
    const users = loadUsers();
    const ips = Object.entries(users).map(([id, u]) => `${id} - ${u.ip || '접속기록 없음'}`).join('\n');
    container.innerHTML = `<h2>접속 IP 목록</h2>
      <pre class="admin-ip-list">${escapeHtml(ips)}</pre>
    `;
  }

  // --- Render Admin FAQ Management ---
  function renderAdminFaq(container){
    const faqs = loadFaqs();
    const div = document.createElement('div');
    div.innerHTML = '<h2>FAQ 관리</h2>';
    const ul = document.createElement('ul');
    ul.className = 'list';
    faqs.forEach(faq => {
      const li = document.createElement('li');
      li.innerHTML = `
        <strong class="title">${escapeHtml(faq.question)}</strong>
        <div class="markdown">${parseMarkdown(faq.answer)}</div>
        <button class="btn-small edit-faq" data-id="${faq.id}">수정</button>
        <button class="btn-small delete-faq" data-id="${faq.id}">삭제</button>
      `;
      ul.appendChild(li);
    });
    div.appendChild(ul);
    const form = document.createElement('form');
    form.innerHTML = `
      <h3>새 FAQ 추가</h3>
      <label for="faq-q">질문</label>
      <input id="faq-q" type="text" required />
      <label for="faq-a">답변 (마크다운 지원)</label>
      <textarea id="faq-a" required></textarea>
      <button type="submit">추가</button>
    `;
    form.onsubmit = e => {
      e.preventDefault();
      const q = form.querySelector('#faq-q').value.trim();
      const a = form.querySelector('#faq-a').value.trim();
      if(!q || !a){
        showMessage('질문과 답변을 모두 입력하세요.', 'error');
        return;
      }
      const newFaq = {id: generateId(), question: q, answer: a};
      faqs.push(newFaq);
      saveFaqs(faqs);
      showMessage('FAQ가 추가되었습니다.', 'success');
      render();
    };
    div.appendChild(form);

    // 이벤트 바인딩: 수정/삭제
    setTimeout(() => {
      div.querySelectorAll('.edit-faq').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-id');
          const faq = faqs.find(f => f.id === id);
          if(!faq) return;
          const qNew = prompt('질문을 수정하세요:', faq.question);
          if(qNew === null) return;
          const aNew = prompt('답변을 수정하세요:', faq.answer);
          if(aNew === null) return;
          faq.question = qNew.trim() || faq.question;
          faq.answer = aNew.trim() || faq.answer;
          saveFaqs(faqs);
          showMessage('FAQ가 수정되었습니다.', 'success');
          render();
        };
      });
      div.querySelectorAll('.delete-faq').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-id');
          if(!confirm('정말 삭제하시겠습니까?')) return;
          const idx = faqs.findIndex(f => f.id === id);
          if(idx !== -1){
            faqs.splice(idx,1);
            saveFaqs(faqs);
            showMessage('FAQ가 삭제되었습니다.', 'success');
            render();
          }
        };
      });

  // --- Render Admin Sniper Management ---
  function renderAdminSniper(container){
    const snipers = loadSnipers();
    const div = document.createElement('div');
    div.innerHTML = '<h2>스나이퍼 관리</h2>';
    const ul = document.createElement('ul');
    ul.className = 'list';
    snipers.forEach(snip => {
      const li = document.createElement('li');
      li.innerHTML = `
        <strong class="title">${escapeHtml(snip.name)}</strong>
        <div class="markdown">${parseMarkdown(snip.description)}</div>
        <button class="btn-small edit-sniper" data-id="${snip.id}">수정</button>
        <button class="btn-small delete-sniper" data-id="${snip.id}">삭제</button>
      `;
      ul.appendChild(li);
    });
    div.appendChild(ul);

    const form = document.createElement('form');
    form.innerHTML = `
      <h3>새 스나이퍼 추가</h3>
      <label for="sniper-name">이름</label>
      <input id="sniper-name" type="text" required />
      <label for="sniper-desc">설명 (마크다운 지원)</label>
      <textarea id="sniper-desc" required></textarea>
      <button type="submit">추가</button>
    `;
    form.onsubmit = e => {
      e.preventDefault();
      const name = form.querySelector('#sniper-name').value.trim();
      const desc = form.querySelector('#sniper-desc').value.trim();
      if(!name || !desc){
        showMessage('이름과 설명을 모두 입력하세요.', 'error');
        return;
      }
      const newSniper = {id: generateId(), name, description: desc};
      snipers.push(newSniper);
      saveSnipers(snipers);
      showMessage('스나이퍼가 추가되었습니다.', 'success');
      render();
    };
    div.appendChild(form);

    // 이벤트 바인딩: 수정/삭제
    setTimeout(() => {
      div.querySelectorAll('.edit-sniper').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-id');
          const sniper = snipers.find(s => s.id === id);
          if(!sniper) return;
          const nameNew = prompt('이름을 수정하세요:', sniper.name);
          if(nameNew === null) return;
          const descNew = prompt('설명을 수정하세요:', sniper.description);
          if(descNew === null) return;
          sniper.name = nameNew.trim() || sniper.name;
          sniper.description = descNew.trim() || sniper.description;
          saveSnipers(snipers);
          showMessage('스나이퍼가 수정되었습니다.', 'success');
          render();
        };
      });
      div.querySelectorAll('.delete-sniper').forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute('data-id');
          if(!confirm('정말 삭제하시겠습니까?')) return;
          const idx = snipers.findIndex(s => s.id === id);
          if(idx !== -1){
            snipers.splice(idx,1);
            saveSnipers(snipers);
            showMessage('스나이퍼가 삭제되었습니다.', 'success');
            render();
          }
        };
      });
    }, 10);

    container.appendChild(div);
  }
