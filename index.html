<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>YWE 스나이퍼 공식 사이트</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet" />
<style>
  /* 기본 초기화 및 스타일 */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #001f3f, #005f99);
    color: #00f0ff;
    font-family: 'Orbitron', monospace;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: row;
    min-height: 100vh;
  }
  nav.sidebar {
    background: #021a35;
    width: 220px;
    box-shadow: 4px 0 12px #00f0ff88;
    display: flex;
    flex-direction: column;
    padding-top: 2rem;
    position: fixed;
    top: 0; bottom: 0; left: 0;
    z-index: 1000;
  }
  nav.sidebar a {
    padding: 1rem 1.5rem;
    color: #00f0ff;
    text-decoration: none;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s ease;
    user-select: none;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
  }
  nav.sidebar a:hover,
  nav.sidebar a.active {
    background: #003c6f;
    color: #00ffff;
    text-shadow: 0 0 6px #00ffffaa;
  }
  button.logout-btn {
    margin-top: auto;
    margin-bottom: 2rem;
    padding: 0.8rem 1.2rem;
    background: #ff4444;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    user-select: none;
    font-size: 1rem;
    box-shadow: 0 0 8px #ff4444cc;
    transition: background 0.3s ease;
  }
  button.logout-btn:hover {
    background: #ff0000;
    box-shadow: 0 0 12px #ff0000dd;
  }
  .content {
    margin-left: 220px;
    padding: 2rem 3rem;
    flex: 1;
    overflow-y: auto;
    height: 100vh;
    background: linear-gradient(180deg, #011f4b 0%, #03396c 100%);
    box-shadow: inset 0 0 30px #00f0ff33;
  }
  .header {
    font-size: 2.2rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 8px #00ffffcc;
    letter-spacing: 0.1em;
  }
  .card {
    background: #022f5f;
    border: 1px solid #00ffffaa;
    border-radius: 10px;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    box-shadow: 0 0 15px #00ffff55;
    color: #c0f8ff;
    font-size: 1.1rem;
    line-height: 1.4;
    word-break: break-word;
  }
  .report-title {
    font-weight: 900;
    font-size: 1.3rem;
    margin-bottom: 0.8rem;
    text-shadow: 0 0 5px #00ffffbb;
  }
  .edit-pencil {
    position: absolute;
    right: 15px;
    top: 15px;
    cursor: pointer;
    width: 20px;
    height: 20px;
    fill: #00ffffcc;
    transition: fill 0.3s ease;
  }
  .edit-pencil:hover {
    fill: #00ffff;
    filter: drop-shadow(0 0 3px #00ffffcc);
  }
  textarea, input[type=text] {
    width: 100%;
    background: #011f4b;
    color: #00ffff;
    border: 1.5px solid #00ffffcc;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    margin-bottom: 1rem;
    transition: border-color 0.3s ease;
    resize: vertical;
  }
  textarea:focus, input[type=text]:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 10px #00ffffaa;
    background: #03396c;
  }
  button {
    background: #00ffff;
    border: none;
    padding: 12px 20px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    color: #003344;
    font-size: 1.1rem;
    box-shadow: 0 0 10px #00ffffaa;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
    margin-right: 1rem;
    margin-top: 0.5rem;
  }
  button:hover:not(:disabled) {
    background: #00e6cc;
    box-shadow: 0 0 20px #00e6ccff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }
  img.preview {
    max-width: 100%;
    margin-top: 1rem;
    border-radius: 10px;
    border: 2px solid #00ffffbb;
    box-shadow: 0 0 12px #00ffff88;
  }
  .login-box {
    background: #011f4b;
    padding: 40px 35px;
    border-radius: 15px;
    box-shadow: 0 0 25px #00ffffaa;
    max-width: 380px;
    width: 90vw;
    margin: auto;
    margin-top: 10vh;
    color: #00ffff;
    text-align: center;
    user-select: none;
  }
  .login-box h2 {
    font-size: 2.2rem;
    margin-bottom: 2rem;
    text-shadow: 0 0 8px #00ffffcc;
    letter-spacing: 0.1em;
  }
  input.login-input {
    width: 100%;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 1.1rem;
    border-radius: 8px;
    border: 1.5px solid #00ffffaa;
    background: #001933;
    color: #00ffff;
    font-family: 'Orbitron', monospace;
    transition: border-color 0.3s ease;
    outline: none;
  }
  input.login-input::placeholder {
    color: #00ffff88;
  }
  input.login-input:focus {
    border-color: #00ffff;
    background: #003366;
    box-shadow: 0 0 12px #00ffffaa;
  }
  button.login-button {
    background: #00ffff;
    color: #003344;
    font-weight: bold;
    cursor: pointer;
    border: 1.5px solid #00ffff;
    padding: 14px 0;
    font-size: 1.1rem;
    border-radius: 10px;
    margin-top: 15px;
    width: 100%;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
    box-shadow: 0 0 15px #00ffffaa;
  }
  button.login-button:hover {
    background: #00e6cc;
    box-shadow: 0 0 25px #00e6ccff;
  }
  #login-error {
    color: #ff4444;
    font-weight: 700;
    margin-top: 10px;
    font-size: 1rem;
    text-shadow: 0 0 6px #ff4444cc;
    user-select: none;
    min-height: 1.2em;
  }
  @media (max-width: 720px) {
    body {
      flex-direction: column;
      overflow: auto;
    }
    nav.sidebar {
      width: 100%;
      height: auto;
      position: relative;
      flex-direction: row;
      padding: 0;
      box-shadow: none;
    }
    nav.sidebar a {
      flex: 1;
      padding: 1rem 0;
      font-size: 1rem;
      text-align: center;
      border-right: 1px solid #005f99;
    }
    nav.sidebar a:last-child {
      border-right: none;
    }
    button.logout-btn {
      margin: 0 10px 10px 10px;
      padding: 0.6rem;
      font-size: 0.9rem;
      box-shadow: none;
    }
    .content {
      margin-left: 0;
      padding: 1rem 1.5rem;
      height: auto;
    }
    .login-box {
      margin-top: 5vh;
      width: 95vw;
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
  const adminId = 'lihuiruo101';

  // 권한 리스트 저장
  let adminUsers = JSON.parse(localStorage.getItem('ywe_admin_users') || JSON.stringify([adminId]));

  // HTML 이스케이프
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 간단한 마크다운 지원 (볼드, 이탤릭, 코드, 링크, 이미지, 줄바꿈)
  function simpleMarkdown(text) {
    if (!text) return '';
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.+?)\*/g, '<i>$1</i>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/!(.*?)(.*?)/g, '<img src="$2" alt="$1" style="max-width:100%;margin:5px 0;border-radius:6px;" />')
      .replace(/(.*?)(.*?)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
      .replace(/\n/g, '<br>');
  }

  // 로그인 정보 저장/조회
  function getLoginUser() {
    return localStorage.getItem('login');
  }
  function setLoginUser(id) {
    localStorage.setItem('login', id);
  }
  function logout() {
    localStorage.removeItem('login');
    currentTab = 'login';
    renderApp();
  }

  // 회원 정보 저장/불러오기
  function getUserPw(id) {
    return localStorage.getItem('user_' + id);
  }
  function setUserPw(id, pw) {
    localStorage.setItem('user_' + id, pw);
  }

  // 권한 저장/불러오기
  function getAdminUsers() {
    return adminUsers;
  }
  function addAdminUser(id) {
    if (!adminUsers.includes(id)) {
      adminUsers.push(id);
      localStorage.setItem('ywe_admin_users', JSON.stringify(adminUsers));
      alert(id + ' 님에게 관리자 권한이 추가되었습니다.');
    } else {
      alert('이미 관리자 권한이 있는 사용자입니다.');
    }
  }
  function removeAdminUser(id) {
    if (id === adminId) {
      alert('최고관리자 권한은 삭제할 수 없습니다.');
      return;
    }
    const idx = adminUsers.indexOf(id);
    if (idx > -1) {
      adminUsers.splice(idx, 1);
      localStorage.setItem('ywe_admin_users', JSON.stringify(adminUsers));
      alert(id + ' 님의 관리자 권한이 삭제되었습니다.');
    } else {
      alert('해당 사용자는 관리자 권한이 없습니다.');
    }
  }

  // 데이터 저장키
  const REPORTS_KEY = 'ywe_reports';
  const FAQ_KEY = 'ywe_faq';

  function getReports() {
    return JSON.parse(localStorage.getItem(REPORTS_KEY) || '[]');
  }
  function setReports(reports) {
    localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));
  }
  function getFaqs() {
    return JSON.parse(localStorage.getItem(FAQ_KEY) || '[]');
  }
  function setFaqs(faqs) {
    localStorage.setItem(FAQ_KEY, JSON.stringify(faqs));
  }

  const app = document.getElementById('app');
  let currentTab = getLoginUser() ? 'sniper' : 'login';
  let uploadedImages = [];

  // 로그인 화면 렌더
  function renderLogin(errorMsg = '') {
    app.innerHTML = `
      <div class="login-box" role="main" aria-label="로그인 박스">
        <h2>YWE 로그인</h2>
        <input id="id" class="login-input" placeholder="아이디" aria-label="아이디 입력란" autocomplete="username" />
        <input id="pw" class="login-input" placeholder="비밀번호" type="password" aria-label="비밀번호 입력란" autocomplete="current-password" />
        <button class="login-button" onclick="handleLogin()">로그인</button>
        <button class="login-button" onclick="handleSignup()">회원가입</button>
        <div id="login-error" role="alert" aria-live="assertive">${escapeHtml(errorMsg)}</div>
      </div>
    `;
  }

  // 로그인 처리
  function handleLogin() {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    if (!id || !pw) {
      renderLogin('아이디와 비밀번호를 모두 입력하세요.');
      return;
    }
    const savedPw = getUserPw(id);
    if (savedPw === pw) {
      setLoginUser(id);
      currentTab = 'sniper';
      renderApp();
    } else {
      renderLogin('아이디 또는 비밀번호가 올바르지 않습니다.');
    }
  }

  // 회원가입 처리
  function handleSignup() {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    if (!id || !pw) {
      alert('아이디와 비밀번호를 모두 입력하세요.');
      return;
    }
    if (getUserPw(id)) {
      alert('이미 존재하는 아이디입니다.');
      return;
    }
    setUserPw(id, pw);
    alert('회원가입이 완료되었습니다. 로그인 해주세요.');
    renderLogin();
  }

  // 관리자 권한 확인
  function isAdmin(userId) {
    return adminUsers.includes(userId);
  }

  // 사이드바 렌더링
  function renderSidebar(active) {
    const loginUser = getLoginUser();
    return `
      <nav class="sidebar" role="navigation" aria-label="메인 메뉴">
        <a href="#" id="nav-sniper" class="${active==='sniper'?'active':''}" onclick="switchTab('sniper')" aria-current="${active==='sniper'?'page':undefined}">스나이퍼</a>
        <a href="#" id="nav-submit" class="${active==='submit'?'active':''}" onclick="switchTab('submit')" aria-current="${active==='submit'?'page':undefined}">제보 신청</a>
        <a href="#" id="nav-faq" class="${active==='faq'?'active':''}" onclick="switchTab('faq')" aria-current="${active==='faq'?'page':undefined}">자주 묻는 질문</a>
        ${isAdmin(loginUser) ? `<a href="#" id="nav-admin" class="${active==='admin'?'active':''}" onclick="switchTab('admin')" aria-current="${active==='admin'?'page':undefined}">관리자</a>` : ''}
        <button class="logout-btn" onclick="logout()" aria-label="로그아웃">${escapeHtml(loginUser)} 님 로그아웃</button>
      </nav>
    `;
  }

  // 스나이퍼 탭 렌더링 (관리자만 사진, 마크다운, 제목 수정 가능)
  function renderSniper() {
    const reports = getReports();
    const loginUser = getLoginUser();
    let html = `<h2 class="header">스나이퍼 - 사기꾼 목록</h2>`;
    if (reports.length === 0) {
      html += '<p>등록된 사기꾼이 없습니다.</p>';
    } else {
      reports.forEach((r,i) => {
        html += `<div class="card" tabindex="0" aria-label="사기꾼 제보">
          <div class="report-title">${escapeHtml(r.title)}</div>
          <div>작성자: ${escapeHtml(r.author)}</div>
          <div>${simpleMarkdown(r.content)}</div>`;
        if (r.images && r.images.length > 0) {
          r.images.forEach(src => {
            html += `<img class="preview" src="${src}" alt="이미지 증거" />`;
          });
        }
        if (isAdmin(loginUser) && r.author === loginUser) {
          html += `<svg class="edit-pencil" onclick="editReport(${i})" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" title="수정" role="button" tabindex="0" aria-label="제보 수정">
            <path d="M3 17.25V21h3.75l11.06-11.06-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/>
          </svg>`;
        }
        html += `</div>`;
      });
    }
    return html;
  }

  // 제보 신청 탭 렌더링
  function renderSubmit() {
    const loginUser = getLoginUser();
    return `
      <h2 class="header">제보 신청</h2>
      <div class="card" role="form" aria-label="제보 신청 폼">
        <label for="submit-title">제목</label>
        <input type="text" id="submit-title" placeholder="제목을 입력하세요" aria-required="true" />
        <label for="submit-content">내용 (마크다운 지원)</label>
        <textarea id="submit-content" rows="6" placeholder="내용을 입력하세요" aria-required="true"></textarea>
        <label for="submit-images">이미지 URL (쉼표로 구분)</label>
        <input type="text" id="submit-images" placeholder="http://example.com/image1.jpg, http://example.com/image2.jpg" aria-describedby="image-help" />
        <small id="image-help" style="color:#00ffffcc;">이미지 URL은 쉼표(,)로 구분하여 여러 개 입력 가능합니다.</small>
        <div>
          <button onclick="submitReport()">제출</button>
          <button onclick="clearSubmitForm()" type="button">초기화</button>
        </div>
      </div>
    `;
  }

  // 자주 묻는 질문 탭 렌더링
  function renderFaq() {
    const faqs = getFaqs();
    let html = `<h2 class="header">자주 묻는 질문</h2>`;
    if (faqs.length === 0) {
      html += `<p>등록된 FAQ가 없습니다.</p>`;
    } else {
      faqs.forEach((faq, i) => {
        html += `
          <div class="card" tabindex="0" aria-label="자주 묻는 질문">
            <div class="report-title">${escapeHtml(faq.question)}</div>
            <div>${simpleMarkdown(faq.answer)}</div>
          </div>
        `;
      });
    }
    return html;
  }

  // 관리자 탭 렌더링
  function renderAdmin() {
    const loginUser = getLoginUser();
    if (!isAdmin(loginUser)) {
      return `<p>관리자 권한이 없습니다.</p>`;
    }
    const adminList = getAdminUsers();
    return `
      <h2 class="header">관리자 페이지</h2>
      <div class="card" role="form" aria-label="관리자 권한 관리">
        <label for="admin-add-id">관리자 추가</label>
        <input type="text" id="admin-add-id" placeholder="추가할 관리자 아이디 입력" />
        <button onclick="handleAddAdmin()">추가</button>
      </div>
      <div class="card" role="form" aria-label="관리자 권한 삭제">
        <label for="admin-remove-id">관리자 삭제</label>
        <input type="text" id="admin-remove-id" placeholder="삭제할 관리자 아이디 입력" />
        <button onclick="handleRemoveAdmin()">삭제</button>
      </div>
      <div class="card" tabindex="0" aria-label="현재 관리자 목록">
        <div class="report-title">현재 관리자 목록</div>
        <ul>
          ${adminList.map(id => `<li>${escapeHtml(id)}</li>`).join('')}
        </ul>
      </div>
    `;
  }

  // 탭 전환 함수
  function switchTab(tab) {
    currentTab = tab;
    renderApp();
  }

  // 제보 제출 처리
  function submitReport() {
    const titleInput = document.getElementById('submit-title');
    const contentInput = document.getElementById('submit-content');
    const imagesInput = document.getElementById('submit-images');

    const title = titleInput.value.trim();
    const content = contentInput.value.trim();
    const imagesRaw = imagesInput.value.trim();

    if (!title || !content) {
      alert('제목과 내용을 모두 입력하세요.');
      return;
    }

    const images = imagesRaw ? imagesRaw.split(',').map(s => s.trim()).filter(s => s) : [];

    const reports = getReports();
    reports.push({
      title,
      content,
      author: getLoginUser(),
      images
    });
    setReports(reports);

    alert('제보가 정상적으로 접수되었습니다.');

    clearSubmitForm();
    switchTab('sniper');
  }

  // 제출 폼 초기화
  function clearSubmitForm() {
    document.getElementById('submit-title').value = '';
    document.getElementById('submit-content').value = '';
    document.getElementById('submit-images').value = '';
  }

  // 관리자 추가 처리
  function handleAddAdmin() {
    const id = document.getElementById('admin-add-id').value.trim();
    if (!id) {
      alert('관리자 아이디를 입력하세요.');
      return;
    }
    addAdminUser(id);
    renderApp();
  }

  // 관리자 삭제 처리
  function handleRemoveAdmin() {
    const id = document.getElementById('admin-remove-id').value.trim();
    if (!id) {
      alert('관리자 아이디를 입력하세요.');
      return;
    }
    removeAdminUser(id);
    renderApp();
  }

  // 제보 수정 폼 띄우기 (관리자만)
  function editReport(index) {
    const reports = getReports();
    const report = reports[index];
    if (!report) return;
    const loginUser = getLoginUser();
    if (!isAdmin(loginUser) || report.author !== loginUser) {
      alert('수정 권한이 없습니다.');
      return;
    }

    app.innerHTML = `
      <h2 class="header">제보 수정</h2>
      <div class="card" role="form" aria-label="제보 수정 폼">
        <label for="edit-title">제목</label>
        <input type="text" id="edit-title" value="${escapeHtml(report.title)}" aria-required="true" />
        <label for="edit-content">내용 (마크다운 지원)</label>
        <textarea id="edit-content" rows="6" aria-required="true">${escapeHtml(report.content)}</textarea>
        <label for="edit-images">이미지 URL (쉼표로 구분)</label>
        <input type="text" id="edit-images" value="${report.images ? report.images.join(', ') : ''}" aria-describedby="image-help" />
        <small id="image-help" style="color:#00ffffcc;">이미지 URL은 쉼표(,)로 구분하여 여러 개 입력 가능합니다.</small>
        <div>
          <button onclick="saveReport(${index})">저장</button>
          <button onclick="switchTab('sniper')" type="button">취소</button>
        </div>
      </div>
    `;
  }

  // 제보 저장 처리
  function saveReport(index) {
    const title = document.getElementById('edit-title').value.trim();
    const content = document.getElementById('edit-content').value.trim();
    const imagesRaw = document.getElementById('edit-images').value.trim();

    if (!title || !content) {
      alert('제목과 내용을 모두 입력하세요.');
      return;
    }

    const images = imagesRaw ? imagesRaw.split(',').map(s => s.trim()).filter(s => s) : [];

    const reports = getReports();
    reports[index] = {
      ...reports[index],
      title,
      content,
      images
    };
    setReports(reports);

    alert('제보가 수정되었습니다.');
    switchTab('sniper');
  }

  // 앱 렌더링
  function renderApp() {
    if (currentTab === 'login') {
      renderLogin();
      return;
    }
    app.innerHTML = renderSidebar(currentTab) + `<main class="content" role="main" tabindex="0">`;
    switch (currentTab) {
      case 'sniper':
        app.innerHTML += renderSniper();
        break;
      case 'submit':
        app.innerHTML += renderSubmit();
        break;
      case 'faq':
        app.innerHTML += renderFaq();
        break;
      case 'admin':
        app.innerHTML += renderAdmin();
        break;
      default:
        app.innerHTML += '<p>잘못된 접근입니다.</p>';
    }
    app.innerHTML += `</main>`;
  }

  renderApp();
</script>
</body>
</html>
