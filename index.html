<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>YWE | 스나이핑 - 통합관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Nanum+Gothic&display=swap');

  :root {
    --primary: #1e90ff;
    --accent: #f44336;
    --dark-bg: #0f2027;
    --dark-panel: rgba(20, 20, 20, 0.95);
    --light-text: #eee;
    --radius: 10px;
  }

  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: var(--light-text);
    overflow: hidden;
  }

  body {
    display: flex;
    min-height: 100vh;
  }

  nav {
    width: 280px;
    background: var(--dark-panel);
    border-right: 3px solid var(--primary);
    display: flex;
    flex-direction: column;
    padding-top: 2rem;
    backdrop-filter: blur(10px);
    z-index: 100;
    position: relative;
  }

  nav h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--primary);
    text-align: center;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--primary);
  }

  nav button {
    background: none;
    border: none;
    color: #bbb;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 1.3rem 2.2rem;
    text-align: left;
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease;
    user-select: none;
  }
  nav button:hover, nav button.active {
    background: var(--primary);
    color: #121212;
  }

  nav button#logout-btn {
    margin-top: auto;
    border-top: 1px solid #555;
    color: var(--accent);
  }

  nav button#logout-btn:hover {
    background: var(--accent);
    color: white;
  }

  main {
    flex: 1;
    background: rgba(10, 10, 10, 0.9);
    overflow-y: auto;
    padding: 2.5rem 3rem;
    display: flex;
    justify-content: center;
  }

  main::-webkit-scrollbar {
    width: 12px;
  }
  main::-webkit-scrollbar-thumb {
    background-color: var(--primary);
    border-radius: 20px;
  }

  section {
    width: 100%;
    max-width: 700px;
    background: rgba(30,30,30,0.85);
    border-radius: var(--radius);
    padding: 2rem 2.5rem;
    box-shadow: 0 0 20px var(--primary);
    color: var(--light-text);
  }

  h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.1rem;
    margin-bottom: 1.2rem;
    text-align: center;
    color: var(--primary);
  }

  form {
    display: flex;
    flex-direction: column;
  }

  label {
    font-weight: 700;
    margin-bottom: 0.6rem;
    color: #aaccee;
  }

  input[type=text], input[type=password], textarea {
    background: #121212;
    border-radius: 8px;
    border: none;
    padding: 1rem;
    color: var(--light-text);
    font-size: 1.05rem;
    margin-bottom: 1.5rem;
    font-family: 'Nanum Gothic', sans-serif;
    resize: vertical;
  }

  textarea {
    min-height: 120px;
  }

  /* 비밀번호 입력 + 토글 아이콘 */
  .password-wrapper {
    position: relative;
    width: 100%;
  }

  .password-wrapper input[type="password"],
  .password-wrapper input[type="text"] {
    width: 100%;
    padding-right: 3.2rem;
  }

  .password-toggle {
    position: absolute;
    top: 50%;
    right: 1rem;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    cursor: pointer;
    fill: #888;
    transition: fill 0.3s ease;
    user-select: none;
  }
  .password-toggle:hover,
  .password-toggle:focus {
    fill: var(--primary);
    outline: none;
  }
  .password-toggle:focus {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }

  .submit-btn {
    background: var(--primary);
    border: none;
    border-radius: 10px;
    padding: 1.2rem 1rem;
    font-size: 1.25rem;
    font-weight: 800;
    color: #121212;
    cursor: pointer;
    transition: background 0.3s ease;
    margin-top: 0.5rem;
  }
  .submit-btn:hover {
    background: #0a7fff;
  }

  .toggle-auth {
    margin-top: 1rem;
    text-align: center;
    font-size: 1rem;
    color: #aad4ff;
    cursor: pointer;
    user-select: none;
  }

  .hidden {
    display: none !important;
  }

  ul#ip-log-list {
    list-style: none;
    padding-left: 0;
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid var(--primary);
    border-radius: var(--radius);
    background: rgba(20,20,20,0.9);
  }

  ul#ip-log-list li {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--primary);
    font-family: monospace;
    font-size: 0.9rem;
    color: #ddeeff;
  }

  ul#ip-log-list li:last-child {
    border-bottom: none;
  }

  /* 반응형 */
  @media (max-width: 900px) {
    body {
      flex-direction: column;
    }
    nav {
      width: 100%;
      flex-direction: row;
      border-right: none;
      border-bottom: 3px solid var(--primary);
      padding-top: 0.8rem;
      overflow-x: auto;
    }
    nav h1 {
      display: none;
    }
    nav button {
      flex: 1;
      font-size: 0.9rem;
      padding: 1rem 0.6rem;
      text-align: center;
      white-space: nowrap;
    }
    main {
      padding: 1rem 1.5rem;
      height: calc(100vh - 60px);
    }
    section {
      max-width: 100%;
      padding: 1.5rem 1rem;
    }
  }
</style>
</head>

<body>
  <nav>
    <h1>YWE | 스나이핑</h1>
    <button id="nav-login" class="active">로그인</button>
    <button id="nav-register">회원가입</button>
    <button id="nav-faq" class="hidden">FAQ</button>
    <button id="nav-expose" class="hidden">박제</button>
    <button id="nav-report" class="hidden">제보</button>
    <button id="nav-admin" class="hidden">관리자</button>
    <button id="logout-btn" class="hidden">로그아웃</button>
  </nav>

  <main>
    <!-- 로그인 섹션 -->
    <section id="section-login">
      <h2>로그인</h2>
      <form id="form-login">
        <label for="login-id">아이디</label>
        <input type="text" id="login-id" autocomplete="username" required />
        <label for="login-pw">비밀번호</label>
        <div class="password-wrapper">
          <input type="password" id="login-pw" autocomplete="current-password" required />
          <svg id="toggle-login-pw" class="password-toggle" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="비밀번호 보기 토글" role="button" tabindex="0">
            <path d="M12 5c-7 0-9 7-9 7s2 7 9 7 9-7 9-7-2-7-9-7z" fill="none" stroke="#888" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" fill="#888"/>
          </svg>
        </div>
        <button type="submit" class="submit-btn">로그인</button>
      </form>
      <div class="toggle-auth" id="toggle-to-register">계정이 없으신가요? 회원가입</div>
    </section>

    <!-- 회원가입 섹션 -->
    <section id="section-register" class="hidden">
      <h2>회원가입</h2>
      <form id="form-register">
        <label for="register-id">아이디</label>
        <input type="text" id="register-id" autocomplete="username" required />
        <label for="register-pw">비밀번호</label>
        <div class="password-wrapper">
          <input type="password" id="register-pw" autocomplete="new-password" required />
          <svg id="toggle-register-pw" class="password-toggle" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-label="비밀번호 보기 토글" role="button" tabindex="0">
            <path d="M12 5c-7 0-9 7-9 7s2 7 9 7 9-7 9-7-2-7-9-7z" fill="none" stroke="#888" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" fill="#888"/>
          </svg>
        </div>
        <button type="submit" class="submit-btn">회원가입</button>
      </form>
      <div class="toggle-auth" id="toggle-to-login">이미 계정이 있으신가요? 로그인</div>
    </section>

    <!-- FAQ 섹션 -->
    <section id="section-faq" class="hidden">
      <h2>자주 묻는 질문 (FAQ)</h2>
      <div id="faq-list" style="max-height: 400px; overflow-y: auto; margin-top: 1rem; border: 1px solid var(--primary); border-radius: var(--radius); padding: 1rem; background: #121212;"></div>
      <form id="form-faq" class="hidden" style="margin-top: 1.5rem;">
        <label for="faq-title">제목</label>
        <input type="text" id="faq-title" />
        <label for="faq-content">내용 (마크다운 가능)</label>
        <textarea id="faq-content"></textarea>
        <button type="submit" class="submit-btn">등록</button>
      </form>
    </section>

    <!-- 박제 섹션 -->
    <section id="section-expose" class="hidden">
      <h2>사기꾼 박제</h2>
      <div id="expose-list" style="max-height: 400px; overflow-y: auto; margin-top: 1rem; border: 1px solid var(--primary); border-radius: var(--radius); padding: 1rem; background: #121212;"></div>
      <form id="form-expose" class="hidden" style="margin-top: 1.5rem;">
        <label for="expose-title">제목</label>
        <input type="text" id="expose-title" />
        <label for="expose-content">내용 (마크다운 가능)</label>
        <textarea id="expose-content"></textarea>
        <button type="submit" class="submit-btn">등록</button>
      </form>
    </section>

    <!-- 제보 섹션 -->
    <section id="section-report" class="hidden">
      <h2>제보 요청</h2>
      <form id="form-report" style="margin-top: 1rem;">
        <label for="report-title">제목</label>
        <input type="text" id="report-title" required />
        <label for="report-content">설명</label>
        <textarea id="report-content" rows="5" required></textarea>
        <button type="submit" class="submit-btn">제보</button>
      </form>
    </section>

    <!-- 관리자 섹션 -->
    <section id="section-admin" class="hidden">
      <h2>관리자 메뉴</h2>
      <div id="admin-ip-log" style="margin-top: 1rem;">
        <h3>접속 사용자 정보 (IP / ID)</h3>
        <ul id="ip-log-list"></ul>
      </div>
      <form id="form-admin-add" style="margin-top: 2rem;">
        <label for="new-admin-id">관리자 아이디 추가</label>
        <input type="text" id="new-admin-id" required />
        <button type="submit" class="submit-btn">추가</button>
      </form>
    </section>
  </main>

  <script>
    // 섹션 매핑
    const sections = {
      'nav-login': 'section-login',
      'nav-register': 'section-register',
      'nav-faq': 'section-faq',
      'nav-expose': 'section-expose',
      'nav-report': 'section-report',
      'nav-admin': 'section-admin'
    };

    let ADMIN_IDS = ['lihuiruo101'];

    let currentUser = null;
    let currentIP = null;

    // 메뉴 활성화 함수
    function switchSection(activeBtnId) {
      Object.entries(sections).forEach(([btnId, secId]) => {
        document.getElementById(btnId).classList.toggle('active', btnId === activeBtnId);
        document.getElementById(secId).classList.toggle('hidden', btnId !== activeBtnId);
      });
    }

    // 메뉴 초기화
    function resetMenu() {
      document.querySelectorAll('nav button').forEach(btn => {
        if (btn.id === 'nav-login' || btn.id === 'nav-register') {
          btn.classList.remove('hidden');
        } else {
          btn.classList.add('hidden');
        }
        btn.classList.remove('active');
      });
      document.getElementById('logout-btn').classList.add('hidden');
    }

    // 관리자 메뉴 활성화
    function activateMenuByRole(id) {
      document.querySelectorAll('nav button').forEach(btn => {
        if (btn.id === 'logout-btn') {
          btn.classList.remove('hidden');
        } else if (btn.id === 'nav-login' || btn.id === 'nav-register') {
          btn.classList.add('hidden');
        } else {
          btn.classList.remove('hidden');
        }
      });

      if (ADMIN_IDS.includes(id)) {
        document.getElementById('nav-admin').classList.remove('hidden');
        document.getElementById('form-faq').classList.remove('hidden');
        document.getElementById('form-expose').classList.remove('hidden');
      } else {
        document.getElementById('nav-admin').classList.add('hidden');
        document.getElementById('form-faq').classList.add('hidden');
        document.getElementById('form-expose').classList.add('hidden');
      }
    }

    // IP 로그 기록
    function logUserIP(id, ip) {
      const ul = document.getElementById('ip-log-list');
      const li = document.createElement('li');
      const now = new Date();
      li.textContent = `${now.toLocaleString()} - ID: ${id} / IP: ${ip}`;
      ul.appendChild(li);
    }

    // 비밀번호 토글 함수
    function setupPasswordToggle(toggleId, inputId) {
      const toggle = document.getElementById(toggleId);
      const input = document.getElementById(inputId);

      function togglePassword() {
        if(input.type === 'password') {
          input.type = 'text';
          toggle.querySelector('circle').setAttribute('fill', '#1e90ff');
          toggle.querySelector('path').setAttribute('stroke', '#1e90ff');
        } else {
          input.type = 'password';
          toggle.querySelector('circle').setAttribute('fill', '#888');
          toggle.querySelector('path').setAttribute('stroke', '#888');
        }
      }

      toggle.addEventListener('click', togglePassword);
      toggle.addEventListener('keydown', e => {
        if(e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          togglePassword();
        }
      });
    }

    // 네비 버튼 이벤트 등록
    Object.keys(sections).forEach(btnId => {
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', () => switchSection(btnId));
    });

    // 로그아웃 버튼 이벤트
    document.getElementById('logout-btn').addEventListener('click', () => {
      currentUser = null;
      currentIP = null;
      resetMenu();
      switchSection('nav-login');
      document.getElementById('ip-log-list').innerHTML = '';
      alert('로그아웃 되었습니다.');
    });

    // 로그인 폼 제출 이벤트 (여기선 간단히 아이디만 체크)
    document.getElementById('form-login').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value.trim();

      if (!id || !pw) {
        alert('아이디와 비밀번호를 입력하세요.');
        return;
      }
      // 실제 인증은 서버 필요. 여기서는 아이디만으로 로그인 처리
      currentUser = id;

      // 가상 IP 할당 (실제론 서버에서 받아야 함)
      currentIP = `192.168.0.${Math.floor(Math.random() * 255)}`;

      alert(`${id}님 로그인 성공! IP: ${currentIP}`);

      activateMenuByRole(id);
      switchSection('nav-faq');
      logUserIP(id, currentIP);
    });

    // 회원가입 폼 제출 이벤트
    document.getElementById('form-register').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('register-id').value.trim();
      const pw = document.getElementById('register-pw').value.trim();

      if (!id || !pw) {
        alert('아이디와 비밀번호를 입력하세요.');
        return;
      }

      alert(`회원가입 성공! 환영합니다, ${id}님!`);
      // 여기서 실제 회원가입 처리 필요

      // 가입 완료 후 로그인 페이지로 이동
      switchSection('nav-login');
      document.getElementById('nav-login').classList.add('active');
      document.getElementById('nav-register').classList.remove('active');
    });

    // 로그인/회원가입 토글 텍스트 클릭 이벤트
    document.getElementById('toggle-to-register').addEventListener('click', () => {
      switchSection('nav-register');
      document.getElementById('nav-register').classList.add('active');
      document.getElementById('nav-login').classList.remove('active');
    });
    document.getElementById('toggle-to-login').addEventListener('click', () => {
      switchSection('nav-login');
      document.getElementById('nav-login').classList.add('active');
      document.getElementById('nav-register').classList.remove('active');
    });

    // FAQ / 박제 폼 제출 이벤트 (관리자 전용)
    document.getElementById('form-faq').addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('faq-title').value.trim();
      const content = document.getElementById('faq-content').value.trim();
      if (!title || !content) {
        alert('제목과 내용을 입력하세요.');
        return;
      }
      const faqList = document.getElementById('faq-list');
      const faqItem = document.createElement('div');
      faqItem.style.borderBottom = '1px solid var(--primary)';
      faqItem.style.padding = '0.5rem 0';
      faqItem.innerHTML = `<strong>${title}</strong><p>${content}</p>`;
      faqList.appendChild(faqItem);
      e.target.reset();
      alert('FAQ가 등록되었습니다.');
    });

    document.getElementById('form-expose').addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('expose-title').value.trim();
      const content = document.getElementById('expose-content').value.trim();
      if (!title || !content) {
        alert('제목과 내용을 입력하세요.');
        return;
      }
      const exposeList = document.getElementById('expose-list');
      const exposeItem = document.createElement('div');
      exposeItem.style.borderBottom = '1px solid var(--primary)';
      exposeItem.style.padding = '0.5rem 0';
      exposeItem.innerHTML = `<strong>${title}</strong><p>${content}</p>`;
      exposeList.appendChild(exposeItem);
      e.target.reset();
      alert('박제가 등록되었습니다.');
    });

    // 제보 폼 제출 이벤트
    document.getElementById('form-report').addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('report-title').value.trim();
      const content = document.getElementById('report-content').value.trim();
      if (!title || !content) {
        alert('제목과 설명을 입력하세요.');
        return;
      }
      alert(`제보가 접수되었습니다.\n제목: ${title}`);
      e.target.reset();
    });

    // 관리자 아이디 추가
    document.getElementById('form-admin-add').addEventListener('submit', e => {
      e.preventDefault();
      const newAdmin = document.getElementById('new-admin-id').value.trim();
      if (!newAdmin) {
        alert('아이디를 입력하세요.');
        return;
      }
      if (!ADMIN_IDS.includes(newAdmin)) {
        ADMIN_IDS.push(newAdmin);
        alert(`관리자 아이디 ${newAdmin} 추가 완료!`);
      } else {
        alert('이미 관리자입니다.');
      }
      e.target.reset();
    });

    // 비밀번호 토글 초기화
    setupPasswordToggle('toggle-login-pw', 'login-pw');
    setupPasswordToggle('toggle-register-pw', 'register-pw');

    // 기본 화면 세팅
    resetMenu();
    switchSection('nav-login');

  </script>
</body>
</html>
