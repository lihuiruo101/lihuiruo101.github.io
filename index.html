<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>24 NonTerror - Premium Server Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400&display=swap');

  body {
    background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
    color: #f5f5f7;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 20px;
  }

  .container {
    background: #121212;
    border-radius: 20px;
    width: 360px;
    box-shadow:
      0 0 20px 5px rgba(255, 255, 255, 0.07),
      inset 0 0 30px 5px #e4caa1,
      0 0 40px 10px #bfa066;
    padding: 40px 30px 50px;
    text-align: center;
    position: relative;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2.8rem;
    color: #e4caa1;
    text-shadow:
      0 0 5px #e4caa1,
      0 0 10px #e4caa1,
      0 0 20px #e4caa1;
    margin-bottom: 25px;
  }

  .btn-enter {
    display: inline-block;
    background: linear-gradient(145deg, #bfa066, #e4caa1);
    color: #121212;
    font-weight: 700;
    font-size: 1.3rem;
    padding: 14px 48px;
    border-radius: 40px;
    box-shadow:
      0 0 10px 3px #e4caa1,
      inset 0 0 10px #bfa066;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 36px;
    user-select: none;
  }

  .btn-enter:hover {
    background: linear-gradient(145deg, #e4caa1, #bfa066);
    box-shadow:
      0 0 20px 6px #e4caa1,
      inset 0 0 15px #bfa066;
    transform: scale(1.05);
  }

  .desc-box {
    background: rgba(255, 255, 255, 0.07);
    border-radius: 15px;
    padding: 16px 22px;
    box-shadow:
      0 0 10px 2px rgba(255, 202, 146, 0.5);
    font-size: 0.95rem;
    color: #e9dcbf;
    line-height: 1.4;
  }

  .desc-box p {
    margin-bottom: 14px;
  }

  /* 섬광 느낌 반짝임 애니메이션 */
  .title::after {
    content: '';
    position: absolute;
    top: 20px; left: 50%;
    width: 140px; height: 5px;
    background: linear-gradient(90deg, transparent, #e4caa1, transparent);
    filter: drop-shadow(0 0 5px #e4caa1);
    transform: translateX(-50%) skewX(-20deg);
    animation: shine 3.2s linear infinite;
    border-radius: 2px;
    pointer-events: none;
  }

  @keyframes shine {
    0% { left: -40%; opacity: 0; }
    50% { left: 50%; opacity: 1; }
    100% { left: 140%; opacity: 0; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1 class="title">24 NonTerror</h1>
    <button class="btn-enter">서버 입장하기</button>
    <div class="desc-box">
      <p><strong>테러방지:</strong> 악성 사용자와 공격을 실시간으로 감지하고 즉각 대응합니다.</p>
      <p><strong>서버관리:</strong> 권한 관리, 자동 신고 처리, 안전한 백업으로 안정적인 운영을 지원합니다.</p>
      <p><strong>신고:</strong> 간편한 신고 시스템으로 문제 상황을 빠르게 해결합니다.</p>
    </div>
  </div>
</body>
</html>
