<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YWE | 스나이핑</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Nanum+Gothic&display=swap');
  /* Reset */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #eee;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  /* 사이드바 */
  nav {
    width: 280px;
    background: rgba(30,30,30,0.95);
    border-right: 2px solid #1e90ff;
    display: flex;
    flex-direction: column;
    user-select: none;
    box-shadow: 4px 0 8px rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
  }
  nav h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.7rem;
    padding: 2rem 1.5rem;
    color: #1e90ff;
    border-bottom: 2px solid #1e90ff;
    text-align: center;
    letter-spacing: 2px;
  }
  nav button {
    background: none;
    border: none;
    color: #ccc;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 1.2rem 2rem;
    text-align: left;
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease;
  }
  nav button:hover {
    background: #1e90ff;
    color: #121212;
  }
  nav button.active {
    background: #1e90ff;
    color: #121212;
    font-weight: 700;
  }
  nav button#logout-btn {
    margin-top: auto;
    border-top: 1px solid #333;
    color: #f44336;
  }
  nav button#logout-btn:hover {
    background: #f44336;
    color: #fff;
  }
  /* 메인 컨텐츠 */
  main {
    flex: 1;
    padding: 2rem 3rem;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #1e90ff #121212;
    background: rgba(10,10,10,0.8);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.7);
  }
  main::-webkit-scrollbar {
    width: 12px;
  }
  main::-webkit-scrollbar-track {
    background: #121212;
  }
  main::-webkit-scrollbar-thumb {
    background-color: #1e90ff;
    border-radius: 10px;
    border: 3px solid #121212;
  }
  /* 공통 타이틀 */
  h2 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    color: #1e90ff;
    margin-bottom: 1.2rem;
    font-size: 2rem;
    text-align: center;
    text-shadow: 0 0 10px #1e90ff;
  }
  /* 폼 스타일 */
  form {
    max-width: 480px;
    margin: 0 auto;
    background: rgba(30,30,30,0.7);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 0 15px #1e90ffaa;
  }
  label {
    display: block;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #aad4ff;
    user-select:none;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: none;
    background: #121212;
    color: #eee;
    font-size: 1.1rem;
    box-shadow: inset 0 0 8px #1e90ff88;
    transition: box-shadow 0.3s ease;
  }
  input[type=text]:focus, input[type=password]:focus {
    outline: none;
    box-shadow: 0 0 15px #1e90ff;
  }
  /* 비밀번호 눈 아이콘 래퍼 */
  .password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
  .password-wrapper input {
    flex: 1;
  }
  .password-toggle {
    position: absolute;
    right: 1rem;
    cursor: pointer;
    fill: #666;
    width: 24px;
    height: 24px;
    transition: fill 0.3s ease;
  }
  .password-toggle:hover {
    fill: #1e90ff;
  }
  /* 버튼 스타일 */
  button.submit-btn {
    margin-top: 1.6rem;
    background: #1e90ff;
    border: none;
    color: #121212;
    font-weight: 700;
    font-size: 1.2rem;
    padding: 0.9rem 2rem;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 12px #1e90ffbb;
    transition: background 0.3s ease;
  }
  button.submit-btn:hover {
    background: #0d6efd;
    box-shadow: 0 0 20px #0d6efdcc;
  }
  /* 링크 스타일 */
  .toggle-auth {
    text-align: center;
    margin-top: 1.4rem;
    color: #aad4ff;
    font-weight: 600;
    cursor: pointer;
    user-select:none;
    transition: color 0.3s ease;
  }
  .toggle-auth:hover {
    color: #66aaff;
  }
  /* 로그인/회원가입 컨테이너 */
  #auth-container, #register-container {
    width: 100%;
    max-width: 480px;
    margin: auto;
    padding-top: 6rem;
  }
  /* 숨김 처리 */
  .hidden {
    display: none !important;
  }
  /* 컨텐츠 섹션 */
  section.content-section {
    max-width: 700px;
    margin: auto;
  }
  /* 리스트 스타일 */
  ul {
    list-style: none;
    padding-left: 0;
  }
  li {
    background: #1e90ff22;
    margin: 0.5rem 0;
    padding: 0.7rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s ease;
  }
  li:hover {
    background: #1e90ff44;
  }
  /* 텍스트 박스 */
  textarea {
    width: 100%;
    height: 80px;
    padding: 1rem;
    margin-top: 0.7rem;
    border-radius: 8px;
    border: none;
    background: #121212;
    color: #eee;
    font-size: 1rem;
    box-shadow: inset 0 0 8px #1e90ff88;
    resize: vertical;
  }
  /* 관리자 메뉴 버튼 */
  button.admin-action-btn {
    background: #f44336;
    border: none;
    color: #fff;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 0.5rem;
    font-weight: 700;
    transition: background 0.3s ease;
  }
  button.admin-action-btn:hover {
    background: #d32f2f;
  }
</style>
</head>
<body>
<nav aria-label="메인 메뉴">
  <h1>YWE | 스나이핑</h1>
  <button id="nav-faq" class="hidden">FAQ</button>
  <button id="nav-expose" class="hidden">박제</button>
  <button id="nav-report" class="hidden">제보 요청</button>
  <button id="nav-admin" class="hidden">관리자 메뉴</button>
  <button id="logout-btn" class="hidden">로그아웃</button>
</nav>
<main>
  <!-- 로그인/회원가입 -->
  <section id="auth-container">
    <h2>로그인</h2>
    <form id="login-form" autocomplete="off" novalidate>
      <label for="login-id">아이디</label>
      <input type="text" id="login-id" required autocomplete="username" />
      <label for="login-pw">비밀번호</label>
      <div class="password-wrapper">
        <input type="password" id="login-pw" required autocomplete="current-password" />
        <svg id="toggle-login-pw" class="password-toggle" viewBox="0 0 24 24" aria-label="비밀번호 표시/숨기기" role="button" tabindex="0">
          <path d="M12 5c-7 0-9 7-9 7s2 7 9 7 9-7 9-7-2-7-9-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5
          5 2.24 5 5-2.24 5-5 5z"/>
          <circle cx="12" cy="12" r="2.5"/>
        </svg>
      </div>
      <button type="submit" class="submit-btn">로그인</button>
    </form>
    <div class="toggle-auth" id="go-register">계정이 없으신가요? 회원가입</div>
  </section>
  <section id="register-container" class="hidden">
    <h2>회원가입</h2>
    <form id="register-form" autocomplete="off" novalidate>
      <label for="reg-id">아이디</label>
      <input type="text" id="reg-id" required autocomplete="username" />
      <label for="reg-pw">비밀번호</label>
      <div class="password-wrapper">
        <input type="password" id="reg-pw" required autocomplete="new-password" />
        <svg id="toggle-reg-pw" class="password-toggle" viewBox="0 0 24 24" aria-label="비밀번호 표시/숨기기" role="button" tabindex="0">
          <path d="M12 5c-7 0-9 7-9 7s2 7 9 7 9-7 9-7-2-7-9-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5
          5 2.24 5 5-2.24 5-5 5z"/>
          <circle cx="12" cy="12" r="2.5"/>
        </svg>
      </div>
      <button type="submit" class="submit-btn">회원가입</button>
    </form>
    <div class="toggle-auth" id="go-login">로그인 하러 가기</div>
  </section>

  <!-- FAQ 섹션 -->
  <section id="faq-section" class="hidden content-section">
    <h2>FAQ</h2>
    <ul id="faq-list"></ul>
    <div id="faq-admin-controls" class="hidden">
      <textarea id="faq-text" placeholder="FAQ 내용을 입력하세요..."></textarea>
      <button id="add-faq-btn" class="admin-action-btn">FAQ 추가</button>
    </div>
  </section>

  <!-- 박제 섹션 -->
  <section id="expose-section" class="hidden content-section">
    <h2>박제</h2>
    <ul id="expose-list"></ul>
    <div id="expose-admin-controls" class="hidden">
      <textarea id="expose-text" placeholder="박제 내용을 입력하세요..."></textarea>
      <button id="add-expose-btn" class="admin-action-btn">박제 추가</button>
    </div>
  </section>

  <!-- 제보 요청 섹션 -->
  <section id="report-section" class="hidden content-section">
    <h2>제보 요청</h2>
    <ul id="report-list"></ul>
    <div id="report-admin-controls" class="hidden">
      <textarea id="report-text" placeholder="제보 내용을 입력하세요..."></textarea>
      <button id="add-report-btn" class="admin-action-btn">제보 추가</button>
    </div>
  </section>

  <!-- 관리자 메뉴 -->
  <section id="admin-section" class="hidden content-section">
    <h2>관리자 메뉴</h2>
    <p>관리자용 추가 기능을 구현하세요.</p>
  </section>
</main>

<script>
  // 저장 키
  const STORAGE_USERS = 'ywe_sniping_users';
  const STORAGE_ADMINS = 'ywe_sniping_admins';
  const STORAGE_FAQ = 'ywe_sniping_faqs';
  const STORAGE_EXPOSE = 'ywe_sniping_exposes';
  const STORAGE_REPORTS = 'ywe_sniping_reports';

  // 현재 로그인 유저
  let currentUser = null;

  // 데이터 로드
  let users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || {};
  let admins = JSON.parse(localStorage.getItem(STORAGE_ADMINS)) || ['lihuiruo101'];
  let faqs = JSON.parse(localStorage.getItem(STORAGE_FAQ)) || [];
  let exposes = JSON.parse(localStorage.getItem(STORAGE_EXPOSE)) || [];
  let reports = JSON.parse(localStorage.getItem(STORAGE_REPORTS)) || [];

  // DOM
  const navFAQ = document.getElementById('nav-faq');
  const navExpose = document.getElementById('nav-expose');
  const navReport = document.getElementById('nav-report');
  const navAdmin = document.getElementById('nav-admin');
  const logoutBtn = document.getElementById('logout-btn');

  const authContainer = document.getElementById('auth-container');
  const registerContainer = document.getElementById('register-container');

  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');

  const goRegister = document.getElementById('go-register');
  const goLogin = document.getElementById('go-login');

  const faqSection = document.getElementById('faq-section');
  const exposeSection = document.getElementById('expose-section');
  const reportSection = document.getElementById('report-section');
  const adminSection = document.getElementById('admin-section');

  const faqList = document.getElementById('faq-list');
  const exposeList = document.getElementById('expose-list');
  const reportList = document.getElementById('report-list');

  const faqAdminControls = document.getElementById('faq-admin-controls');
  const exposeAdminControls = document.getElementById('expose-admin-controls');
  const reportAdminControls = document.getElementById('report-admin-controls');

  const faqText = document.getElementById('faq-text');
  const exposeText = document.getElementById('expose-text');
  const reportText = document.getElementById('report-text');

  const addFaqBtn = document.getElementById('add-faq-btn');
  const addExposeBtn = document.getElementById('add-expose-btn');
  const addReportBtn = document.getElementById('add-report-btn');

  // 비밀번호 눈 토글 함수
  function togglePassword(inputId, toggleBtnId) {
    const input = document.getElementById(inputId);
    const toggleBtn = document.getElementById(toggleBtnId);
    toggleBtn.addEventListener('click', () => {
      if(input.type === 'password') {
        input.type = 'text';
        toggleBtn.innerHTML = `
          <path d="M12 4.5C7 4.5 3.1 7.6 1.5 12c1.6 4.4 5.5 7.5 10.5 7.5s8.9-3.1 10.5-7.5c-1.6-4.4-5.5-7.5-10.5-7.5zm0 12a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zm0-7a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z" />`;
      } else {
        input.type = 'password';
        toggleBtn.innerHTML = `
          <path d="M12 5c-7 0-9 7-9 7s2 7 9 7 9-7 9-7-2-7-9-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5
          5 2.24 5 5-2.24 5-5 5z"/>
          <circle cx="12" cy="12" r="2.5"/>`;
      }
    });
  }
  togglePassword('login-pw','toggle-login-pw');
  togglePassword('reg-pw','toggle-reg-pw');

  // 화면 전환
  goRegister.addEventListener('click', () => {
    authContainer.classList.add('hidden');
    registerContainer.classList.remove('hidden');
  });
  goLogin.addEventListener('click', () => {
    registerContainer.classList.add('hidden');
    authContainer.classList.remove('hidden');
  });

  // 로그인 함수
  loginForm.addEventListener('submit', e => {
    e.preventDefault();
    const id = loginForm['login-id'].value.trim();
    const pw = loginForm['login-pw'].value.trim();
    if (!id || !pw) {
      alert('아이디와 비밀번호를 모두 입력해주세요.');
      return;
    }
    if (!users[id] || users[id] !== pw) {
      alert('아이디 또는 비밀번호가 올바르지 않습니다.');
      return;
    }
    currentUser = id;
    afterLogin();
  });

  // 회원가입
  registerForm.addEventListener('submit', e => {
    e.preventDefault();
    const id = registerForm['reg-id'].value.trim();
    const pw = registerForm['reg-pw'].value.trim();
    if (!id || !pw) {
      alert('아이디와 비밀번호를 입력해주세요.');
      return;
    }
    if (users[id]) {
      alert('이미 존재하는 아이디입니다.');
      return;
    }
    users[id] = pw;
    localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    alert('회원가입 완료! 로그인 해주세요.');
    registerContainer.classList.add('hidden');
    authContainer.classList.remove('hidden');
  });

  // 로그인 후 처리
  function afterLogin() {
    authContainer.classList.add('hidden');
    registerContainer.classList.add('hidden');
    navFAQ.classList.remove('hidden');
    navExpose.classList.remove('hidden');
    navReport.classList.remove('hidden');
    logoutBtn.classList.remove('hidden');

    if (admins.includes(currentUser)) {
      navAdmin.classList.remove('hidden');
    }

    showSection('faq');
  }

  // 로그아웃
  logoutBtn.addEventListener('click', () => {
    currentUser = null;
    location.reload();
  });

  // 섹션 보여주기
  function showSection(section) {
    [faqSection, exposeSection, reportSection, adminSection].forEach(sec => sec.classList.add('hidden'));
    if (section === 'faq') faqSection.classList.remove('hidden');
    if (section === 'expose') exposeSection.classList.remove('hidden');
    if (section === 'report') reportSection.classList.remove('hidden');
    if (section === 'admin') adminSection.classList.remove('hidden');

    // 버튼 active 처리
    [navFAQ, navExpose, navReport, navAdmin].forEach(btn => btn.classList.remove('active'));
    if (section === 'faq') navFAQ.classList.add('active');
    if (section === 'expose') navExpose.classList.add('active');
    if (section === 'report') navReport.classList.add('active');
    if (section === 'admin') navAdmin.classList.add('active');

    // 관리자 컨트롤 노출
    const isAdmin = admins.includes(currentUser);
    faqAdminControls.classList.toggle('hidden', !isAdmin);
    exposeAdminControls.classList.toggle('hidden', !isAdmin);
    reportAdminControls.classList.toggle('hidden', !isAdmin);
  }

  navFAQ.addEventListener('click', () => showSection('faq'));
  navExpose.addEventListener('click', () => showSection('expose'));
  navReport.addEventListener('click', () => showSection('report'));
  navAdmin.addEventListener('click', () => showSection('admin'));

  // 항목 렌더링 함수
  function renderList(list, container) {
    container.innerHTML = '';
    list.forEach((item, i) => {
      const li = document.createElement('li');
      li.textContent = item;
      container.appendChild(li);
    });
  }

  function syncLocalStorage() {
    localStorage.setItem(STORAGE_FAQ, JSON.stringify(faqs));
    localStorage.setItem(STORAGE_EXPOSE, JSON.stringify(exposes));
    localStorage.setItem(STORAGE_REPORTS, JSON.stringify(reports));
  }

  // 추가 버튼
  addFaqBtn.addEventListener('click', () => {
    const text = faqText.value.trim();
    if (!text) return;
    faqs.push(text);
    faqText.value = '';
    syncLocalStorage();
    renderList(faqs, faqList);
  });

  addExposeBtn.addEventListener('click', () => {
    const text = exposeText.value.trim();
    if (!text) return;
    exposes.push(text);
    exposeText.value = '';
    syncLocalStorage();
    renderList(exposes, exposeList);
  });

  addReportBtn.addEventListener('click', () => {
    const text = reportText.value.trim();
    if (!text) return;
    reports.push(text);
    reportText.value = '';
    syncLocalStorage();
    renderList(reports, reportList);
  });

  // 초기 렌더링
  renderList(faqs, faqList);
  renderList(exposes, exposeList);
  renderList(reports, reportList);
</script>
</body>
</html>
