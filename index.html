<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>YWE 스나이퍼 공식 사이트</title>
<style>
  /* Reset & 기본 설정 */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #001f3f, #005f99);
    color: #00f0ff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  body {
    display: flex;
    min-height: 100vh;
    flex-direction: row;
  }
  /* 사이드바 */
  nav.sidebar {
    background: #021a35;
    width: 240px;
    box-shadow: 5px 0 15px #00f0ffaa;
    display: flex;
    flex-direction: column;
    padding-top: 2rem;
    position: fixed;
    top: 0; bottom: 0; left: 0;
    z-index: 1100;
  }
  nav.sidebar a {
    padding: 1.2rem 2rem;
    color: #00f0ff;
    text-decoration: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: 0.07em;
    transition: background 0.3s ease, color 0.3s ease;
    user-select: none;
  }
  nav.sidebar a:hover,
  nav.sidebar a.active {
    background: #004080;
    color: #00ffff;
    text-shadow: 0 0 7px #00ffffcc;
  }
  button.logout-btn {
    margin-top: auto;
    margin-bottom: 2rem;
    margin-left: 1.5rem;
    margin-right: 1.5rem;
    padding: 0.8rem 1.3rem;
    background: #ff5555;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 0 10px #ff5555cc;
    transition: background 0.3s ease;
  }
  button.logout-btn:hover {
    background: #ff2222;
    box-shadow: 0 0 16px #ff2222dd;
  }
  /* 콘텐츠 영역 */
  main.content {
    margin-left: 240px;
    padding: 2.5rem 3.5rem;
    flex: 1;
    overflow-y: auto;
    height: 100vh;
    background: linear-gradient(180deg, #011f4b 0%, #03396c 100%);
    box-shadow: inset 0 0 40px #00f0ff33;
    scroll-behavior: smooth;
  }
  .header {
    font-size: 2.6rem;
    margin-bottom: 1.8rem;
    letter-spacing: 0.12em;
    font-weight: 900;
    text-shadow: 0 0 12px #00ffffcc;
    user-select: none;
  }
  .card {
    background: #022f5f;
    border: 1.5px solid #00ffffaa;
    border-radius: 14px;
    padding: 1.8rem 2.2rem;
    margin-bottom: 2rem;
    position: relative;
    box-shadow: 0 0 22px #00ffff66;
    color: #c0f8ff;
    font-size: 1.15rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .report-title {
    font-weight: 900;
    font-size: 1.5rem;
    margin-bottom: 1.2rem;
    text-shadow: 0 0 8px #00ffffcc;
    user-select: text;
  }
  .edit-pencil {
    position: absolute;
    right: 18px;
    top: 18px;
    cursor: pointer;
    width: 24px;
    height: 24px;
    fill: #00ffffcc;
    transition: fill 0.3s ease, filter 0.3s ease;
  }
  .edit-pencil:hover {
    fill: #00ffff;
    filter: drop-shadow(0 0 4px #00ffffcc);
  }
  textarea, input[type=text] {
    width: 100%;
    background: #011f4b;
    color: #00ffff;
    border: 2px solid #00ffffcc;
    border-radius: 10px;
    padding: 14px 18px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.3s ease, background-color 0.3s ease;
    resize: vertical;
  }
  textarea:focus, input[type=text]:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 15px #00ffffcc;
    background: #03396c;
  }
  button {
    background: #00ffff;
    border: none;
    padding: 14px 28px;
    font-weight: 800;
    cursor: pointer;
    border-radius: 12px;
    color: #003344;
    font-size: 1.2rem;
    box-shadow: 0 0 15px #00ffffcc;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
    margin-right: 1.2rem;
    margin-top: 0.8rem;
  }
  button:hover:not(:disabled) {
    background: #00e6cc;
    box-shadow: 0 0 26px #00e6ccff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }
  img.preview {
    max-width: 100%;
    margin-top: 1.5rem;
    border-radius: 14px;
    border: 2.5px solid #00ffffbb;
    box-shadow: 0 0 18px #00ffff99;
  }
  ul {
    padding-left: 1.4rem;
    margin-top: 0.5rem;
    margin-bottom: 1.5rem;
  }
  ul li {
    margin-bottom: 0.6rem;
  }
  /* 로그인 박스 */
  .login-box {
    background: #011f4b;
    padding: 50px 45px;
    border-radius: 20px;
    box-shadow: 0 0 35px #00ffffcc;
    max-width: 420px;
    width: 90vw;
    margin: auto;
    margin-top: 10vh;
    color: #00ffff;
    text-align: center;
    user-select: none;
  }
  .login-box h2 {
    font-size: 2.6rem;
    margin-bottom: 2.5rem;
    text-shadow: 0 0 12px #00ffffcc;
    letter-spacing: 0.12em;
  }
  input.login-input {
    width: 100%;
    padding: 16px 20px;
    margin: 16px 0;
    font-size: 1.25rem;
    border-radius: 10px;
    border: 2px solid #00ffffaa;
    background: #001933;
    color: #00ffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    transition: border-color 0.3s ease;
    outline: none;
  }
  input.login-input::placeholder {
    color: #00ffff88;
  }
  input.login-input:focus {
    border-color: #00ffff;
    background: #003366;
    box-shadow: 0 0 15px #00ffffaa;
  }
  button.login-button {
    background: #00ffff;
    color: #003344;
    font-weight: 900;
    cursor: pointer;
    border: 2px solid #00ffff;
    padding: 16px 0;
    font-size: 1.2rem;
    border-radius: 14px;
    margin-top: 20px;
    width: 100%;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
    box-shadow: 0 0 22px #00ffffaa;
  }
  button.login-button:hover {
    background: #00e6cc;
    box-shadow: 0 0 30px #00e6ccff;
  }
  #login-error {
    color: #ff5555;
    font-weight: 800;
    margin-top: 14px;
    font-size: 1.1rem;
    text-shadow: 0 0 8px #ff5555cc;
    user-select: none;
    min-height: 1.4em;
  }

  /* 반응형 */
  @media (max-width: 800px) {
    body {
      flex-direction: column;
      overflow: auto;
    }
    nav.sidebar {
      width: 100%;
      height: auto;
      position: relative;
      flex-direction: row;
      padding: 0;
      box-shadow: none;
    }
    nav.sidebar a {
      flex: 1;
      padding: 1rem 0;
      font-size: 1.1rem;
      text-align: center;
      border-right: 1.5px solid #005f99;
    }
    nav.sidebar a:last-child {
      border-right: none;
    }
    button.logout-btn {
      margin: 0 12px 12px 12px;
      padding: 0.7rem;
      font-size: 1rem;
      box-shadow: none;
      border-radius: 8px;
      width: auto;
      flex: none;
    }
    main.content {
      margin-left: 0;
      padding: 1.5rem 2rem;
      height: auto;
    }
    .login-box {
      margin-top: 6vh;
      width: 96vw;
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>
<div id="app" role="application" aria-live="polite"></div>

<script>
  'use strict';

  // 최고 관리자 아이디 (관리자 권한 부여 및 해제 가능)
  const superAdminId = 'lihuiruo101';
  let adminUsers = JSON.parse(localStorage.getItem('ywe_admin_users') || JSON.stringify([superAdminId]));

  // HTML 특수문자 이스케이프
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 간단한 마크다운 변환 함수
  // 지원 : **굵게**, *기울임*, `코드`, [링크](url), ![이미지](url), 줄바꿈
  function simpleMarkdown(text) {
    if (!text) return '';
    return escapeHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.+?)\*/g, '<i>$1</i>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/!(.*?)(.*?)/g, '<img src="$2" alt="$1" class="preview" />')
      .replace(/(.+?)(.+?)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
      .replace(/\n/g, '<br>');
  }

  // 로그인 사용자 관리
  function getLoginUser() {
    return localStorage.getItem('login');
  }
  function setLoginUser(id) {
    localStorage.setItem('login', id);
  }
  function logout() {
    localStorage.removeItem('login');
    currentTab = 'login';
    renderApp();
  }

  // 사용자 비밀번호 저장
  function getUserPw(id) {
    return localStorage.getItem('user_' + id);
  }
  function setUserPw(id, pw) {
    localStorage.setItem('user_' + id, pw);
  }

  // 관리자 리스트
  function getAdminUsers() {
    return adminUsers;
  }
  function addAdminUser(id) {
    if (!adminUsers.includes(id)) {
      adminUsers.push(id);
      localStorage.setItem('ywe_admin_users', JSON.stringify(adminUsers));
      alert(`${id} 님에게 관리자 권한이 추가되었습니다.`);
    } else {
      alert('이미 관리자 권한이 있는 사용자입니다.');
    }
  }
  function removeAdminUser(id) {
    if (id === superAdminId) {
      alert('최고관리자 권한은 삭제할 수 없습니다.');
      return;
    }
    const idx = adminUsers.indexOf(id);
    if (idx > -1) {
      adminUsers.splice(idx, 1);
      localStorage.setItem('ywe_admin_users', JSON.stringify(adminUsers));
      alert(`${id} 님의 관리자 권한이 삭제되었습니다.`);
    } else {
      alert('해당 사용자는 관리자 권한이 없습니다.');
    }
  }

  // 제보 및 FAQ 저장소 키
  const REPORTS_KEY = 'ywe_reports';
  const FAQ_KEY = 'ywe_faq';

  function getReports() {
    return JSON.parse(localStorage.getItem(REPORTS_KEY) || '[]');
  }
  function setReports(reports) {
    localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));
  }
  function getFaqs() {
    return JSON.parse(localStorage.getItem(FAQ_KEY) || '[]');
  }
  function setFaqs(faqs) {
    localStorage.setItem(FAQ_KEY, JSON.stringify(faqs));
  }

  // 전역 상태
  const app = document.getElementById('app');
  let currentTab = getLoginUser() ? 'sniper' : 'login';

  // 로그인 화면 렌더링
  function renderLogin(errorMsg = '') {
    app.innerHTML = `
      <section class="login-box" role="main" aria-label="로그인 박스">
        <h2>YWE 로그인</h2>
        <input id="id" class="login-input" placeholder="아이디" aria-label="아이디 입력란" autocomplete="username" />
        <input id="pw" class="login-input" placeholder="비밀번호" type="password" aria-label="비밀번호 입력란" autocomplete="current-password" />
        <button class="login-button" onclick="handleLogin()">로그인</button>
        <button class="login-button" onclick="handleSignup()">회원가입</button>
        <div id="login-error" role="alert" aria-live="assertive">${escapeHtml(errorMsg)}</div>
      </section>
    `;
  }

  // 로그인 처리
  function handleLogin() {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    if (!id || !pw) {
      renderLogin('아이디와 비밀번호를 모두 입력해 주십시오.');
      return;
    }
    const savedPw = getUserPw(id);
    if (savedPw === pw) {
      setLoginUser(id);
      currentTab = 'sniper';
      renderApp();
    } else {
      renderLogin('아이디 또는 비밀번호가 올바르지 않습니다.');
    }
  }

  // 회원가입 처리
  function handleSignup() {
    const id = document.getElementById('id').value.trim();
    const pw = document.getElementById('pw').value.trim();
    if (!id || !pw) {
      alert('아이디와 비밀번호를 모두 입력해 주십시오.');
      return;
    }
    if (getUserPw(id)) {
      alert('이미 존재하는 아이디입니다.');
      return;
    }
    setUserPw(id, pw);
    alert('회원가입이 완료되었습니다. 로그인 해 주십시오.');
    renderLogin();
  }

  // 관리자 권한 확인
  function isAdmin(userId) {
    return adminUsers.includes(userId);
  }

  // 사이드바 렌더링
  function renderSidebar(active) {
    const loginUser = getLoginUser();
    return `
      <nav class="sidebar" role="navigation" aria-label="메인 메뉴">
        <a href="#" id="nav-sniper" class="${active === 'sniper' ? 'active' : ''}" onclick="switchTab('sniper')" aria-current="${active === 'sniper' ? 'page' : undefined}">스나이퍼</a>
        <a href="#" id="nav-submit" class="${active === 'submit' ? 'active' : ''}" onclick="switchTab('submit')" aria-current="${active === 'submit' ? 'page' : undefined}">제보 신청</a>
        <a href="#" id="nav-faq" class="${active === 'faq' ? 'active' : ''}" onclick="switchTab('faq')" aria-current="${active === 'faq' ? 'page' : undefined}">자주 묻는 질문</a>
        ${isAdmin(loginUser) ? `<a href="#" id="nav-admin" class="${active === 'admin' ? 'active' : ''}" onclick="switchTab('admin')" aria-current="${active === 'admin' ? 'page' : undefined}">관리자</a>` : ''}
        <button class="logout-btn" onclick="logout()" aria-label="로그아웃">${escapeHtml(loginUser)} 님 로그아웃</button>
      </nav>
    `;
  }

  // 스나이퍼 탭 렌더링
  function renderSniper() {
    const reports = getReports();
    let html = `
      <h1 class="header">YWE 스나이퍼 제보 목록</h1>
      ${reports.length === 0 ? `<p>등록된 제보가 없습니다.</p>` : ''}
    `;
    reports.forEach((report, index) => {
      html += `
        <section class="card" role="region" aria-labelledby="report-title-${index}">
          <h2 id="report-title-${index}" class="report-title">${escapeHtml(report.title)}</h2>
          <p>${simpleMarkdown(report.content)}</p>
          <small>작성자: ${escapeHtml(report.author)}</small>
        </section>
      `;
    });
    return html;
  }

  // 제보 신청 탭 렌더링
  function renderSubmit() {
    return `
      <h1 class="header">YWE 제보 신청</h1>
      <label for="report-title-input">제목</label>
      <input type="text" id="report-title-input" aria-required="true" placeholder="제목을 입력하세요" />
      <label for="report-content-input">내용</label>
      <textarea id="report-content-input" rows="8" aria-required="true" placeholder="내용을 입력하세요"></textarea>
      <button onclick="submitReport()">제출하기</button>
      <div id="submit-message" role="alert" aria-live="polite"></div>
    `;
  }

  // FAQ 탭 렌더링
  function renderFaq() {
    const faqs = getFaqs();
    let html = `
      <h1 class="header">자주 묻는 질문</h1>
      ${faqs.length === 0 ? '<p>등록된 FAQ가 없습니다.</p>' : ''}
      <ul>
    `;
    faqs.forEach((faq, index) => {
      html += `<li><strong>${escapeHtml(faq.question)}</strong><br>${simpleMarkdown(faq.answer)}</li>`;
    });
    html += '</ul>';
    return html;
  }

  // 관리자 탭 렌더링
  function renderAdmin() {
    const loginUser = getLoginUser();
    if (!isAdmin(loginUser)) {
      return `<p>관리자 권한이 없습니다.</p>`;
    }

    const admins = getAdminUsers();
    let html = `
      <h1 class="header">관리자 페이지</h1>
      <section class="card" aria-label="관리자 권한 관리">
        <h2>관리자 권한 관리</h2>
        <input type="text" id="admin-add-input" placeholder="추가할 관리자 아이디 입력" aria-label="관리자 추가 아이디" />
        <button onclick="handleAddAdmin()">추가</button>
        <input type="text" id="admin-remove-input" placeholder="삭제할 관리자 아이디 입력" aria-label="관리자 삭제 아이디" />
        <button onclick="handleRemoveAdmin()">삭제</button>
        <p>현재 관리자 목록: ${admins.map(id => escapeHtml(id)).join(', ')}</p>
      </section>
      <section class="card" aria-label="FAQ 관리">
        <h2>FAQ 관리</h2>
        <button onclick="renderFaqEdit()">FAQ 편집하기</button>
      </section>
    `;
    return html;
  }

  // FAQ 편집 화면 렌더링 (간단 예시)
  function renderFaqEdit() {
    const faqs = getFaqs();
    let html = `
      <h1 class="header">FAQ 편집</h1>
      <div id="faq-list-edit">
    `;
    faqs.forEach((faq, idx) => {
      html += `
        <div class="card">
          <input type="text" id="faq-question-${idx}" value="${escapeHtml(faq.question)}" />
          <textarea id="faq-answer-${idx}" rows="4">${escapeHtml(faq.answer)}</textarea>
          <button onclick="removeFaq(${idx})">삭제</button>
        </div>
      `;
    });
    html += `
      </div>
      <button onclick="addFaq()">FAQ 추가</button>
      <button onclick="saveFaq()">저장하기</button>
      <button onclick="switchTab('admin')">취소</button>
      <div id="faq-edit-message" role="alert" aria-live="polite"></div>
    `;
    app.innerHTML = renderSidebar('admin') + `<main class="content">${html}</main>`;
  }

  // FAQ 편집 함수들
  function addFaq() {
    const faqList = document.getElementById('faq-list-edit');
    const idx = faqList.children.length;
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <input type="text" id="faq-question-${idx}" placeholder="질문 입력" />
      <textarea id="faq-answer-${idx}" rows="4" placeholder="답변 입력"></textarea>
      <button onclick="removeFaq(${idx})">삭제</button>
    `;
    faqList.appendChild(div);
  }
  function removeFaq(idx) {
    const faqList = document.getElementById('faq-list-edit');
    if (faqList.children[idx]) {
      faqList.removeChild(faqList.children[idx]);
      // 재정렬 필요 (간단 구현 생략 가능)
      renderFaqEdit(); 
    }
  }
  function saveFaq() {
    const faqList = document.getElementById('faq-list-edit');
    const faqs = [];
    for (let i = 0; i < faqList.children.length; i++) {
      const q = faqList.children[i].querySelector(`#faq-question-${i}`).value.trim();
      const a = faqList.children[i].querySelector(`#faq-answer-${i}`).value.trim();
      if (q && a) {
        faqs.push({question: q, answer: a});
      }
    }
    setFaqs(faqs);
    document.getElementById('faq-edit-message').textContent = 'FAQ가 저장되었습니다.';
  }

  // 제보 제출 처리
  function submitReport() {
    const titleInput = document.getElementById('report-title-input');
    const contentInput = document.getElementById('report-content-input');
    const msgDiv = document.getElementById('submit-message');
    const title = titleInput.value.trim();
    const content = contentInput.value.trim();
    const author = getLoginUser();

    if (!title || !content) {
      msgDiv.textContent = '제목과 내용을 모두 입력해 주세요.';
      return;
    }

    const reports = getReports();
    reports.push({title, content, author});
    setReports(reports);

    msgDiv.textContent = '제보가 정상적으로 제출되었습니다.';
    titleInput.value = '';
    contentInput.value = '';
    renderApp();
  }

  // 탭 전환
  function switchTab(tab) {
    currentTab = tab;
    renderApp();
  }

  // 앱 렌더링
  function renderApp() {
    if (currentTab === 'login') {
      renderLogin();
      return;
    }

    const loginUser = getLoginUser();
    app.innerHTML = renderSidebar(currentTab) + `<main class="content" role="main">`;

    switch (currentTab) {
      case 'sniper':
        app.innerHTML += renderSniper();
        break;
      case 'submit':
        app.innerHTML += renderSubmit();
        break;
      case 'faq':
        app.innerHTML += renderFaq();
        break;
      case 'admin':
        app.innerHTML += renderAdmin();
        break;
      default:
        app.innerHTML += '<p>잘못된 탭입니다.</p>';
    }

    app.innerHTML += '</main>';
  }

  // 초기 렌더링
  renderApp();

  // 전역 함수 노출 (onclick 등에서 사용하기 위해)
  window.handleLogin = handleLogin;
  window.handleSignup = handleSignup;
  window.logout = logout;
  window.switchTab = switchTab;
  window.submitReport = submitReport;
  window.handleAddAdmin = () => {
    const id = document.getElementById('admin-add-input').value.trim();
    if (id) addAdminUser(id);
    renderApp();
  };
  window.handleRemoveAdmin = () => {
    const id = document.getElementById('admin-remove-input').value.trim();
    if (id) removeAdminUser(id);
    renderApp();
  };
  window.renderFaqEdit = renderFaqEdit;
  window.addFaq = addFaq;
  window.removeFaq = removeFaq;
  window.saveFaq = saveFaq;

</script>
</body>
</html>
