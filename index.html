<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>스나이퍼 공식 사이트 | YWE</title>
<style>
  /* 네온 스타일 기본 셋업 */
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    background: #01030f;
    color: #0ff;
    font-family: 'Orbitron', monospace, 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
  }
  .container {
    width: 900px;
    background: #001020;
    border: 2px solid #0ff;
    border-radius: 15px;
    box-shadow:
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 40px #0ff;
    padding: 30px 40px;
  }
  h1, h2 {
    color: #0ff;
    text-align: center;
    text-shadow:
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 30px #0ff;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: 700;
    text-shadow: 0 0 6px #0ff;
  }
  input[type="text"], input[type="password"], textarea {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    background: #001820;
    border: 1px solid #0ff;
    border-radius: 10px;
    color: #0ff;
    font-size: 1rem;
    box-shadow:
      inset 0 0 5px #0ff;
  }
  textarea {
    resize: vertical;
    min-height: 120px;
  }
  button {
    margin-top: 20px;
    background: #0ff;
    border: none;
    padding: 12px 25px;
    font-weight: 700;
    color: #001820;
    border-radius: 15px;
    cursor: pointer;
    font-size: 1rem;
    box-shadow:
      0 0 10px #0ff;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background: #06caca;
    color: #000;
    box-shadow:
      0 0 20px #06caca,
      0 0 40px #06caca;
  }
  nav {
    text-align: center;
    margin-bottom: 30px;
  }
  nav button {
    background: transparent;
    border: 2px solid #0ff;
    margin: 0 10px;
    padding: 8px 20px;
    border-radius: 12px;
    color: #0ff;
    font-weight: 700;
    font-size: 1rem;
    transition: all 0.3s ease;
  }
  nav button:hover {
    background: #0ff;
    color: #001820;
    box-shadow: 0 0 15px #0ff;
  }
  .message {
    margin-top: 15px;
    font-weight: 700;
    text-align: center;
  }
  .message.error {
    color: #ff3366;
    text-shadow: 0 0 6px #ff3366;
  }
  .message.success {
    color: #33ff99;
    text-shadow: 0 0 6px #33ff99;
  }
  #sidebar {
    background: #001820dd;
    border: 1px solid #0ff;
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    color: #0ff;
    font-weight: 700;
    text-shadow: 0 0 6px #0ff;
  }
  #sidebar div {
    user-select: none;
  }
  ul.list {
    list-style: none;
    padding-left: 0;
  }
  ul.list li {
    background: #002844;
    border-radius: 10px;
    padding: 15px 20px;
    margin-bottom: 15px;
    box-shadow:
      inset 0 0 10px #005577;
    position: relative;
  }
  ul.list li strong.title {
    font-size: 1.2rem;
    margin-bottom: 8px;
    display: block;
    text-shadow: 0 0 8px #0ff;
  }
  ul.list li .markdown {
    color: #a0f0ff;
    line-height: 1.4em;
    white-space: pre-wrap;
  }
  ul.list li .image-preview {
    margin-top: 10px;
  }
  ul.list li .image-preview img {
    max-width: 120px;
    margin-right: 12px;
    border-radius: 8px;
    box-shadow:
      0 0 10px #0ff;
    cursor: default;
    vertical-align: middle;
    transition: transform 0.3s ease;
  }
  ul.list li .image-preview img:hover {
    transform: scale(1.1);
  }
  .btn-small {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #0ff;
    border: none;
    color: #001820;
    font-weight: 700;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.25s ease;
    box-shadow: 0 0 6px #0ff;
  }
  .btn-small + .btn-small {
    right: 85px;
  }
  .btn-small:hover {
    background: #06caca;
    color: #000;
  }
  form label.inline {
    display: inline-block;
    margin-right: 12px;
  }
  .footer {
    margin-top: 40px;
    font-size: 0.9rem;
    color: #0ff6;
    text-align: center;
    user-select: none;
  }
  /* Scrollbar for better UX */
  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-thumb {
    background: #0ff;
    border-radius: 10px;
  }
  ::-webkit-scrollbar-track {
    background: #001020;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>스나이퍼 공식 사이트 | YWE</h1>
    <nav>
      <button id="nav-login">로그인</button>
      <button id="nav-signup">회원가입</button>
      <button id="nav-main" style="display:none;">홈</button>
      <button id="nav-logout" style="display:none;">로그아웃</button>
    </nav>
  </header>

  <aside id="sidebar" style="display:none;">
    <div><strong>사용자:</strong> <span id="sidebar-userid"></span></div>
    <div id="sidebar-ip-wrapper" style="display:none;"><strong>내 IP:</strong> <span id="sidebar-ip">불러오는 중...</span></div>
  </aside>

  <main id="app">
    <!-- 여기에 화면 렌더링 -->
  </main>

  <div class="footer">
    &copy; 2025 YWE. All rights reserved.
  </div>
</div>

<script>
(() => {
  'use strict';

  // 로컬스토리지 키
  const USER_KEY = 'ywe_users';
  const FAQ_KEY = 'ywe_faqs';
  const SNIPER_KEY = 'ywe_snipers';

  // 관리자 아이디 (기본 admin)
  const ADMIN_ID = 'admin';

  // 상태
  let currentUserId = null;
  let state = {
    page: 'login', // login, signup, main, faqForm, sniperForm
    editingFaqId: null,
    editingSniperId: null,
    message: { text: '', type: '' }
  };

  // DOM
  const app = document.getElementById('app');
  const navLogin = document.getElementById('nav-login');
  const navSignup = document.getElementById('nav-signup');
  const navMain = document.getElementById('nav-main');
  const navLogout = document.getElementById('nav-logout');
  const sidebar = document.getElementById('sidebar');
  const sidebarUserId = document.getElementById('sidebar-userid');
  const sidebarIpWrapper = document.getElementById('sidebar-ip-wrapper');
  const sidebarIp = document.getElementById('sidebar-ip');

  // 유틸 함수 - 로컬스토리지 읽기/쓰기
  function loadUsers() {
    return JSON.parse(localStorage.getItem(USER_KEY) || '{}');
  }
  function saveUsers(users) {
    localStorage.setItem(USER_KEY, JSON.stringify(users));
  }
  function loadFaqs() {
    return JSON.parse(localStorage.getItem(FAQ_KEY) || '[]');
  }
  function saveFaqs(faqs) {
    localStorage.setItem(FAQ_KEY, JSON.stringify(faqs));
  }
  function loadSnipers() {
    return JSON.parse(localStorage.getItem(SNIPER_KEY) || '[]');
  }
  function saveSnipers(snipers) {
    localStorage.setItem(SNIPER_KEY, JSON.stringify(snipers));
  }

  // HTML 이스케이프
  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>"']/g, c => {
      switch(c) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '"': return '&quot;';
        case "'": return '&#39;';
      }
    });
  }

  // 간단 마크다운 파서 (볼드, 이탤릭, 줄바꿈)
  function parseMarkdown(text) {
    if (!text) return '';
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    html = html.replace(/\n/g, '<br/>');
    return html;
  }

  // 관리자 여부 판단
  function isAdmin() {
    if (!currentUserId) return false;
    const users = loadUsers();
    return users[currentUserId] && users[currentUserId].isAdmin === true;
  }

  // ID 생성 (랜덤 8자리)
  function generateId() {
    return Math.random().toString(36).substring(2, 10);
  }

  // IP 가져오기 (관리자만)
  async function fetchUserIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      if (!res.ok) return null;
      const data = await res.json();
      return data.ip;
    } catch {
      return null;
    }
  }

  // 내비게이션 UI 업데이트
  function updateNav() {
    if (currentUserId) {
      navLogin.style.display = 'none';
      navSignup.style.display = 'none';
      navMain.style.display = 'inline-block';
      navLogout.style.display = 'inline-block';
      sidebar.style.display = 'flex';
      sidebarUserId.textContent = currentUserId;

      if (isAdmin()) {
        sidebarIpWrapper.style.display = 'block';
        sidebarIp.textContent = '불러오는 중...';
        fetchUserIP().then(ip => {
          sidebarIp.textContent = ip || '알 수 없음';
        });
      } else {
        sidebarIpWrapper.style.display = 'none';
      }
    } else {
      navLogin.style.display = 'inline-block';
      navSignup.style.display = 'inline-block';
      navMain.style.display = 'none';
      navLogout.style.display = 'none';
      sidebar.style.display = 'none';
      sidebarUserId.textContent = '';
      sidebarIp.textContent = '';
      sidebarIpWrapper.style.display = 'none';
    }
  }

  // 화면 전환 함수
  function navigate(page) {
    state.page = page;
    state.message = { text: '', type: '' };
    state.editingFaqId = null;
    state.editingSniperId = null;
    render();
  }

  // 로그인 화면 렌더링
  function renderLogin() {
    app.innerHTML = `
      <h2>로그인</h2>
      <label for="login-id">아이디</label>
      <input type="text" id="login-id" autocomplete="username" />
      <label for="login-pw">비밀번호</label>
      <input type="password" id="login-pw" autocomplete="current-password" />
      <button id="btn-login">로그인</button>
      <button id="go-signup" style="margin-left:10px;background:none;color:#0ff;border:none;cursor:pointer;text-decoration:underline;">회원가입</button>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('btn-login').onclick = () => {
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value;
      const users = loadUsers();

      if (!id || !pw) {
        state.message = { text: '아이디와 비밀번호를 입력해주세요.', type: 'error' };
        renderLogin();
        return;
      }
      if (!users[id] || users[id].password !== pw) {
        state.message = { text: '아이디 또는 비밀번호가 올바르지 않습니다.', type: 'error' };
        renderLogin();
        return;
      }
      currentUserId = id;
      state.message = { text: '', type: '' };
      updateNav();
      navigate('main');
    };

    document.getElementById('go-signup').onclick = () => navigate('signup');
  }

  // 회원가입 화면 렌더링 (관리자 등록용 체크박스 포함)
  function renderSignup() {
    app.innerHTML = `
      <h2>회원가입</h2>
      <label for="signup-id">아이디</label>
      <input type="text" id="signup-id" autocomplete="username" />
      <label for="signup-pw">비밀번호</label>
      <input type="password" id="signup-pw" autocomplete="new-password" />
      <label for="signup-pw2">비밀번호 확인</label>
      <input type="password" id="signup-pw2" autocomplete="new-password" />
      <label><input type="checkbox" id="signup-admin" /> 관리자 권한 요청</label>
      <button id="btn-signup">회원가입</button>
      <button id="go-login" style="margin-left:10px;background:none;color:#0ff;border:none;cursor:pointer;text-decoration:underline;">로그인</button>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('btn-signup').onclick = () => {
      const id = document.getElementById('signup-id').value.trim();
      const pw = document.getElementById('signup-pw').value;
      const pw2 = document.getElementById('signup-pw2').value;
      const reqAdmin = document.getElementById('signup-admin').checked;
      const users = loadUsers();

      if (!id || !pw || !pw2) {
        state.message = { text: '모든 항목을 입력해주세요.', type: 'error' };
        renderSignup();
        return;
      }
      if (users[id]) {
        state.message = { text: '이미 존재하는 아이디입니다.', type: 'error' };
        renderSignup();
        return;
      }
      if (pw !== pw2) {
        state.message = { text: '비밀번호가 일치하지 않습니다.', type: 'error' };
        renderSignup();
        return;
      }
      // 관리자 권한은 id가 'admin' 일 때만 부여 허용
      let isAdminFlag = false;
      if(reqAdmin && id === ADMIN_ID) {
        isAdminFlag = true;
      } else if(reqAdmin) {
        state.message = { text: `'${ADMIN_ID}' 아이디만 관리자 권한 부여 가능합니다.`, type: 'error' };
        renderSignup();
        return;
      }

      users[id] = { password: pw, isAdmin: isAdminFlag };
      saveUsers(users);
      alert('회원가입이 완료되었습니다. 로그인 해주세요.');
      state.message = { text: '', type: '' };
      navigate('login');
    };

    document.getElementById('go-login').onclick = () => navigate('login');
  }

  // 메인 화면 (FAQ + 스나이퍼 목록)
  function renderMain() {
    const faqs = loadFaqs();
    const snipers = loadSnipers();
    const admin = isAdmin();

    let html = `<h2>FAQ</h2><ul class="list">`;
    if (faqs.length === 0) {
      html += `<li>등록된 FAQ가 없습니다.</li>`;
    } else {
      for (const faq of faqs) {
        html += `<li>
          <strong class="title">${escapeHtml(faq.title)}</strong>
          <div class="markdown">${parseMarkdown(faq.description)}</div>`;
        if (admin) {
          html += `
            <button class="btn-small" data-faq-id="${faq.id}" data-action="edit-faq">수정</button>
            <button class="btn-small" data-faq-id="${faq.id}" data-action="delete-faq">삭제</button>
          `;
        }
        html += `</li>`;
      }
    }
    html += `</ul>`;

    html += `<h2>스나이퍼 목록</h2><ul class="list">`;
    if (snipers.length === 0) {
      html += `<li>등록된 스나이퍼가 없습니다.</li>`;
    } else {
      for (const sniper of snipers) {
        html += `<li>
          <strong class="title">${escapeHtml(sniper.name)}</strong>
          <div class="markdown">${parseMarkdown(sniper.description)}</div>`;
        if (sniper.images && sniper.images.length > 0) {
          html += `<div class="image-preview">`;
          for (const img of sniper.images) {
            html += `<img src="${escapeHtml(img)}" alt="스나이퍼 이미지" />`;
          }
          html += `</div>`;
        }
        if (admin) {
          html += `
            <button class="btn-small" data-sniper-id="${sniper.id}" data-action="edit-sniper">수정</button>
            <button class="btn-small" data-sniper-id="${sniper.id}" data-action="delete-sniper">삭제</button>
          `;
        }
        html += `</li>`;
      }
    }
    html += `</ul>`;

    if (admin) {
      html += `
        <button id="btn-add-faq" style="margin-right: 15px;">FAQ 추가</button>
        <button id="btn-add-sniper">스나이퍼 추가</button>
      `;
    }

    html += `<div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>`;

    app.innerHTML = html;

    // 버튼 이벤트 바인딩
    if (admin) {
      document.getElementById('btn-add-faq').onclick = () => {
        state.editingFaqId = null;
        navigate('faqForm');
      };
      document.getElementById('btn-add-sniper').onclick = () => {
        state.editingSniperId = null;
        navigate('sniperForm');
      };
    }

    // FAQ 수정/삭제 이벤트
    app.querySelectorAll('button[data-action="edit-faq"]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute('data-faq-id');
        state.editingFaqId = id;
        navigate('faqForm');
      };
    });
    app.querySelectorAll('button[data-action="delete-faq"]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute('data-faq-id');
        if (confirm('FAQ를 삭제하시겠습니까?')) {
          const updatedFaqs = faqs.filter(f => f.id !== id);
          saveFaqs(updatedFaqs);
          state.message = { text: 'FAQ가 삭제되었습니다.', type: 'success' };
          renderMain();
        }
      };
    });

    // 스나이퍼 수정/삭제 이벤트
    app.querySelectorAll('button[data-action="edit-sniper"]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute('data-sniper-id');
        state.editingSniperId = id;
        navigate('sniperForm');
      };
    });
    app.querySelectorAll('button[data-action="delete-sniper"]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute('data-sniper-id');
        if (confirm('스나이퍼를 삭제하시겠습니까?')) {
          const updatedSnipers = snipers.filter(s => s.id !== id);
          saveSnipers(updatedSnipers);
          state.message = { text: '스나이퍼가 삭제되었습니다.', type: 'success' };
          renderMain();
        }
      };
    });
  }

  // FAQ 추가/수정 폼 렌더링
  function renderFaqForm() {
    const faqs = loadFaqs();
    let faq = { id: '', title: '', description: '' };
    if (state.editingFaqId) {
      const found = faqs.find(f => f.id === state.editingFaqId);
      if (found) faq = found;
    }

    app.innerHTML = `
      <h2>${state.editingFaqId ? 'FAQ 수정' : 'FAQ 추가'}</h2>
      <label for="faq-title">제목</label>
      <input type="text" id="faq-title" value="${escapeHtml(faq.title)}" />
      <label for="faq-description">설명</label>
      <textarea id="faq-description">${escapeHtml(faq.description)}</textarea>
      <button id="btn-save-faq">${state.editingFaqId ? '수정 완료' : '추가하기'}</button>
      <button id="btn-cancel-faq" style="margin-left: 10px;">취소</button>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('btn-save-faq').onclick = () => {
      const title = document.getElementById('faq-title').value.trim();
      const description = document.getElementById('faq-description').value.trim();

      if (!title || !description) {
        state.message = { text: '제목과 설명을 모두 입력해주세요.', type: 'error' };
        renderFaqForm();
        return;
      }

      if (state.editingFaqId) {
        // 수정
        const index = faqs.findIndex(f => f.id === state.editingFaqId);
        if (index !== -1) {
          faqs[index].title = title;
          faqs[index].description = description;
          saveFaqs(faqs);
          state.message = { text: 'FAQ가 수정되었습니다.', type: 'success' };
        }
      } else {
        // 추가
        const newFaq = { id: generateId(), title, description };
        faqs.push(newFaq);
        saveFaqs(faqs);
        state.message = { text: 'FAQ가 추가되었습니다.', type: 'success' };
      }
      navigate('main');
    };

    document.getElementById('btn-cancel-faq').onclick = () => navigate('main');
  }

  // 스나이퍼 추가/수정 폼 렌더링
  function renderSniperForm() {
    const snipers = loadSnipers();
    let sniper = { id: '', name: '', description: '', images: [] };
    if (state.editingSniperId) {
      const found = snipers.find(s => s.id === state.editingSniperId);
      if (found) sniper = found;
    }

    app.innerHTML = `
      <h2>${state.editingSniperId ? '스나이퍼 수정' : '스나이퍼 추가'}</h2>
      <label for="sniper-name">이름</label>
      <input type="text" id="sniper-name" value="${escapeHtml(sniper.name)}" />
      <label for="sniper-description">설명</label>
      <textarea id="sniper-description">${escapeHtml(sniper.description)}</textarea>
      <label for="sniper-images">이미지 URL (콤마로 구분)</label>
      <textarea id="sniper-images">${escapeHtml(sniper.images.join(', '))}</textarea>
      <button id="btn-save-sniper">${state.editingSniperId ? '수정 완료' : '추가하기'}</button>
      <button id="btn-cancel-sniper" style="margin-left: 10px;">취소</button>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('btn-save-sniper').onclick = () => {
      const name = document.getElementById('sniper-name').value.trim();
      const description = document.getElementById('sniper-description').value.trim();
      const imagesText = document.getElementById('sniper-images').value.trim();

      if (!name || !description) {
        state.message = { text: '이름과 설명을 모두 입력해주세요.', type: 'error' };
        renderSniperForm();
        return;
      }

      const images = imagesText
        ? imagesText.split(',').map(s => s.trim()).filter(s => s)
        : [];

      if (state.editingSniperId) {
        // 수정
        const index = snipers.findIndex(s => s.id === state.editingSniperId);
        if (index !== -1) {
          snipers[index].name = name;
          snipers[index].description = description;
          snipers[index].images = images;
          saveSnipers(snipers);
          state.message = { text: '스나이퍼가 수정되었습니다.', type: 'success' };
        }
      } else {
        // 추가
        const newSniper = { id: generateId(), name, description, images };
        snipers.push(newSniper);
        saveSnipers(snipers);
        state.message = { text: '스나이퍼가 추가되었습니다.', type: 'success' };
      }
      navigate('main');
    };

    document.getElementById('btn-cancel-sniper').onclick = () => navigate('main');
  }

  // 초기 렌더링 함수
  function render() {
    switch(state.page) {
      case 'login': renderLogin(); break;
      case 'signup': renderSignup(); break;
      case 'main': renderMain(); break;
      case 'faqForm': renderFaqForm(); break;
      case 'sniperForm': renderSniperForm(); break;
      default: renderLogin(); break;
    }
    updateNav();
  }

  // 네비게이션 버튼 이벤트
  navLogin.onclick = () => navigate('login');
  navSignup.onclick = () => navigate('signup');
  navMain.onclick = () => navigate('main');
  navLogout.onclick = () => {
    if (confirm('로그아웃 하시겠습니까?')) {
      currentUserId = null;
      state.message = { text: '로그아웃 되었습니다.', type: 'success' };
      navigate('login');
    }
  };

  // 시작
  render();

})();
</script>
</body>
</html>
