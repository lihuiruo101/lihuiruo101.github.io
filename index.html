<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YWE 스나이퍼 공식 사이트</title>
<style>
  /* Reset & 기본 네온 스타일 */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #001122, #003355);
    color: #00ffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 30px 20px;
    overflow-y: auto;
  }
  h1 {
    font-size: 3.2rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px #00ffffcc;
    letter-spacing: 0.15em;
    user-select: none;
  }
  .container {
    background: #012233dd;
    padding: 40px 50px;
    border-radius: 25px;
    box-shadow: 0 0 40px #00ffffaa;
    width: 100%;
    max-width: 560px;
    min-height: 520px;
  }
  label {
    display: block;
    margin-top: 20px;
    font-weight: 700;
    user-select: text;
  }
  input[type=text], input[type=password], input[type=email], textarea {
    width: 100%;
    padding: 14px 18px;
    margin-top: 8px;
    border-radius: 14px;
    border: 2.5px solid #00ffffcc;
    background: #001122;
    color: #00ffff;
    font-size: 1.25rem;
    font-weight: 600;
    box-shadow: inset 0 0 15px #00ffff88;
    transition: 0.4s;
    user-select: text;
    resize: vertical;
  }
  input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, textarea:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 35px #00ffffcc;
    background: #003355;
  }
  button {
    width: 100%;
    padding: 18px 0;
    margin-top: 30px;
    border-radius: 16px;
    border: none;
    background: #00ffff;
    color: #003344;
    font-size: 1.4rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 0 35px #00ffffbb;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
  }
  button:hover:not(:disabled) {
    background: #00e6cc;
    box-shadow: 0 0 45px #00e6ccff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }
  .link-button {
    margin-top: 15px;
    color: #00ffffcc;
    text-align: center;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    border: none;
    background: none;
  }
  .link-button:hover {
    color: #00ffff;
    text-decoration: underline;
  }
  .message {
    margin-top: 15px;
    font-weight: 700;
    min-height: 1.5em;
    user-select: none;
  }
  .error {
    color: #ff5555;
    text-shadow: 0 0 8px #ff5555cc;
  }
  .success {
    color: #55ff55;
    text-shadow: 0 0 8px #55ff55cc;
  }
  /* 관리자 제보 리스트 */
  #report-list {
    max-height: 300px;
    overflow-y: auto;
    margin-top: 20px;
    border: 2px solid #00ffffaa;
    border-radius: 12px;
    padding: 15px;
    background: #003344dd;
  }
  #report-list h2 {
    text-align: center;
    margin-bottom: 12px;
    font-weight: 900;
    letter-spacing: 0.1em;
    user-select: none;
  }
  #report-list ul {
    list-style: none;
    padding-left: 0;
  }
  #report-list li {
    padding: 12px 15px;
    margin-bottom: 12px;
    background: #004466cc;
    border-radius: 12px;
    font-size: 1.05rem;
    word-break: break-word;
    user-select: text;
  }
  /* 사이드바 */
  #sidebar {
    position: fixed;
    right: 10px;
    top: 50px;
    width: 260px;
    background: #001f3fdd;
    border: 2px solid #00ffffcc;
    border-radius: 15px;
    box-shadow: 0 0 30px #00ffffcc;
    padding: 20px;
    color: #00ffff;
    font-weight: 700;
    user-select: text;
    font-size: 1rem;
    max-height: 90vh;
    overflow-y: auto;
  }
  #sidebar h3 {
    margin-bottom: 15px;
    text-align: center;
    text-shadow: 0 0 8px #00ffffcc;
  }
  #sidebar p {
    margin: 8px 0;
    word-break: break-word;
  }
  /* 반응형 */
  @media screen and (max-width: 720px) {
    #sidebar {
      position: static;
      width: 100%;
      max-height: none;
      margin-top: 30px;
      box-shadow: none;
      border: none;
      background: transparent;
      padding: 0;
    }
    body {
      padding: 20px 10px;
    }
    .container {
      max-width: 100%;
      border-radius: 12px;
      padding: 30px 25px;
      min-height: auto;
    }
  }
</style>
</head>
<body>

<h1>YWE 스나이퍼 공식 사이트</h1>
<div class="container" id="app">
  <!-- JS 렌더 영역 -->
</div>

<div id="sidebar" aria-label="유저 정보 사이드바">
  <h3>사용자 정보</h3>
  <p><strong>아이디: </strong><span id="sidebar-userid">-</span></p>
  <p><strong>IP 주소: </strong><span id="sidebar-ip">로딩 중...</span></p>
  <p><strong>이메일: </strong><span id="sidebar-email">로딩 중...</span></p>
</div>

<script>
'use strict';

const USERS_KEY = 'ywe_users';
const REPORTS_KEY = 'ywe_reports';

const ADMIN_ID = 'lihuiruo101';

let currentUserId = null;
let state = {
  page: 'login', // login, signup, main, findPw, resetPw, report, adminReports
  findPwUserId: null,
  findPwVerified: false,
  messages: { error: '', success: '' },
};

// 헬퍼: HTML 이스케이프
function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>"']/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[m]);
}

// 유저 데이터 불러오기/저장
function loadUsers() {
  return JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
}
function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

// 제보 데이터 불러오기/저장
function loadReports() {
  return JSON.parse(localStorage.getItem(REPORTS_KEY) || '[]');
}
function saveReports(reports) {
  localStorage.setItem(REPORTS_KEY, JSON.stringify(reports));
}

// IP 자동 수집 (ipify API)
async function fetchIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    if (!res.ok) throw new Error('IP fetch failed');
    const data = await res.json();
    return data.ip || '알 수 없음';
  } catch {
    return '알 수 없음';
  }
}

// 랜덤 이메일 생성 (테스트용)
function generateRandomEmail() {
  const domains = ['ywe.fake', 'snipermail.com', 'example.com'];
  const prefix = 'user' + Math.floor(Math.random() * 100000);
  return prefix + '@' + domains[Math.floor(Math.random() * domains.length)];
}

// 메시지 표시
function setMessage(type, text) {
  state.messages.error = '';
  state.messages.success = '';
  if(type === 'error') state.messages.error = text;
  if(type === 'success') state.messages.success = text;
  render();
}

const app = document.getElementById('app');
const sidebarUserIdEl = document.getElementById('sidebar-userid');
const sidebarIpEl = document.getElementById('sidebar-ip');
const sidebarEmailEl = document.getElementById('sidebar-email');

async function updateSidebarInfo() {
  sidebarUserIdEl.textContent = currentUserId ? escapeHtml(currentUserId) : '-';
  let ip = localStorage.getItem('ywe_user_ip');
  let email = localStorage.getItem('ywe_user_email');
  if(!ip) {
    ip = await fetchIP();
    localStorage.setItem('ywe_user_ip', ip);
  }
  if(!email) {
    email = generateRandomEmail();
    localStorage.setItem('ywe_user_email', email);
  }
  sidebarIpEl.textContent = escapeHtml(ip);
  sidebarEmailEl.textContent = escapeHtml(email);
}

// 로그인 폼 렌더링
function renderLogin() {
  app.innerHTML = `
    <h2>로그인</h2>
    <label for="login-userid">아이디</label>
    <input type="text" id="login-userid" autocomplete="username" />
    <label for="login-password">비밀번호</label>
    <input type="password" id="login-password" autocomplete="current-password" />
    <button id="login-btn">로그인</button>
    <button class="link-button" id="go-signup">회원가입</button>
    <button class="link-button" id="go-findpw">비밀번호 찾기</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
    <div class="message success">${escapeHtml(state.messages.success)}</div>
  `;
  state.messages.error = '';
  state.messages.success = '';

  document.getElementById('login-btn').addEventListener('click', () => {
    const userid = document.getElementById('login-userid').value.trim();
    const password = document.getElementById('login-password').value;

    if (!userid || !password) {
      setMessage('error', '아이디와 비밀번호를 모두 입력하세요.');
      return;
    }

    const users = loadUsers();
    if (!users[userid]) {
      setMessage('error', '존재하지 않는 아이디입니다.');
      return;
    }
    if (users[userid].password !== password) {
      setMessage('error', '비밀번호가 일치하지 않습니다.');
      return;
    }

    currentUserId = userid;
    setMessage('success', '로그인 성공!');
    state.page = 'main';
    saveUsers(users);
    render();
    updateSidebarInfo();
  });

  document.getElementById('go-signup').addEventListener('click', () => {
    state.page = 'signup';
    render();
  });

  document.getElementById('go-findpw').addEventListener('click', () => {
    state.page = 'findPw';
    render();
  });
}

// 회원가입 폼 렌더링
function renderSignup() {
  app.innerHTML = `
    <h2>회원가입</h2>
    <label for="signup-userid">아이디</label>
    <input type="text" id="signup-userid" autocomplete="username" />
    <label for="signup-password">비밀번호</label>
    <input type="password" id="signup-password" autocomplete="new-password" />
    <label for="signup-password-confirm">비밀번호 확인</label>
    <input type="password" id="signup-password-confirm" autocomplete="new-password" />
    <button id="signup-btn">회원가입</button>
    <button class="link-button" id="go-login">로그인으로 돌아가기</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
    <div class="message success">${escapeHtml(state.messages.success)}</div>
  `;
  state.messages.error = '';
  state.messages.success = '';

  document.getElementById('signup-btn').addEventListener('click', () => {
    const userid = document.getElementById('signup-userid').value.trim();
    const password = document.getElementById('signup-password').value;
    const passwordConfirm = document.getElementById('signup-password-confirm').value;

    if (!userid || !password || !passwordConfirm) {
      setMessage('error', '모든 항목을 입력하세요.');
      return;
    }
    if (password !== passwordConfirm) {
      setMessage('error', '비밀번호가 일치하지 않습니다.');
      return;
    }

    let users = loadUsers();
    if (users[userid]) {
      setMessage('error', '이미 존재하는 아이디입니다.');
      return;
    }

    users[userid] = {
      password: password,
      email: generateRandomEmail(),
      reports: []
    };
    saveUsers(users);
    setMessage('success', '회원가입 완료! 로그인하세요.');
    state.page = 'login';
    render();
  });

  document.getElementById('go-login').addEventListener('click', () => {
    state.page = 'login';
    render();
  });
}

// 비밀번호 찾기 폼 렌더링
function renderFindPw() {
  app.innerHTML = `
    <h2>비밀번호 찾기</h2>
    <label for="findpw-userid">아이디</label>
    <input type="text" id="findpw-userid" autocomplete="username" />
    <button id="findpw-send-btn">확인</button>
    <button class="link-button" id="go-login">로그인으로 돌아가기</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
    <div class="message success">${escapeHtml(state.messages.success)}</div>
  `;
  state.messages.error = '';
  state.messages.success = '';

  document.getElementById('findpw-send-btn').addEventListener('click', () => {
    const userid = document.getElementById('findpw-userid').value.trim();
    if (!userid) {
      setMessage('error', '아이디를 입력하세요.');
      return;
    }
    const users = loadUsers();
    if (!users[userid]) {
      setMessage('error', '존재하지 않는 아이디입니다.');
      return;
    }

    state.findPwUserId = userid;
    // 간단 인증 절차 대신 바로 인증 성공 처리
    state.findPwVerified = true;
    state.page = 'resetPw';
    setMessage('success', '아이디 확인 완료. 새로운 비밀번호를 입력하세요.');
    render();
  });

  document.getElementById('go-login').addEventListener('click', () => {
    state.page = 'login';
    render();
  });
}

// 비밀번호 재설정 폼 렌더링
function renderResetPw() {
  app.innerHTML = `
    <h2>비밀번호 재설정</h2>
    <label for="resetpw-password">새 비밀번호</label>
    <input type="password" id="resetpw-password" />
    <label for="resetpw-password-confirm">새 비밀번호 확인</label>
    <input type="password" id="resetpw-password-confirm" />
    <button id="resetpw-btn">비밀번호 변경</button>
    <button class="link-button" id="go-login">로그인으로 돌아가기</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
    <div class="message success">${escapeHtml(state.messages.success)}</div>
  `;
  state.messages.error = '';
  state.messages.success = '';

  document.getElementById('resetpw-btn').addEventListener('click', () => {
    const pw = document.getElementById('resetpw-password').value;
    const pwConfirm = document.getElementById('resetpw-password-confirm').value;
    if (!pw || !pwConfirm) {
      setMessage('error', '새 비밀번호를 모두 입력하세요.');
      return;
    }
    if (pw !== pwConfirm) {
      setMessage('error', '비밀번호가 일치하지 않습니다.');
      return;
    }

    let users = loadUsers();
    if (!state.findPwUserId || !users[state.findPwUserId]) {
      setMessage('error', '사용자 정보가 올바르지 않습니다.');
      return;
    }

    users[state.findPwUserId].password = pw;
    saveUsers(users);
    setMessage('success', '비밀번호가 변경되었습니다. 로그인하세요.');
    state.page = 'login';
    render();
  });

  document.getElementById('go-login').addEventListener('click', () => {
    state.page = 'login';
    render();
  });
}

// 메인 페이지 (로그인 후)
function renderMain() {
  app.innerHTML = `
    <h2>환영합니다, ${escapeHtml(currentUserId)}님!</h2>
    <button id="logout-btn">로그아웃</button>
    <button id="go-report">문제 제보하기</button>
    ${currentUserId === ADMIN_ID ? `<button id="go-adminReports">제보 확인 (관리자)</button>` : ''}
    <div id="user-reports"></div>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
    <div class="message success">${escapeHtml(state.messages.success)}</div>
  `;
  state.messages.error = '';
  state.messages.success = '';

  // 유저가 작성한 제보 보여주기
  const users = loadUsers();
  const reports = loadReports();
  const userReports = reports.filter(r => r.userid === currentUserId);
  const reportDiv = document.getElementById('user-reports');
  if (userReports.length === 0) {
    reportDiv.innerHTML = '<p>작성한 제보가 없습니다.</p>';
  } else {
    reportDiv.innerHTML = '<h3>내 제보 목록</h3><ul>' +
      userReports.map(r => `<li>${escapeHtml(r.content)} <small>(${new Date(r.timestamp).toLocaleString()})</small></li>`).join('') +
      '</ul>';
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
    currentUserId = null;
    setMessage('success', '로그아웃 되었습니다.');
    state.page = 'login';
    render();
    updateSidebarInfo();
  });

  document.getElementById('go-report').addEventListener('click', () => {
    state.page = 'report';
    render();
  });

  if(currentUserId === ADMIN_ID) {
    document.getElementById('go-adminReports').addEventListener('click', () => {
      state.page = 'adminReports';
      render();
    });
  }
}

// 제보하기 폼 렌더링
function renderReport() {
  app.innerHTML = `
    <h2>문제 제보하기</h2>
    <label for="report-content">제보 내용</label>
    <textarea id="report-content" rows="6" placeholder="문제나 개선 사항을 자세히 작성해주세요."></textarea>
    <button id="submit-report-btn">제보 제출</button>
    <button class="link-button" id="go-main">메인으로 돌아가기</button>
    <div class="message error">${escapeHtml(state.messages.error)}</div>
    <div class="message success">${escapeHtml(state.messages.success)}</div>
  `;
  state.messages.error = '';
  state.messages.success = '';

  document.getElementById('submit-report-btn').addEventListener('click', () => {
    const content = document.getElementById('report-content').value.trim();
    if (!content) {
      setMessage('error', '제보 내용을 입력하세요.');
      return;
    }

    const reports = loadReports();
    reports.push({
      userid: currentUserId,
      content,
      timestamp: Date.now()
    });
    saveReports(reports);

    setMessage('success', '제보가 제출되었습니다. 감사합니다!');
    render();
  });

  document.getElementById('go-main').addEventListener('click', () => {
    state.page = 'main';
    render();
  });
}

// 관리자용 제보 리스트 렌더링
function renderAdminReports() {
  const reports = loadReports();

  app.innerHTML = `
    <h2>관리자 제보 확인</h2>
    <div id="report-list">
      <h2>제보 목록</h2>
      <ul>
        ${reports.length === 0 ? '<li>제보가 없습니다.</li>' :
          reports.map((r, i) => `<li><strong>${escapeHtml(r.userid)}</strong>: ${escapeHtml(r.content)} <small>(${new Date(r.timestamp).toLocaleString()})</small> <button data-index="${i}" class="delete-report-btn">삭제</button></li>`).join('')}
      </ul>
    </div>
    <button class="link-button" id="go-main">메인으로 돌아가기</button>
  `;

  document.querySelectorAll('.delete-report-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.target.dataset.index);
      if (isNaN(idx)) return;
      reports.splice(idx, 1);
      saveReports(reports);
      setMessage('success', '제보가 삭제되었습니다.');
      render();
    });
  });

  document.getElementById('go-main').addEventListener('click', () => {
    state.page = 'main';
    render();
  });
}

// 렌더 함수
function render() {
  switch(state.page) {
    case 'login': renderLogin(); break;
    case 'signup': renderSignup(); break;
    case 'findPw': renderFindPw(); break;
    case 'resetPw': renderResetPw(); break;
    case 'main': renderMain(); break;
    case 'report': renderReport(); break;
    case 'adminReports': renderAdminReports(); break;
    default: renderLogin();
  }
}

// 초기 실행
(async () => {
  currentUserId = null;
  await updateSidebarInfo();
  render();
})();
</script>

</body>
</html>
