<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>24 NonTerror | 관리봇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: linear-gradient(145deg, #0c0c16, #1e1e2e);
      color: #eaeaea;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.06), transparent 70%);
      animation: pulse 6s infinite;
      z-index: -1;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.1); opacity: 0.05; }
      100% { transform: scale(1); opacity: 0.2; }
    }

    .container {
      max-width: 640px;
      margin: 100px auto;
      padding: 60px 40px;
      background: rgba(20, 20, 40, 0.85);
      border: 2px solid #00e6ff;
      border-radius: 20px;
      box-shadow:
        0 0 15px #00e6ff,
        0 0 30px #00bfff,
        inset 0 0 10px rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      color: #00eaff;
      margin-bottom: 30px;
      text-shadow:
        0 0 5px #00eaff,
        0 0 15px #00baff,
        0 0 25px #0077ff;
    }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      margin-top: 20px;
      font-size: 1rem;
      color: #0a0a1f;
      background: #00ffe6;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 10px #00ffe6, 0 0 30px #00ccff;
      transition: all 0.2s ease-in-out;
    }

    .btn:hover {
      background: #00ccff;
      color: white;
      box-shadow: 0 0 20px #00ccff, 0 0 40px #0099ff;
    }

    .features {
      margin-top: 40px;
      font-size: 1.1rem;
      line-height: 1.8;
      color: #bdeaff;
    }

    .features p {
      margin-bottom: 12px;
      text-shadow: 0 0 3px #0077ff;
    }

    /* 사이버 스타일 스크롤바 */
    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a2e;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00ffe6, #0099ff);
      border-radius: 10px;
      box-shadow: inset 0 0 6px #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #00ccff, #0066ff);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>24 NonTerror | 관리봇</h1>
    <a href="#" class="btn">입장하기</a>
    <div class="features">
      <p>테러방지 시스템</p>
      <p>고급 서버 관리 기능</p>
      <p>신속한 신고 처리</p>
    </div>
  </div>
</body>
</html>
