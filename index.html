<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>스나이퍼 공식 사이트 | YWE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    background: #01030f;
    color: #0ff;
    font-family: 'Orbitron', monospace, 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
  }
  .container {
    width: 900px;
    background: #001020;
    border: 2px solid #0ff;
    border-radius: 15px;
    box-shadow:
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 40px #0ff;
    padding: 30px 40px;
    display: flex;
    flex-direction: column;
    min-height: 90vh;
  }
  h1, h2 {
    color: #0ff;
    text-align: center;
    text-shadow:
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 30px #0ff;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: 700;
    text-shadow: 0 0 6px #0ff;
  }
  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    background: #001820;
    border: 1px solid #0ff;
    border-radius: 10px;
    color: #0ff;
    font-size: 1rem;
    box-shadow:
      inset 0 0 5px #0ff;
  }
  textarea {
    resize: vertical;
    min-height: 120px;
  }
  button {
    margin-top: 20px;
    background: #0ff;
    border: none;
    padding: 12px 25px;
    font-weight: 700;
    color: #001820;
    border-radius: 15px;
    cursor: pointer;
    font-size: 1rem;
    box-shadow:
      0 0 10px #0ff;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background: #06caca;
    color: #000;
    box-shadow:
      0 0 20px #06caca,
      0 0 40px #06caca;
  }
  nav {
    text-align: center;
    margin-bottom: 30px;
  }
  nav button {
    background: transparent;
    border: 2px solid #0ff;
    margin: 0 10px;
    padding: 8px 20px;
    border-radius: 12px;
    color: #0ff;
    font-weight: 700;
    font-size: 1rem;
    transition: all 0.3s ease;
  }
  nav button:hover {
    background: #0ff;
    color: #001820;
    box-shadow: 0 0 15px #0ff;
  }
  .message {
    margin-top: 15px;
    font-weight: 700;
    text-align: center;
  }
  .message.error {
    color: #ff3366;
    text-shadow: 0 0 6px #ff3366;
  }
  .message.success {
    color: #33ff99;
    text-shadow: 0 0 6px #33ff99;
  }
  #sidebar {
    background: #001820dd;
    border: 1px solid #0ff;
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 30px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    color: #0ff;
    font-weight: 700;
    text-shadow: 0 0 6px #0ff;
  }
  #sidebar div, #sidebar ul {
    user-select: none;
  }
  ul.list {
    list-style: none;
    padding-left: 0;
  }
  ul.list li {
    background: #002844;
    border-radius: 10px;
    padding: 15px 20px;
    margin-bottom: 15px;
    box-shadow:
      inset 0 0 10px #005577;
    position: relative;
  }
  ul.list li strong.title {
    font-size: 1.2rem;
    margin-bottom: 8px;
    display: block;
    text-shadow: 0 0 8px #0ff;
  }
  ul.list li .markdown {
    color: #a0f0ff;
    line-height: 1.4em;
    white-space: pre-wrap;
  }
  .btn-small {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #0ff;
    border: none;
    color: #001820;
    font-weight: 700;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.25s ease;
    box-shadow: 0 0 6px #0ff;
  }
  .btn-small + .btn-small {
    right: 85px;
  }
  .btn-small:hover {
    background: #06caca;
    color: #000;
  }
  form label.inline {
    display: inline-block;
    margin-right: 12px;
  }
  .footer {
    margin-top: 40px;
    font-size: 0.9rem;
    color: #0ff6;
    text-align: center;
    user-select: none;
  }
  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-thumb {
    background: #0ff;
    border-radius: 10px;
  }
  ::-webkit-scrollbar-track {
    background: #001020;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>스나이퍼 공식 사이트 | YWE</h1>
    <nav>
      <button id="nav-login">로그인</button>
      <button id="nav-signup">회원가입</button>
      <button id="nav-main" style="display:none;">홈</button>
      <button id="nav-logout" style="display:none;">로그아웃</button>
    </nav>
  </header>

  <aside id="sidebar" style="display:none;">
    <div><strong>사용자:</strong> <span id="sidebar-userid"></span></div>
    <div><strong>역할:</strong> <span id="sidebar-role"></span></div>
    <div id="sidebar-ip-wrapper" style="display:none;"><strong>내 IP:</strong> <span id="sidebar-ip">불러오는 중...</span></div>
    <hr style="border-color:#0ff33a33;" />
    <div><strong>최근 FAQ (최대 3개):</strong></div>
    <ul id="sidebar-faq-list" class="list" style="max-height:150px; overflow-y:auto; font-weight: normal;"></ul>
    <div><strong>최근 스나이퍼 (최대 3개):</strong></div>
    <ul id="sidebar-sniper-list" class="list" style="max-height:150px; overflow-y:auto; font-weight: normal;"></ul>
    <button id="sidebar-admin-btn" style="display:none; margin-top:10px; background:#06caca; color:#000; font-weight:700; border-radius:10px; cursor:pointer;">관리자 페이지</button>
  </aside>

  <main id="app">
    <!-- 렌더링 영역 -->
  </main>

  <div class="footer">
    &copy; 2025 YWE. All rights reserved.
  </div>
</div>

<script>
(() => {
  'use strict';

  // 로컬스토리지 키
  const USER_KEY = 'ywe_users';
  const FAQ_KEY = 'ywe_faqs';
  const SNIPER_KEY = 'ywe_snipers';

  // 상태
  let currentUserId = null;
  let currentUserRole = null;
  let currentUserIp = null;
  let state = {
    page: 'login',
    editingFaqId: null,
    editingSniperId: null,
    message: { text: '', type: '' }
  };

  // DOM
  const app = document.getElementById('app');
  const navLogin = document.getElementById('nav-login');
  const navSignup = document.getElementById('nav-signup');
  const navMain = document.getElementById('nav-main');
  const navLogout = document.getElementById('nav-logout');
  const sidebar = document.getElementById('sidebar');
  const sidebarUserId = document.getElementById('sidebar-userid');
  const sidebarRole = document.getElementById('sidebar-role');
  const sidebarIpWrapper = document.getElementById('sidebar-ip-wrapper');
  const sidebarIp = document.getElementById('sidebar-ip');
  const sidebarAdminBtn = document.getElementById('sidebar-admin-btn');

  // 관리자 ID 목록 (초기 admin)
  const ADMIN_IDS = ['admin', 'lihuiruo101'];

  // 유틸 - 로컬스토리지
  function loadUsers() {
    return JSON.parse(localStorage.getItem(USER_KEY) || '{}');
  }
  function saveUsers(users) {
    localStorage.setItem(USER_KEY, JSON.stringify(users));
  }
  function loadFaqs() {
    return JSON.parse(localStorage.getItem(FAQ_KEY) || '[]');
  }
  function saveFaqs(faqs) {
    localStorage.setItem(FAQ_KEY, JSON.stringify(faqs));
  }
  function loadSnipers() {
    return JSON.parse(localStorage.getItem(SNIPER_KEY) || '[]');
  }
  function saveSnipers(snipers) {
    localStorage.setItem(SNIPER_KEY, JSON.stringify(snipers));
  }

  // HTML escape
  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>"']/g, c => {
      switch(c) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '"': return '&quot;';
        case "'": return '&#39;';
      }
    });
  }

  // 마크다운 간단 처리 (**볼드**, *이탤릭*, 줄바꿈)
  function parseMarkdown(text) {
    if (!text) return '';
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    html = html.replace(/\n/g, '<br/>');
    return html;
  }

  // 관리자 체크
  function isAdmin() {
    return currentUserRole === 'admin';
  }

  // ID 생성 (랜덤 8자리)
  function generateId() {
    return Math.random().toString(36).substring(2, 10);
  }

  // IP 가져오기
  async function fetchUserIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      if (!res.ok) return null;
      const data = await res.json();
      return data.ip;
    } catch {
      return null;
    }
  }

  // 네비게이션 업데이트
  function updateNav() {
    if (currentUserId) {
      navLogin.style.display = 'none';
      navSignup.style.display = 'none';
      navMain.style.display = 'inline-block';
      navLogout.style.display = 'inline-block';
    } else {
      navLogin.style.display = 'inline-block';
      navSignup.style.display = 'inline-block';
      navMain.style.display = 'none';
      navLogout.style.display = 'none';
    }
  }

  // 사이드바 업데이트
  async function updateSidebar() {
    if (!currentUserId) {
      sidebar.style.display = 'none';
      return;
    }
    sidebar.style.display = 'flex';
    sidebarUserId.textContent = currentUserId;
    sidebarRole.textContent = currentUserRole;

    if (isAdmin()) {
      sidebarIpWrapper.style.display = 'block';
      sidebarIp.textContent = '불러오는 중...';
      if (!currentUserIp) {
        currentUserIp = await fetchUserIP() || '알 수 없음';
      }
      sidebarIp.textContent = currentUserIp;
      sidebarAdminBtn.style.display = 'block';
    } else {
      sidebarIpWrapper.style.display = 'none';
      sidebarAdminBtn.style.display = 'none';
    }

    // 최근 FAQ 3개, 스나이퍼 3개 로드
    const faqs = loadFaqs().slice(-3).reverse();
    const snipers = loadSnipers().slice(-3).reverse();

    const faqList = document.getElementById('sidebar-faq-list');
    const sniperList = document.getElementById('sidebar-sniper-list');

    faqList.innerHTML = faqs.length === 0 ? '<li>등록된 FAQ가 없습니다.</li>' :
      faqs.map(f => `<li><strong class="title">${escapeHtml(f.title)}</strong><div class="markdown">${parseMarkdown(f.content)}</div></li>`).join('');
    sniperList.innerHTML = snipers.length === 0 ? '<li>등록된 스나이퍼가 없습니다.</li>' :
      snipers.map(s => `<li><strong class="title">${escapeHtml(s.name)}</strong><div class="markdown">${parseMarkdown(s.description)}</div></li>`).join('');
  }

  // 메시지 출력
  function showMessage(text, type='success') {
    state.message.text = text;
    state.message.type = type;
    render();
  }

  // 로그인 페이지 렌더링
  function renderLogin() {
    app.innerHTML = `
      <h2>로그인</h2>
      <form id="form-login">
        <label for="login-id">아이디</label>
        <input id="login-id" type="text" required autocomplete="username" />
        <label for="login-pw">비밀번호</label>
        <input id="login-pw" type="password" required autocomplete="current-password" />
        <button type="submit">로그인</button>
      </form>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('form-login').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value;

      const users = loadUsers();
      if (!users[id]) {
        showMessage('존재하지 않는 아이디입니다.', 'error');
        return;
      }
      if (users[id].password !== pw) {
        showMessage('비밀번호가 일치하지 않습니다.', 'error');
        return;
      }

      currentUserId = id;
      currentUserRole = ADMIN_IDS.includes(id) ? 'admin' : 'user';
      state.page = 'main';
      state.message = { text: '', type: '' };
      updateNav();
      updateSidebar();
      render();
    });
  }

  // 회원가입 페이지 렌더링
  function renderSignup() {
    app.innerHTML = `
      <h2>회원가입</h2>
      <form id="form-signup">
        <label for="signup-id">아이디</label>
        <input id="signup-id" type="text" required autocomplete="username" />
        <label for="signup-pw">비밀번호</label>
        <input id="signup-pw" type="password" required autocomplete="new-password" />
        <label for="signup-pw2">비밀번호 확인</label>
        <input id="signup-pw2" type="password" required autocomplete="new-password" />
        <button type="submit">회원가입</button>
      </form>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('form-signup').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('signup-id').value.trim();
      const pw = document.getElementById('signup-pw').value;
      const pw2 = document.getElementById('signup-pw2').value;

      if (id.length < 3) {
        showMessage('아이디는 3자 이상이어야 합니다.', 'error');
        return;
      }
      if (pw.length < 4) {
        showMessage('비밀번호는 4자 이상이어야 합니다.', 'error');
        return;
      }
      if (pw !== pw2) {
        showMessage('비밀번호가 일치하지 않습니다.', 'error');
        return;
      }

      const users = loadUsers();
      if (users[id]) {
        showMessage('이미 존재하는 아이디입니다.', 'error');
        return;
      }

      users[id] = { password: pw };
      saveUsers(users);

      showMessage('회원가입 성공! 로그인 해주세요.', 'success');
      state.page = 'login';
      render();
    });
  }

  // 메인 페이지 렌더링
  function renderMain() {
    app.innerHTML = `
      <h2>홈</h2>
      <p>환영합니다, <strong>${escapeHtml(currentUserId)}</strong>님!</p>
      <section>
        <h3>FAQ 목록</h3>
        <ul id="faq-list" class="list"></ul>
        ${isAdmin() ? '<button id="btn-add-faq">FAQ 추가</button>' : ''}
      </section>
      <section style="margin-top: 30px;">
        <h3>스나이퍼 목록</h3>
        <ul id="sniper-list" class="list"></ul>
        ${isAdmin() ? '<button id="btn-add-sniper">스나이퍼 추가</button>' : ''}
      </section>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    const faqs = loadFaqs();
    const faqList = document.getElementById('faq-list');
    faqList.innerHTML = faqs.length === 0 ? '<li>등록된 FAQ가 없습니다.</li>' :
      faqs.map(f => `
        <li>
          <strong class="title">${escapeHtml(f.title)}</strong>
          <div class="markdown">${parseMarkdown(f.content)}</div>
          ${isAdmin() ? `
            <button class="btn-small btn-faq-edit" data-id="${f.id}">수정</button>
            <button class="btn-small btn-faq-delete" data-id="${f.id}">삭제</button>
          ` : ''}
        </li>
      `).join('');

    const snipers = loadSnipers();
    const sniperList = document.getElementById('sniper-list');
    sniperList.innerHTML = snipers.length === 0 ? '<li>등록된 스나이퍼가 없습니다.</li>' :
      snipers.map(s => `
        <li>
          <strong class="title">${escapeHtml(s.name)}</strong>
          <div class="markdown">${parseMarkdown(s.description)}</div>
          ${isAdmin() ? `
            <button class="btn-small btn-sniper-edit" data-id="${s.id}">수정</button>
            <button class="btn-small btn-sniper-delete" data-id="${s.id}">삭제</button>
          ` : ''}
        </li>
      `).join('');

    // FAQ 추가 버튼 이벤트
    if (isAdmin()) {
      document.getElementById('btn-add-faq').addEventListener('click', () => {
        state.editingFaqId = null;
        state.page = 'editFaq';
        state.message = { text: '', type: '' };
        render();
      });
      document.getElementById('btn-add-sniper').addEventListener('click', () => {
        state.editingSniperId = null;
        state.page = 'editSniper';
        state.message = { text: '', type: '' };
        render();
      });

      // FAQ 수정, 삭제 이벤트 위임
      faqList.querySelectorAll('.btn-faq-edit').forEach(btn => {
        btn.addEventListener('click', () => {
          state.editingFaqId = btn.dataset.id;
          state.page = 'editFaq';
          state.message = { text: '', type: '' };
          render();
        });
      });
      faqList.querySelectorAll('.btn-faq-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('정말로 FAQ를 삭제하시겠습니까?')) {
            let faqs = loadFaqs();
            faqs = faqs.filter(f => f.id !== btn.dataset.id);
            saveFaqs(faqs);
            showMessage('FAQ가 삭제되었습니다.', 'success');
          }
        });
      });

      // 스나이퍼 수정, 삭제 이벤트 위임
      sniperList.querySelectorAll('.btn-sniper-edit').forEach(btn => {
        btn.addEventListener('click', () => {
          state.editingSniperId = btn.dataset.id;
          state.page = 'editSniper';
          state.message = { text: '', type: '' };
          render();
        });
      });
      sniperList.querySelectorAll('.btn-sniper-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('정말로 스나이퍼를 삭제하시겠습니까?')) {
            let snipers = loadSnipers();
            snipers = snipers.filter(s => s.id !== btn.dataset.id);
            saveSnipers(snipers);
            showMessage('스나이퍼가 삭제되었습니다.', 'success');
          }
        });
      });
    }
  }

  // FAQ 편집/추가 페이지 렌더링
  function renderEditFaq() {
    let faq = { id: '', title: '', content: '' };
    if (state.editingFaqId) {
      const faqs = loadFaqs();
      faq = faqs.find(f => f.id === state.editingFaqId) || faq;
    }
    app.innerHTML = `
      <h2>${state.editingFaqId ? 'FAQ 수정' : 'FAQ 추가'}</h2>
      <form id="form-faq">
        <label for="faq-title">제목</label>
        <input id="faq-title" type="text" required value="${escapeHtml(faq.title)}" />
        <label for="faq-content">내용 (마크다운 지원)</label>
        <textarea id="faq-content" required>${escapeHtml(faq.content)}</textarea>
        <button type="submit">${state.editingFaqId ? '수정 완료' : '추가 완료'}</button>
        <button type="button" id="btn-faq-cancel">취소</button>
      </form>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('form-faq').addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('faq-title').value.trim();
      const content = document.getElementById('faq-content').value.trim();
      if (!title || !content) {
        showMessage('제목과 내용을 모두 입력해주세요.', 'error');
        return;
      }
      let faqs = loadFaqs();
      if (state.editingFaqId) {
        faqs = faqs.map(f => f.id === state.editingFaqId ? { id: f.id, title, content } : f);
      } else {
        faqs.push({ id: generateId(), title, content });
      }
      saveFaqs(faqs);
      state.page = 'main';
      showMessage(state.editingFaqId ? 'FAQ가 수정되었습니다.' : 'FAQ가 추가되었습니다.', 'success');
      render();
    });

    document.getElementById('btn-faq-cancel').addEventListener('click', () => {
      state.page = 'main';
      state.message = { text: '', type: '' };
      render();
    });
  }

  // 스나이퍼 편집/추가 페이지 렌더링
  function renderEditSniper() {
    let sniper = { id: '', name: '', description: '' };
    if (state.editingSniperId) {
      const snipers = loadSnipers();
      sniper = snipers.find(s => s.id === state.editingSniperId) || sniper;
    }
    app.innerHTML = `
      <h2>${state.editingSniperId ? '스나이퍼 수정' : '스나이퍼 추가'}</h2>
      <form id="form-sniper">
        <label for="sniper-name">이름</label>
        <input id="sniper-name" type="text" required value="${escapeHtml(sniper.name)}" />
        <label for="sniper-description">설명 (마크다운 지원)</label>
        <textarea id="sniper-description" required>${escapeHtml(sniper.description)}</textarea>
        <button type="submit">${state.editingSniperId ? '수정 완료' : '추가 완료'}</button>
        <button type="button" id="btn-sniper-cancel">취소</button>
      </form>
      <div class="message ${state.message.type}">${escapeHtml(state.message.text)}</div>
    `;

    document.getElementById('form-sniper').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('sniper-name').value.trim();
      const description = document.getElementById('sniper-description').value.trim();
      if (!name || !description) {
        showMessage('이름과 설명을 모두 입력해주세요.', 'error');
        return;
      }
      let snipers = loadSnipers();
      if (state.editingSniperId) {
        snipers = snipers.map(s => s.id === state.editingSniperId ? { id: s.id, name, description } : s);
      } else {
        snipers.push({ id: generateId(), name, description });
      }
      saveSnipers(snipers);
      state.page = 'main';
      showMessage(state.editingSniperId ? '스나이퍼가 수정되었습니다.' : '스나이퍼가 추가되었습니다.', 'success');
      render();
    });

    document.getElementById('btn-sniper-cancel').addEventListener('click', () => {
      state.page = 'main';
      state.message = { text: '', type: '' };
      render();
    });
  }

  // 전체 렌더링 분기
  function render() {
    updateNav();
    updateSidebar();

    switch(state.page) {
      case 'login': renderLogin(); break;
      case 'signup': renderSignup(); break;
      case 'main': renderMain(); break;
      case 'editFaq': renderEditFaq(); break;
      case 'editSniper': renderEditSniper(); break;
      default: renderLogin();
    }
  }

  // 네비게이션 버튼 이벤트
  navLogin.addEventListener('click', () => {
    state.page = 'login';
    state.message = { text: '', type: '' };
    render();
  });
  navSignup.addEventListener('click', () => {
    state.page = 'signup';
    state.message = { text: '', type: '' };
    render();
  });
  navLogout.addEventListener('click', () => {
    if (confirm('로그아웃 하시겠습니까?')) {
      currentUserId = null;
      currentUserRole = null;
      currentUserIp = null;
      state.page = 'login';
      state.message = { text: '로그아웃 되었습니다.', type: 'success' };
      render();
    }
  });
  navMain.addEventListener('click', () => {
    state.page = 'main';
    state.message = { text: '', type: '' };
    render();
  });

  // 초기 렌더링
  render();

})();
