<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24 NonTerror | 관리봇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle, #0f0f0f, #000);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      animation: bgflash 20s infinite alternate;
    }

    @keyframes bgflash {
      0% { background: radial-gradient(circle, #0f0f0f, #000); }
      50% { background: radial-gradient(circle, #1a0033, #000); }
      100% { background: radial-gradient(circle, #0f0f0f, #000); }
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      padding: 40px;
    }

    .card {
      background: rgba(30, 30, 30, 0.95);
      border-radius: 24px;
      padding: 50px 30px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 0 20px rgba(255, 255, 255, 0.15),
        0 0 80px rgba(200, 100, 255, 0.25),
        inset 0 0 40px rgba(255, 255, 255, 0.03);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        from 0deg,
        rgba(255,255,255,0.1),
        rgba(200,100,255,0.2),
        rgba(255,255,255,0.1),
        transparent
      );
      animation: spin 10s linear infinite;
      z-index: 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 2.7rem;
      margin-bottom: 25px;
      color: #fff0f5;
      text-shadow: 0 0 20px #ffccff, 0 0 40px #cc99ff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 10px #ffccff, 0 0 20px #cc99ff; }
      50% { text-shadow: 0 0 30px #ff99ff, 0 0 60px #dd99ff; }
    }

    .button {
      padding: 16px 34px;
      font-size: 1.2rem;
      font-weight: bold;
      background: linear-gradient(135deg, #d633ff, #6f00ff);
      border: none;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      margin: 25px 0;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.7);
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 1.05rem;
      color: #ddd;
      margin-top: 10px;
    }

    .feature-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 12px;
      backdrop-filter: blur(2px);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>24 NonTerror</h1>
      <button class="button">입장하기</button>
      <div class="features">
        <div class="feature-item">테러 방지</div>
        <div class="feature-item">서버 관리</div>
        <div class="feature-item">자동 신고 처리</div>
      </div>
    </div>
  </div>
</body>
</html>
