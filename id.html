<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YWE 로그인 인원수</title>
<style>
  body {
    background: #001f3f;
    color: #00f0ff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    padding-top: 5rem;
  }
  h1 {
    font-size: 3rem;
    text-shadow: 0 0 15px #00ffffaa;
  }
  #count {
    font-size: 5rem;
    margin-top: 2rem;
    font-weight: 900;
    text-shadow: 0 0 30px #00ffffee;
  }
</style>
</head>
<body>

<h1>현재 YWE 로그인 인원수</h1>
<div id="count">0</div>

<script>
  // 로그인 시 아이디 저장 (예시)
  function addLoginUser(id) {
    if (!id) return;
    let users = JSON.parse(localStorage.getItem('ywe_logged_users') || '[]');
    if (!users.includes(id)) {
      users.push(id);
      localStorage.setItem('ywe_logged_users', JSON.stringify(users));
    }
  }

  // 현재 로그인 유저 수 보여주기
  function showLoginCount() {
    let users = JSON.parse(localStorage.getItem('ywe_logged_users') || '[]');
    document.getElementById('count').textContent = users.length;
  }

  // 테스트용: 새로 로그인 시 addLoginUser('아이디') 호출해야 함
  // 예: addLoginUser('lihuiruo101');

  showLoginCount();

  // 필요하면 실시간 업데이트, 예를 들어 10초마다
  setInterval(showLoginCount, 10000);
</script>

</body>
</html>
