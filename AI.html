<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AI 분석 - 바카라 예측기</title>
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fffafc url('https://i.imgur.com/YRjlXx7.png') no-repeat center top;
      background-size: cover;
      display: flex;
    }
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #fbb1c1;
      padding-top: 30px;
      position: fixed;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    .sidebar h2 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-weight: bold;
      font-size: 20px;
    }
    .sidebar a {
      display: block;
      padding: 14px 20px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .sidebar a:hover {
      background: #e986a7;
    }
    .content {
      margin-left: 220px;
      padding: 40px;
      width: 100%;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      color: #333;
    }
    h1 {
      font-size: 28px;
      color: #b73c78;
      margin-bottom: 15px;
    }
    #chat-box {
      flex-grow: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      overflow-y: auto;
      background: rgba(255,255,255,0.9);
      margin-bottom: 15px;
      white-space: pre-wrap;
    }
    #user-input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    #send-btn {
      margin-top: 10px;
      padding: 12px;
      font-weight: bold;
      background: #f0729b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    #send-btn:hover {
      background: #e34d7f;
    }
    .message {
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .message.user {
      text-align: right;
      color: #b73c78;
    }
    .message.ai {
      text-align: left;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>예측 시스템</h2>
    <a href="main.html">대시보드</a>
    <a href="AI.html">AI 분석</a>
    <a href="Pro.html">확률 분석</a>
    <a href="my_memo.html">메모장</a>
  </div>
  <div class="content">
    <h1>AI 분석</h1>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="바카라, 게임 관련 질문을 입력하세요." autocomplete="off" />
    <button id="send-btn">전송</button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const messages = [
      { role: 'system', content: '당신은 바카라와 게임 예측 전문가입니다. 대답은 반드시 바카라와 게임 관련 내용만 답하세요.' }
    ];

    function appendMessage(text, sender) {
      const div = document.createElement('div');
      div.classList.add('message', sender);
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function queryChatGPT(message) {
      messages.push({ role: 'user', content: message });

      appendMessage(message, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer 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'
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: messages
          })
        });

        if (!res.ok) throw new Error('API 요청 실패');

        const data = await res.json();
        const aiMsg = data.choices[0].message.content.trim();

        messages.push({ role: 'assistant', content: aiMsg });
        appendMessage(aiMsg, 'ai');
      } catch (err) {
        appendMessage('오류가 발생했습니다: ' + err.message, 'ai');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', () => {
      const msg = userInput.value.trim();
      if (!msg) return;
      queryChatGPT(msg);
    });

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
